<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Paitan Estate - Plantation, Agronomy & Audit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Paitan Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---

                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Harvester Prod.", "value": "1.85 MT/md (Acceptable)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>`, "label": "Harvest Interval", "value": "13 days (Commendable)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>`, "label": "Nutrient Status", "value": "Manuring Rounds Delayed" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26", "Mar-26"],
                        "ffb": [3210, 3180, 4120, 3950, 4210, 3880, 3450, 3620, 4110, 4010, 4271], // Re-estimated from 42010.86 total 11M FFB
                        "rainfall": [261.0, 168.0, 87.0, 208.0, 285.0, 174.0, 159.0, 454.0, 1038.0, 445.0, 459.0],
                        "note": "*YTD FFB Production (MT) and Rainfall (mm) data for May 2025 - Mar 2026. Source: Planting Advisory Report 1/2026, Pg. 56, 85."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years (Immature - PR25/26)", "4-7 Years (Young Mature)", "8-19 Years (Prime Yielding)", "20-25 Years (Old)", ">26 Years (Old - Replanting Candidate)"],
                        "data": [283.20, 6.76, 383.67, 715.14, 836.33],
                        "title": "Paitan Estate - Palm Age Distribution (Mar 2026)",

                "observations": [
                    "<b>Chipping Delays & Replanting Infractions (Audit Pg. 5-9):</b> Full payment was prematurely released to contractor Unggul Perkasa Enterprise for felling/chipping Blocks 22-24, yet physical verification found massive portions of unchipped trunk biomass left in the field. Additionally, contractor used felled trunks as unapproved 'girder beams' across drains, posing pest breeding risks.",
                    "<b>Disorganized Asset Registers & Swapped Engines (Audit Pg. 10-12):</b> Physical audit of farm tractors (e.g., SS847Y, SS850Y) exposed serious lapses. Engine numbers fail to match JPJ/registration cards, and chassis plates were missing on several units, pointing to unauthorized parts cannibalization and undocumented engine swaps.",
                    "<b>Delays in Harvester Rates & Ineffective Incentives (Audit Pg. 2-3):</b> Severe delays in formalizing approved FY 2025/2026 Piece Rated Job (PRJ) rates. Harvesters are paid under outdated FY 2024/2025 parameters and receive attendance-based incentives rather than productivity-based rewards, reducing output potential.",

                    "<b>Noxious Weeds & Overgrown Immature Circles (PA Pg. 8, 75):</b> Circular weeding in young mature areas is Acceptable (99%), but selective spraying is critically behind at only 47% completion due to sprayer shortages and low-lying blocks being flooded. Consequently, severe patches of Hedyotis, Asystasia, and un-eradicated VOPs persist in the inter-rows. Circle spraying is severely delayed in immature Block PR25A.",
                    "<b>Ganoderma Proliferation & Missing Census (PA Pg. 5, 39; AR Pg. 42-44):</b> Ganoderma infection is rampant with a current estimated estate-wide infection rate at 10%. Toppled/collapsed palms are left un-sanitized, and no deboling has been conducted. Furthermore, no updated Ganoderma census has been executed since Oct 2024, leaving infection clusters unmonitored.",
                    "<b>PR25B Planting Suspended & High Oryctes Risk (PA Pg. 8, 79):</b> Severe hot, dry drought conditions in April 2026 forced the immediate suspension of manual planting at Block PR25B (92 ha completed YTD) to prevent seedling mortality. Additionally, EFB mulching was applied far too thick (multiple layers), generating active breeding grounds for the destructive <i>Oryctes rhinoceros</i> beetle."
                ],
                "reports": {
                    "audit": {
                        "Executive Summary": "<b>• Audit Rating:</b> Marginally Deficient. Minor improvements are required in basic controls, but serious anomalies exist in contractor verification, asset registers, and worker incentive approvals. <br><b>• Key Action Items:</b> Cease premature payments to contractors, perform complete asset reconciliation for all running tractors, and formalize piece-rate indexes to maintain workforce harmony. (Source: Audit Report PN/01/26, Pg. 1-2)",
                        "1. Oil Palm - Harvester Rates": "<b>• Delay in Pricing Index:</b> Approved Piece Rated Job (PRJ) rates for harvesting in FY 2025/2026 are severely delayed. Currently, wages are calculated using outdated FY 2024/2025 rates. <br><b>• Wrongful Incentives:</b> Incentives are paid based on attendance rather than actual harvesting productivity (e.g., RM10 flat rate for attendance vs RM2/MT for high FFB yield), violating corporate crop recovery standards. (Source: Audit Report PN/01/26, Pg. 2-3)",
                        "2. Contracts - Replanting": "<b>• Premature Releases:</b> Full contract payment was released to contractor Unggul Perkasa Enterprise for felling and chipping in Blocks 22, 23, and 24. <br><b>• Incomplete Work:</b> Field verification on 16 Oct 2025 revealed huge piles of unchipped trunk biomass left scattered. Furthermore, contractor utilized heavy unchipped logs as unauthorized 'girder beams' across drainage lines, violating Policy 1.7.2. (Source: Audit Report PN/01/26, Pg. 5-9)",
                        "3. Vehicle Running - Assets": "<b>• Mismatched Engine Numbers:</b> Physical validation of farm tractors (e.g. SS847Y, SS850Y) showed engine serial numbers did not match registration documents. <br><b>• Missing Chassis Plates:</b> Chassis identification plates were missing, indicating unrecorded engine swaps and unauthorized cannibalization of machinery parts by past workshop management. (Source: Audit Report PN/01/26, Pg. 10-12)"
                    },
                    "plantation": {
                        "Executive Summary": "<b>• Overall Performance:</b> Acceptable overall, with FFB crop production YTD March 2026 expected to exceed the annual budget. Production cost is satisfactory due to high crops and expenditure discipline. <br><b>• Areas for Improvement:</b> Spraying and harvester productivity requires urgent focus. Workshop controls must review crawler and tractor running accounts due to high repair/running costs. (Planting Advisory Report 1/2026, Pg. 4-8)",
                        "Area Statement": "<b>• Total Area:</b> Mature area reduced to 1,941.90 ha (78.65%) following replanting actions. <br><b>• Immature Area:</b> Increased to 283.20 ha (11.47%), comprising Blocks PR23A, PR25A, and PR25B. <br><b>• Replanting Progress:</b> The PR26 replanting program targets 220.50 ha in Blocks P99/19, 20 and 21. Felling and chipping are currently in progress. Total area under title stands at 2,468.93 ha. (Planting Advisory Report 1/2026, Pg. 10-12)",
                        "Labour Statement": "<b>• Worker Strength:</b> The estate registers 238 workers (Checkroll: 198, Unregistered/X-File: 40), achieving a labor-to-land ratio of 1:8 ha. <br><b>• Labor Shortages:</b> While harvester strength (116 harvesters, ratio 1:17 ha) is adequate, there is a critical shortage of 4 manuring workers and 8 spraying workers, compromising immature field upkeep. (Planting Advisory Report 1/2026, Pg. 13-14)",
                        "Staff Establishment": "<b>• Management:</b> The estate is under Senior Manager Mr. Phor Kok Beng and Manager Mr. Ardrian J Sindin (on medical leave during visit). <br><b>• New Staff:</b> En. Muhd. Rahman (Cadet) joined in November 2025 and is successfully supervising the nursery. One replanting field conductor has been requested for FY26/27. (Planting Advisory Report 1/2026, Pg. 15)",
                        "General Charges": "<b>• Cost Control:</b> General charges were underspent by 14% overall. <br><b>• Overspending:</b> Significant overruns recorded in Staff Salary (8% due to unbudgeted trainee clerk/field conductor), Labour EPF (13% due to unbudgeted foreign worker contributions), Paid Leave (27% due to higher average earnings of RM 113/md vs budget RM 65.38/md), and Donations/CSR (353% due to village road repairs and flood victim relief in Feb-Mar 2026). (Planting Advisory Report 1/2026, Pg. 16-19)",
                        "Upkeep & Cultivation": "<b>• Total Expenditure:</b> RM 1,825/ha, representing an underspending of 17%. <br><b>• Weeding Delays:</b> Circle spraying completed at 90% (output 4.4 ha/md using Inter Pump). Selective weeding is severely delayed (47% completed) due to sprayer shortages and severe flooding of low-lying mature divisions. <br><b>• Pruning Standards:</b> Satisfactory. 90% of mature palms pruned close to the trunk at RM 1.10 - RM 1.20/palm. (Planting Advisory Report 1/2026, Pg. 20-27)",
                        "Harvesting and Collection": "<b>• Infield Collection:</b> Cost at RM 82.43/MT is acceptable (under budget). Cumulative harvesting rounds reached 22 YTD (on target), maintaining an average interval of 13 days. Infield collection is supported by 9 old crawler units and wheelbarrows. Tractors assisted when contractor units broke down. (Planting Advisory Report 1/2026, Pg. 53-54)",
                        "Crop Production": "<b>• Yield Volume:</b> Good production of **42,010.86 MT** of FFB YTD March, yielding **20.76 MT/ha** (100% of budget), representing a 24% increase compared to last year's same period (16.76 MT/ha). Average bunch weights increased YTD (e.g. 1999 planting at 18.19 kg vs 17.03 kg last year). (Planting Advisory Report 1/2026, Pg. 56-57)",
                        "Production Cost": "<b>• Cost Indicators:</b> ex-estate cost of production stands at RM 225/tonne FFB YTD vs budget of RM 257/tonne, driven by achieving the crop budget and strong control of General Charges and Upkeep. (Planting Advisory Report 1/2026, Pg. 58)",
                        "Vehicles Running Cost": "<b>• Running Cost Concerns:</b> Running costs for specific units are extremely high. Crawlers and tractors are grossly underutilized. Mini farm tractors SS847Y and SS850Y cost RM 27.25/hr and RM 17.61/hr. Highly recommended to write off dilapidated crawlers and park or transfer unutilized tractors. (Planting Advisory Report 1/2026, Pg. 59-63)",
                        "Capital Expenditure": "<b>• CapEx Status:</b> Underspent (Actual RM 201,089 vs Budget RM 345,279). Main expenditures were road gravelling crusher runs (RM 40,757) and purchasing 9 units of electric crawlers (RM 142,221). (Planting Advisory Report 1/2026, Pg. 64)",
                        "Immature": "<b>• PR23A/01 (6 ha):</b> Basal pruning was poorly done and needs immediate repair (Pg. 72-73). <br><b>• PR25A (114.39 ha):</b> Circles are very grassy and due for spraying; harvester paths are overgrown and require roto-slashing (Pg. 75). <br><b>• PR25B (137.68 ha):</b> Extreme hot and dry weather in April 2026 forced a halt to ongoing planting to avoid high mortality (92 ha planted YTD). EFB applied too thick, which risks attracting breeding of Oryctes rhinoceros beetle (Pg. 79). <br><b>• PR26/P99 (83.69 ha):</b> Felling, chipping, and camber bund construction in progress (Pg. 82)."
                    },

                        "Nutrient Inputs/Progress of Manuring": "<b>• Program Delays:</b> Mixture A and NK1 applications are delayed by 1-6 months due to late delivery by suppliers. <br><b>• Poor Application Quality:</b> Standard of broadcasting is poor, with un-uniform distribution and fertilizer placed on or too close to palm bases (Pg. 34). Sub-surface application at Block P06B/77 is complete but worker output is extremely low (0.7 ha/md). (Agronomy Report 1/2026, Pg. 17-18, 34)",
                        "Agronomic Observation": "<b>• Weeding Progress:</b> Circular weeding is acceptable but circle raking is needed in older plantings to clear thick debris. <br><b>• Weeding Backlog:</b> Selective spraying of inter-rows is slow, leaving spots of Asystasia, Hedyotis, and rampant Volunteer Oil Palms (VOPs) (Pg. 27-29). <br><b>• Water Gates:</b> Replaced in Feb 2026 and are functioning well (Pg. 52).",
                        "Yield Performance": "<b>• Production Output:</b> Yield achieved is highly satisfactory at 20.76 MT/ha, showing strong recovery from drought. High density plantings (SPH 135-150) in 2002-2006 blocks require monitoring. (Agronomy Report 1/2026, Pg. 11, 56)",
                        "Fertilizer Recommendation": "<b>• Formulation:</b> Standard fertilizer program for FY25/26 and FY26/27 was formulated. Recommendations include applying CRF Fuji Coat (600g) and RP (500g) in planting holes for all PR25 and PR26 new plantings. Apply GML on high acid soils to raise pH above 6.0. (Agronomy Report 1/2026, Pg. 33, 79)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Contractor Compliance (Chipping)</p><p class='text-sm text-gray-600'><b>Audit Ref: 5.2 (Replanting):</b> Full payment must only be released upon 100% verification of completed works. Any deviation (e.g., using trunks as girder beams) is strictly prohibited. (Source: Audit Report PN/01/26, Pg. 5-9)</p></div> <div class='policy-item'><p class='font-semibold'>Asset Verification</p><p class='text-sm text-gray-600'><b>Audit Ref: 5.3 (Vehicles):</b> All vehicles must have visible chassis plates and engine numbers matching registration cards. Cannibalization of parts must be documented and approved to prevent asset identity fraud. (Source: Audit Report PN/01/26, Pg. 10-12)</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >5% infection, implement mounding extending 1.0m from the bole and 0.75m high to promote new root growth and stabilize the palm stand. (Source: AR 1/2026, Pg. 44)</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> Fertilizer application must adhere strictly to the schedule. Current progress is slow due to low worker productivity (11 bags/md). Pre-assessment is required to avoid applying in waterlogged areas. (Source: AR 1/2026, Pg. 18-19)</p></div>"

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Audit') ? 'bg-red-50 text-red-800' :
                                       metric.title.includes('Pest') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-1 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-green-800 font-semibold mb-6 italic border-b pb-2">Visit Date: April 27th & 28th, 2026</p>
                        <p class="text-xs text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Critical Issues</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (May 2025 - Mar 2026)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                             <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-red-900 text-white p-3 rounded-md hover:bg-red-800 transition flex justify-between items-center"><span>Internal Audit Report Details (Ref: PN/01/26)</span> <span class="text-xs bg-red-700 px-2 py-1 rounded">High Priority</span></button>
                            <div id="${estate.id}-audit" class="details-content bg-red-50 p-4 rounded-md border border-red-200"></div>

                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>

                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>

                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#7c3aed'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: false }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                const auditDiv = document.getElementById(`${estateData.id}-audit`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-4 text-green-900 border-b border-gray-100 pb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-700 mt-1 leading-relaxed">${content}</p>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-4 text-green-900 border-b border-gray-100 pb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-700 mt-1 leading-relaxed">${content}</p>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                 if (auditDiv && estateData.reports.audit) {
                    auditDiv.innerHTML = Object.entries(estateData.reports.audit).map(([section, content]) => `<h4 class="font-semibold mt-4 text-red-900 border-b border-red-100 pb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-800 mt-1 leading-relaxed">${content}</p>`).join('');
                } else if (auditDiv) {
                    auditDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Contractor Compliance (Chipping)</p><p class='text-sm text-gray-600'><b>Audit Ref: 5.2 (Replanting):</b> Full payment must only be released upon 100% verification of completed works. Any deviation (e.g., using trunks as girder beams) is strictly prohibited. (Source: Audit Report PN/01/26, Pg. 5-9)</p></div> <div class='policy-item'><p class='font-semibold'>Asset Verification</p><p class='text-sm text-gray-600'><b>Audit Ref: 5.3 (Vehicles):</b> All vehicles must have visible chassis plates and engine numbers matching registration cards. Cannibalization of parts must be documented and approved to prevent asset identity fraud. (Source: Audit Report PN/01/26, Pg. 10-12)</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >5% infection, implement mounding extending 1.0m from the bole and 0.75m high to promote new root growth and stabilize the palm stand. (Source: AR 1/2026, Pg. 44)</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> Fertilizer application must adhere strictly to the schedule. Current progress is slow due to low worker productivity (11 bags/md). Pre-assessment required to avoid applying in waterlogged areas. (Source: AR 1/2026, Pg. 18-19)</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Paitan Estate';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
