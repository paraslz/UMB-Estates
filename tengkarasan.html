<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Tengkarasan Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center" id="header-title">
                    Tengkarasan Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "tengkarasan",
                "name": "Tengkarasan Estate",
                "reportInfo": "Data based on PA Report (Visit: 29-30 Apr 2026), Agronomy Report (Visit: 21 Jan 2026) & Internal Audit Report (Ref: MPSB/IAD/TK/04/26).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Area: 2,352.65 ha",
                            "Mature: 2,122.65 ha",
                            "Immature: 129.11 ha",
                            "Replanting: 44.53 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "16.72 / 14.93 MT",
                        "note": "YTD Mar 26 (+12%)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 295.50 / RM 320.00",
                        "note": "Ex-Estate, YTD Mar 26"
                    },
                    "labour": {
                        "title": "Weeding/Upkeep Status",
                        "value": "45% Complete",
                        "note": "Severely Delayed (Sprayer Shortage)"
                    },
                     "oer": {
                        "title": "OER % (Actual vs Budget)",
                        "value": "18.90% / 19.50%",
                        "note": "YTD Mar 26"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:19 ha (Shortage)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Ganoderma Census", "value": "Outdated (Needs Update)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Yield YoY", "value": "+12% vs Budget" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Weeding (VOPs)", "value": "45% Complete (Slow)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Vehicle Maintenance", "value": "High Breakdowns" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Manuring (FY25/26)", "value": "Delayed (2-3 Mths)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26", "Mar-26"],
                        "ffb": [2800, 3200, 3400, 3500, 3600, 3700, 3600, 3300, 2900, 2500, 3000],
                        "rainfall": [198, 559, 150, 180, 200, 250, 300, 350, 200, 150, 447],
                        "note": "*YTD FFB Production (MT) & Rainfall (mm) spanning 11 months (May 2025 to Mar 2026)."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years", "8-19 Years", "20-25 Years", ">26 Years"],
                        "data": [121.73, 380.91, 1286.37, 455.37], 
                        "title": "Tengkarasan Estate - Palm Age Distribution",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 14."
                    }
                },
                "observations": [
                    "<b>Yield Performance:</b> YTD FFB production (11 months) is encouraging at 35,500 MT (12% above budget), yielding 16.72 MT/ha. However, OER is slightly below budget at 18.90%. <span class='observation-ref'>(PA Report, Pg. 60)</span>",
                    "<b>Severe Upkeep Delays:</b> Circle spraying and selective weeding are significantly behind schedule (only 45% complete). This is primarily due to a critical shortage of sprayers (12 pax short). <span class='observation-ref'>(PA Report, Pg. 19-30; AR Pg. 39-42)</span>",
                    "<b>Manuring Program Backlog:</b> The FY25/26 manuring program continues to suffer delays (2-3 months) due to labour constraints and poor productivity. EFB application is ongoing but slow. <span class='observation-ref'>(PA Report, Pg. 32; AR Pg. 16-21)</span>",
                    "<b>Ganoderma Census & Treatment:</b> Ganoderma remains a significant threat. The census is drastically outdated (2019 data) despite active fruiting bodies observed in multiple blocks. Treatments must be expedited. <span class='observation-ref'>(AR Pg. 49-51)</span>",
                    "<b>Inefficient Internal Transport & Vehicle Breakdowns:</b> Infield collection is hindered by poor outsourced contractor performance. Additionally, high vehicle running costs are incurred due to major overhauls and frequent breakdowns of aging tractors. <span class='observation-ref'>(PA Report, Pg. 56-59, 63)</span>",
                    "<b>Immature Area Management:</b> Upkeep in the 129.11 ha immature area is lagging. Immediate action is required for circle weeding and supplying of vacant points to avoid stunted growth. <span class='observation-ref'>(PA Report, Pg. 70)</span>",
                    "<b>Audit Issue - Payroll Misclassification:</b> TK Management wrongly charged the entire monthly salary of 6 new harvesters to the 'Underpaid Allowance' account code instead of just the top-up amount, creating reporting risks. <span class='observation-ref'>(Internal Audit Report, Pg. 3-6)</span>"
                ],
                "reports": {
                    "audit": {
                        "Overall Audit Rating": "<b>Status: Satisfactory.</b><br>In IAD's opinion, the overall internal control systems governing the estate operations are Satisfactory. Although some weaknesses were identified, they were not critical enough to compromise the system of internal control. (Source: IAD Report, Pg. 1-2)",
                        "Payroll & Personnel Findings": "<b>Issue:</b> Wrong Account Classification of Minimum Wages Top-Up.<br><b>Observation:</b> Management recruited 6 workers in June 2025 with a guaranteed minimum wage of RM1,700/month. The entire monthly salary was charged to 'Underpaid Allowance' instead of just the top-up portion.<br><b>Action:</b> HR to issue specific guidelines. (Source: IAD Report, Pg. 3-6)",
                        "Manuring & EFB Findings": "<b>Issue:</b> Temporary Delay in EFB and Compost Application.<br><b>Observation:</b> Materials in Blocks 15 and 30 were left scattered in the field without application, despite transport costs being fully paid.<br><b>Status:</b> Application was completed by 7/11/2025 after a new contract rate was introduced. (Source: IAD Report, Pg. 7-10)"
                    },
                    "plantation": {
                        "Executive Summary": "The estate's performance over the 11-month period (May 2025 - Mar 2026) shows good crop production (12% above budget). However, upkeep works, particularly weeding and manuring, are severely delayed due to labour shortages and poor contractor performance. Management is urged to expedite recruitment, enforce strict monitoring of contractors, and address high vehicle breakdown rates. (PA Report, Pg. 8)",
                        "Area Statement": "Total titled area is 2,352.65 ha with a planted area of <b>2,251.76 ha</b>. This comprises:<br>• <b>Mature:</b> 2,122.65 ha (94%).<br>• <b>Immature:</b> 129.11 ha.<br>• <b>Replanting:</b> 44.53 ha (in progress). (PA Report, Pg. 9)",
                        "Labour Statement": "Total workforce stands at <b>195 workers</b> against a requirement of 230.<br>• <b>Harvesters:</b> 112 (Ratio 1:19 ha).<br>• <b>Sprayers:</b> Critical shortage (12 workers short).<br>Immediate recruitment is necessary to recover upkeep delays. (PA Report, Pg. 12-13)",
                        "Staff Establishment": "The staff establishment is satisfactory with <b>1 Manager, 2 Assistant Managers, 3 Field Supervisors, and 4 Clerks.</b> (PA Report, Pg. 14)",
                        "General Charges": "Total YTD expenditure is <b>RM 750/ha</b>, which is 5% below the budget.<br>• <b>Overspending:</b> 'Medical Expenses' (+15%) and 'Vehicle Running/Transport' (+12%).<br>• <b>Savings:</b> Offset by savings in other administrative headers. (PA Report, Pg. 15-18)",
                        "Upkeep and Cultivation": "• <b>Weeding:</b> Circle spraying and selective weeding are severely delayed (only 45% complete) due to the shortage of sprayers.<br>• <b>Manuring:</b> Delayed by 2-3 months. EFB application is ongoing but slow. (PA Report, Pg. 19-35)",
                        "Harvesting and Collection": "YTD Cost is slightly below budget due to higher crop volume.<br>• <b>Interval:</b> Acceptable at 12-15 days.<br>• <b>Infield Collection:</b> Struggling due to poor contractor performance and frequent estate tractor breakdowns. (PA Report, Pg. 56-59)",
                        "Crop Production": "YTD (11 Months) FFB Production is <b>35,500 MT</b>, which is 12% above the budget.<br>• <b>Yield/Ha:</b> 16.72 MT/ha.<br>• <b>Extraction:</b> OER at 18.90% vs Budget 19.50%. (PA Report, Pg. 60)",
                        "Production Cost": "YTD Cost of Production is <b>RM 295.50/MT</b>, which is 8% favorable compared to the budget of RM 320.00/MT, mainly driven by the higher crop volume diluting fixed costs.<br>• <b>General Charges:</b> RM 65.20/MT<br>• <b>Upkeep:</b> RM 58.40/MT<br>• <b>Harvesting:</b> RM 171.90/MT (PA Report, Pg. 62)",
                        "Vehicles Running Cost": "Costs are exceptionally high. Significant expenditure was incurred on major overhauls of aging tractors and frequent repairs of prime movers. (PA Report, Pg. 63)",
                        "Capital Expenditure": "Upgrading of worker quarters and construction of a new fertilizer store are 80% complete. Drain desilting using excavators is ongoing. (PA Report, Pg. 65)",
                        "Immature": "Upkeep in the 129.11 ha immature area (planted 2023) is behind schedule. Supplying of vacant points and circle weeding need immediate attention to prevent stunted growth. (PA Report, Pg. 70)"
                    },
                    "agronomy": {
                        "Executive Summary": "Yield for FY25/26 YTD (Dec 2025) has increased strongly by 22% (13.56 MT/ha) compared to the previous year. Key limiting factors remain the delayed manuring program (up to 4 months delay), lagging weeding and pruning progress driven by worker constraints, and severely outdated Ganoderma census mapping. (Source: AR 1-2026, Pg. 8, 57)",
                        "Nutrient Inputs/Progress of Manuring": "The FY25/26 program faces massive delays. NK1, Mix A, and Mix C inputs are delayed by 2-4 months due to limited worker availability and poor productivity (22 bags/manday). EFB Compost is only 63% completed; 4,421 MT backlogged at roadsides due to transport issues. (Source: AR 1-2026, Pg. 15-21)",
                        "Agronomic Observation": "Harvesting interval greatly improved to 10-18 days. Quality is generally acceptable. Round 1 progressive pruning only 66% completed. Circle and inter-row spraying lagging. VOP spraying only 50% completed. Outdated 2019 Ganoderma data being used despite active fruiting bodies. (Source: AR 1-2026, Pg. 23-51)",
                        "Yield Performance": "Actual YTD FY25/26 (Dec 2025) yield stands at 13.56 MT/ha (+22% YoY). ABW recorded at 16.21 kg (Acceptable but room for improvement). (Source: AR 1-2026, Pg. 56-58)",
                        "Fertilizer Recommendation": "Subsoil application of Mix A proposed for blocks 61, 31, 33. Fertilizer application to cease 1 year prior for FY27/28 replanting blocks. (Source: AR 1-2026, Pg. 60-72)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> Fertilizer application must adhere to the schedule. Diversion of manuring labor to other tasks (like loose fruit collection) should be avoided to prevent program delays which stress the palms.</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >5% infection, implement sanitation by de-boling and creating a soil mound (1.0m from bole, 0.75m height) to promote new root development. Annual census updates are mandatory.</p></div> <div class='policy-item'><p class='font-semibold'>Pest Control (Rats)</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> Post-baiting census is strictly required. If damage still exceeds 10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Weeding Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-GEN-02:</b> Eradication of woody growths and Volunteer Oil Palms (VOPs) must be prioritized to prevent nutrient competition.</p></div> <div class='policy-item'><p class='font-semibold'>Payroll & Wages</p><p class='text-sm text-gray-600'><b>Policy Ref: HR-WAGE-03:</b> 'Underpaid Allowance' codes must strictly only be used for the top-up portion of wages when actual earnings fall below the minimum wage threshold, not for the entire salary.</p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') || metric.title.includes('Manuring') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (YTD)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>

                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Internal Audit Report Details</button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#22c55e', '#facc15', '#ca8a04', '#991b1b'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const renderSection = (data) => {
                    if (data && data !== "Not Available") {
                        // Use the precise layout mirroring the screenshot:
                        // Bold, prominent heading and styled paragraph with bottom margin
                        return Object.entries(data).map(([section, content]) => {
                            return `
                                <div class="mb-5">
                                    <h4 class="font-bold text-gray-900 text-base mb-1">${section}:</h4>
                                    <div class="text-sm text-gray-700 leading-relaxed">${content}</div>
                                </div>
                            `;
                        }).join('');
                    }
                    return `<p class="text-sm text-gray-600 mt-2">Not Available</p>`;
                };

                const auditDiv = document.getElementById(`${estateData.id}-audit`);
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (auditDiv) auditDiv.innerHTML = renderSection(estateData.reports.audit);
                if (agronomyDiv) agronomyDiv.innerHTML = renderSection(estateData.reports.agronomy);
                if (plantationDiv) plantationDiv.innerHTML = renderSection(estateData.reports.plantation);
                if (pinfosysDiv) pinfosysDiv.innerHTML = renderSection(estateData.reports.pinfosys);
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> Fertilizer application must adhere to the schedule. Diversion of manuring labor to other tasks (like loose fruit collection) should be avoided to prevent program delays which stress the palms.</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >5% infection, implement sanitation by de-boling and creating a soil mound (1.0m from bole, 0.75m height) to promote new root development. Annual census updates are mandatory.</p></div> <div class='policy-item'><p class='font-semibold'>Pest Control (Rats)</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> Post-baiting census is strictly required. If damage still exceeds 10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Weeding Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-GEN-02:</b> Eradication of woody growths and Volunteer Oil Palms (VOPs) must be prioritized to prevent nutrient competition.</p></div> <div class='policy-item'><p class='font-semibold'>Payroll & Wages</p><p class='text-sm text-gray-600'><b>Policy Ref: HR-WAGE-03:</b> 'Underpaid Allowance' codes must strictly only be used for the top-up portion of wages when actual earnings fall below the minimum wage threshold, not for the entire salary.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Tengkarasan Estate';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
