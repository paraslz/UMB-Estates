<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Bukit Senorang Estate - Plantation, Agronomy & Audit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Bukit Senorang Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->

                },
                "observations": [
                    "<b>Severe Rat Infestation (Agronomy Pg. 5, 53-54; PA Pg. 34):</b> Extensive rat damage persists in young mature fields (P18 & P22), with random assessments showing damage levels exceeding 20%. While a single round of baiting was conducted in P22 (April 15, 2026), no bait replacement was subsequently carried out, leading to quick resurgence. Barn owl box occupancy remains low, averaging less than 30% across the divisions.",
                    "<b>Schedule Deviations & Manuring Mismanagement (Agronomy Pg. 4, 15-17; Audit Pg. 3-8):</b> Major lags recorded: 2nd round of NK Mix was 3 months late in P01C/D; 1st round NK Mix was skipped entirely in P02D/F/G; Mix B applications are severely behind in P18, P20, and P22. Furthermore, a critical audit finding revealed ~RM 59,000 of fertilizer was wasted due to application in replanting blocks (BS00B, 98D, 98C) shortly before felling, violating Policy 1.7.2.",

                    "<b>Tractor Downtime & Audit Irregularities (Audit Pg. 15-18; PA Pg. 48-49):</b> 7 tractors suffered prolonged downtime (4 to 24 months) awaiting outsourcing decisions, resulting in rust and fleet degradation. Operating costs for remaining running units are extremely high (e.g., WVN 6550 at RM 146/hr). Harvester incentive payments were also erroneously paid using outdated old rates, violating approved PRJ parameters."
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "<b>• Satisfactory Performance:</b> The estate's overall performance for the May-Oct 2025 period is acceptable and shows significant improvement. FFB production (14,671.62 MT) is 14% above budget, and the cost of production (RM 246.11/MT) is 22% below budget. <br><b>• Key Action Items:</b> Focus must be placed on eliminating noxious weeds, completing the delayed manuring program, and managing the aggressive replanting schedule for Fields 2025/2026. Vehicle running costs for specific tractors remain a concern due to high repair costs. (PA Report, Pg. 50-51)",
                        
                        "Area Statement": "<b>• Total Area:</b> The total planted area stands at 1,520.82 ha. <br><b>• Block Breakdown:</b> The mature area has been reduced to 1,289.58 ha following the replanting of 101.58 ha (Fields 1998C/D, 2000B). <br><b>• Immature Area:</b> Immature area has increased to 231.24 ha, comprising Fields 2025 A-G. <br><b>• Future Program:</b> Replanting is scheduled for 179.60 ha in FY 2026/27 and 102.30 ha in FY 2027/28. Watermelon intercropping is currently in progress on 59.03 ha of the replanting area. (PA Report, Pg. 10-11)",

                        "Crop Production": "<b>• Crop Volume:</b> The estate produced 14,671.62 MT of FFB for the 6-month period (May-Oct), which is 11.04 MT/ha (14% higher than the seasonal budget). <br><b>• Extractions:</b> Extraction rates recorded OER of 19.42% and KER of 4.64%. (PA Report, Pg. 44)",

                        "Immature": "<b>• Field 2025 A-D (129.66 ha):</b> Planting completed in June 2025. Palm density is 148 palms/ha. <br><b>• Field 2025 E-G (101.58 ha):</b> Felling and land prep complete; planting scheduled for Nov 2025. (PA Report, Pg. 46-47)"
                    },
                    "agronomy": {
                        "Executive Summary": "The agronomic conditions of Bukit Senorang were inspected on April 23, 2026, as a follow-up to the December 30, 2025 visit. The overall status is acceptable, but immediate action is needed for extensive rat attacks in P18 and P22, critical circle weeding delays in P18/P20, and waterlogging in low-lying sections. The program of FY 2026/2027 has been reviewed and remains unchanged. (Agronomy Report 1/2026, Pg. 4-7)",
                        "Nutrient Inputs/Progress of Manuring": "As of March 2026, severe progress lags occurred: 2nd round of NK Mix was 3 months late in P01C/D; 1st round of NK Mix (June 2025) was skipped in P02D/F/G; RP in P05A/B was 2 months late. NK Mix 2nd round (Oct 2025) is still pending in P05A-E, and 3rd round (Feb 2026) is pending in P05C-E. Mixture B is significantly delayed in P18, P20, and P22. Compost application is on hold due to high fuel costs, and regular chemical sampling of compost has been neglected since 2025. (Agronomy Report 1/2026, Pg. 15-20)",

                        "Yield Performance": "The estate achieved a yield of 18.15 MT/ha in FY2025/2026, representing an increase of nearly 5% YoY. P18 recorded the highest yield at 25.71 MT/ha, followed by P02 (19.64 MT/ha) and P05 (19.64 MT/ha). P22 recorded 13.17 MT/ha in its first harvesting year. Yields in P98 and P00 improved significantly (>20%) because low-yielding, Ganoderma-damaged blocks were felled for replanting. (Agronomy Report 1/2026, Pg. 65-66)",

                        "Manuring Issues (Critical)": "1) Manuring costing records were not updated for 6 months (Jun-Oct 2025) due to staff shortage. 2) Fertilizer (NK Mix, RP, Borate) was applied to replanting blocks (BS00B, BS98D, BS98C) shortly before felling/chipping, directly contradicting Policy 1.7.2. This resulted in an estimated wastage of ~RM 59,000. (Audit Report 05/26, Pg. 3-8)",
                        "Oil Palm (Harvesting)": "Productivity incentive payments to harvesters were made using the old rates (FY 2024/2025 PRJ) instead of the approved current rates (FY 2025/2026 PRJ), violating internal management approvals. (Audit Report 05/26, Pg. 12-14)",

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Pest') ? 'bg-red-50 text-red-800' : 
                                       metric.title.includes('Audit') ? 'bg-purple-50 text-purple-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic font-semibold text-green-800">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (May 2025 - Mar 2026)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3>
                            <ul id="observations-list" class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul>
                        </div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Audited Report Details</button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#16a34a', '#3b82f6', '#facc15'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: false }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                const auditDiv = document.getElementById(`${estateData.id}-audit`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-4 text-green-900 border-b border-gray-100 pb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-700 mt-1 leading-relaxed">${content}</p>`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-4 text-green-900 border-b border-gray-100 pb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-700 mt-1 leading-relaxed">${content}</p>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = estateData.reports.pinfosys === "Not Available" ? `<p class="text-sm text-gray-600">Not Available</p>` : Object.entries(estateData.reports.pinfosys).map(([section, content]) => `<h4 class="font-semibold mt-4 text-green-900 border-b border-gray-100 pb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-700 mt-1 leading-relaxed">${content}</p>`).join('');
                }
                if (auditDiv && estateData.reports.audit) {
                    auditDiv.innerHTML = Object.entries(estateData.reports.audit).map(([section, content]) => `<h4 class="font-semibold mt-4 text-green-900 border-b border-gray-100 pb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-700 mt-1 leading-relaxed">${content}</p>`).join('');
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
