<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>MLP 4 Estate - Plantation, Agronomy & Audit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                MLP 4 Estate Report <span class="text-sm font-normal text-gray-500 block">Visit Dates: May 2026 (PA) / May 2026 (Agronomy) / Nov 2025 (Audit)</span>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "mlp4",
                "name": "MLP 4 Estate",
                "reportInfo": "Data based on Plantation Advisory Report 1/2026 (8th & 9th May 2026), Agronomy Report 1/2026 (28th May 2026) & Internal Audit Report (Nov 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,301.97 ha",
                            "Mature: 1,301.97 ha",
                            "Immature: 0 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (FY25/26)",
                        "value": "17.42 MT",
                        "note": "+11% improvement vs FY24/25"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 315.09 / RM 292.04",
                        "note": "Ex-Estate, Mar 2026 YTD"
                    },
                    "upkeep": {
                        "title": "Weeding Progress",
                        "value": "Circle 52% / Selective 100%",
                        "note": "Woodies 71%; limited by worker output"
                    },
                     "labour": {
                        "title": "Labour Status",
                        "value": "Shortage: 18",
                        "note": "Harvesters: -6, Manuring: -7, Spray: -5"
                    }
                },
                "keyMetrics": [
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' /></svg>`, "label": "Audit Status", "value": "Marginally Deficient" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "Harvest Interval", "value": "9-16 Days (Improved)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>`, "label": "OER % (Mar YTD)", "value": "20.24%" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Manuring Status", "value": "FY26/27 Delayed (5%)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 7h8m0 0v8m0-8l-8 8-4-4-6 6' /></svg>`, "label": "Harvester Prod.", "value": "Low Outturn (58%)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26", "Mar-26"],
                        "ffb": [], 
                        "rainfall": [55, 272, 166, 49, 68, 21],
                        "note": "*Rainfall data from PA Report 1/2026 Appendix 1."
                    },
                    "ageProfile": {
                        "labels": ["Mature (>3 Years)", "Immature (0-3 Years)"],
                        "data": [1301.97, 0],
                        "title": "MLP 4 Estate - Palm Age Distribution",
                        "note": "*Source: Agro Report 1/2026, Pg. 10; PA Report 1/2026, Pg. 10."
                    }
                },
                "observations": [
                    "<b>Audit Rating - Marginally Deficient:</b> Rated 'Marginally Deficient' mainly due to store management weaknesses and operational inconsistencies. <i>Action taken: Tyres fitted and FIFO/marking system implemented for bags.</i> <span class='observation-ref'>(Audit Report Nov 2025, Pg. 1-4)</span>",
                    "<b>Critical Labour Shortage & Low Outturn:</b> High turnover has led to notable shortages in harvesters (-6), manuring (-7), and spraying (-5). Harvester outturn is critically low at 58%, significantly affecting daily outputs. <span class='observation-ref'>(PA Report 1/2026, Pg. 15, 47)</span>",
                    "<b>Improved Harvesting Intervals & Yield Recovery:</b> Yield performance in FY25/26 improved by 11% to 17.42 MT/ha. Harvesting intervals have significantly improved to 9-16 days following field road repairs, though crop recovery in P12B remains lower due to early-year delays. <span class='observation-ref'>(Agro 1/2026, Pg. 16, 37; PA Report 1/2026)</span>",
                    "<b>Delayed Manuring Program:</b> While the FY25/26 manuring program achieved 100% completion, the new FY26/27 program is severely delayed (only 5% complete by June 2026) due to the carryover. Sub-soil placement quality is acceptable but requires better hole-depth consistency. <span class='observation-ref'>(Agro 1/2026, Pg. 13-14)</span>",
                    "<b>Suboptimal Weeding in Specific Blocks:</b> Circle spraying is at 52%, while selective/inter-row is 100% complete. However, inter-row conditions remain suboptimal in Blocks B05 and B19 due to the rapid regeneration of woody weeds (Clidemia hirta) and poor application techniques. <span class='observation-ref'>(Agro 1/2026, Pg. 27-28; PA Report 1/2026)</span>",
                    "<b>High Production & Transport Costs:</b> Overall Ex-Estate FFB Cost is RM 315.09/MT (8% over budget) driven by high internal transport costs (tractor repairs), low FFB volumes during the trough, and unbudgeted General Charge excesses. <span class='observation-ref'>(PA Report 1/2026, Pg. 52, 53)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate did not meet the crop budget due to high harvester turnover and a low cropping period. There are significant labor shortages across harvesting, manuring, and spraying. Inter-rows require intensive cleanup from woody weeds, and worker productivity needs drastic improvement through immediate training and field supervision. (PA Report, Pg. 4-8)",
                        "Area Statement": "As of March 2026, the total planted area is <b>1,280.20 ha</b>. This comprises:<br>&bull; <b>Mature:</b> 1,280.20 ha (100%).<br>&bull; <b>Immature:</b> 0 ha.<br>&bull; <b>Replanting:</b> 24.0 ha of vacant land was planted/rehabilitated in FY2026/27. (PA Report, Pg. 10-11)",
                        "Labour Statement": "Current workforce is 145 workers vs requirement of 146 (Ratio 1:9 ha). However, specific critical shortages exist:<br>&bull; <b>Harvesters:</b> 77 available vs 83 required (ratio 1:17 ha). Shortage of 6. Outturn is very low at 58%.<br>&bull; <b>Spraying:</b> Shortage of 5 workers.<br>&bull; <b>Manuring:</b> Shortage of 7 workers. (PA Report, Pg. 14-15)",
                        "Staff Establishment": "The staff establishment is sufficient with 11 personnel, including 1 Estate Manager (En. Zulazaine Aleakhber), 1 Asst Manager, 1 Cadet, 1 Chief Clerk, 4 Field Conductors, etc. (PA Report, Pg. 16)",
                        "General Charges": "Total General Charges are <b>RM 2,430/ha</b>, which is 1% above the budget of RM 2,415/ha.<br>&bull; <b>Overspending:</b> 'Staff Reimbursement' (+44% due to Manager vehicle repairs), 'Labour Welfare' (+55%), 'Office Equipment Maint.' (+825% due to rentals/repairs).<br>&bull; <b>Budgeting:</b> Frequent over-expenditures reflect poor budgeting; management advised to be more meticulous. (PA Report, Pg. 17-21)",
                        "Upkeep and Cultivation": "&bull; <b>Weeding:</b> Circle spraying is only 51% complete (Delayed). Cost is RM 98/ha. Worker output is extremely low at 1.3 ha/md. Selective spraying is 83% complete but quality is poor with missed woodies.<br>&bull; <b>Manuring:</b> 210 rounds applied out of 235 budgeted. Sub-surface application output is critically low (0.2 ha/md).<br>&bull; <b>Pest & Disease:</b> No significant issues. (PA Report, Pg. 22-39)",
                        "Harvesting and Collection": "YTD Cost is <b>RM 1,681/ha</b>, slightly higher (7%) than the budget of RM 1,573/ha. Cost per tonne spiked to RM 104/MT (22% over budget).<br>&bull; <b>Interval:</b> 20.9 rounds achieved vs 22 budgeted.<br>&bull; <b>Loose Fruits:</b> Unsatisfactory collection observed at palm circles and platforms.<br>&bull; <b>Transport:</b> Internal transport cost is very high due to expensive tractor running costs; outsourced to bin system since March 2026. (PA Report, Pg. 46-49)",
                        "Crop Production": "YTD (11 Months) FFB Production is <b>20,740.88 MT</b>, which is 13% below the budget of 23,764.52 MT.<br>&bull; <b>Yield/Ha:</b> 16.20 MT/ha (11 months).<br>&bull; <b>Extraction:</b> OER at 20.24% vs Budget 20.38%. (PA Report, Pg. 50-51)",
                        "Production Cost": "YTD Ex-Estate Cost of Production is <b>RM 315.09/MT</b>, which is 8% unfavorable compared to the budget of RM 292.04/MT.<br>&bull; <b>General Charges:</b> RM 81.63/MT<br>&bull; <b>Upkeep:</b> RM 117.64/MT<br>&bull; <b>Harvesting:</b> RM 84.72/MT (PA Report, Pg. 52)",
                        "Vehicles Running Cost": "Vehicle costs are high. Tractor repair expenses are significant combined with underutilization. Chief Clerk needs to be more meticulous in preparing vehicle running accounts. (PA Report, Pg. 53-54)",
                        "Capital Expenditure": "Underspent (RM 82,500 actual vs RM 1,017,138 budget) as road gravelling and bridge works are still in progress or unspent. (PA Report, Pg. 55-56)",
                        "Immature": "N/A (100% Mature Estate). (PA Report, Pg. 10)"
                    },
                    "agronomy": {
                        "Executive Summary": "Yield performance for FY25/26 improved by 11% compared to the previous year, averaging 17.42 MT/ha. Harvesting intervals have significantly shortened to 9-16 days following extensive road repairs. However, the FY26/27 manuring program is severely delayed, and field vegetation remains suboptimal in certain blocks due to unresolved woody weed issues. (Source: AR 1/2026, Pg. 7, 16, 37)",
                        "Nutrient Inputs/Progress of Manuring": "The FY25/26 program (Mix B, Kieserite, BRP) was successfully 100% completed. However, the FY26/27 program is currently delayed with only 5% completion as of June 2026. Sub-soil fertilizer applications are acceptable overall, but workers need to ensure consistent hole depth and distance from the palm base to avoid nutrient runoff. (Source: AR 1/2026, Pg. 13-14)",
                        "Agronomic Observation": "<br><b>Harvesting:</b> Intervals are much improved at 9-16 days across P11A, P12A, and P12B. Crop quality is acceptable, though oxidized loose fruits were found in previously neglected areas.<br><b>Weeding:</b> Selective and inter-row spraying is recorded as 100% complete, and circle spraying at 52%. However, blocks B05 and B19 still suffer from overgrown Clidemia hirta and woody weeds.<br><b>Pruning:</b> Recorded at 17% completion due to un-updated payment records; field reality shows acceptable canopies. Under-pruning noted mainly in B19.<br><b>P&D:</b> Pests and diseases are under control. No outbreaks, but routine rat monitoring must be maintained. (Source: AR 1/2026, Pg. 16-33)",
                        "Yield Performance": "Total FY25/26 Yield is 17.42 MT/Ha (+11% vs last year). Field P11A achieved 22.20 MT/ha (+30%), and P12A achieved 19.74 MT/ha (+20%). P12B declined slightly (-3%) to 14.68 MT/ha due to historical delays, completing only 20.1 rounds vs the estate average of 23.4. (Source: AR 1/2026, Pg. 37-38)",
                        "Fertilizer Recommendation": "The FY26/27 fertilizer program has been verified and remains unchanged. Management must urgently expedite the current application cycle to compensate for ongoing delays. (Source: AR 1/2026, Pg. 40)"
                    },
                    "audit": {
                        "Executive Summary": "Overall Rating: Marginally Deficient. While many key controls are applied, applications lack consistency. Management requires timely corrective action. (Source: Audit Report Nov 2025, Pg. 1)",
                        "Stores and Purchases": "<b>Finding:</b> Unutilized aging tyre stock (RM 2,735) and lack of recording/marking for empty fertilizer bags were noted. Risk of wastage and pilferage.<br><b>Action:</b> Rectified. Landini tractors fitted with the tyres; FIFO and marking system implemented for fertilizer bags. (Source: Audit Report Nov 2025, Pg. 2-6)",
                        "Oil Palm Operations": "<b>Finding:</b> Inconsistent harvesting productivity (<1000 bunches/month for some) and high absenteeism. FFB evacuation records in Quarto delayed up to 10 days due to late Bunch Count Chit scanning.<br><b>Action:</b> New trainee clerk hired to ensure timely scanning. (Source: Audit Report Nov 2025, Pg. 6-15)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Fertilizer Bag Tracking</p><p class='text-sm text-gray-600'><b>Audit Finding:</b> Empty fertilizer bags must be returned, counted, and recorded in the Empty Fertilizer Bags Record. Balance bags must be retained for 2 months for auditing. (Audit Report Nov 2025, Pg. 5)</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Intervals</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-02:</b> Harvesting intervals must be maintained below 15 days. Regular maintenance of field roads is critical to ensure timely evacuation. (Agro 1/2026)</p></div> <div class='policy-item'><p class='font-semibold'>Manuring Schedule</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> Delays >15 days must have a mitigation plan. Current FY26/27 delays require immediate acceleration in application rounds. (Agro 1/2026)</p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') || metric.title.includes('Upkeep') ? 'bg-yellow-50 text-yellow-800' : 'bg-red-50 text-red-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                const productionChartHTML = (estate.chartData.production.labels && estate.chartData.production.labels.length > 0) || (estate.chartData.production.rainfall && estate.chartData.production.rainfall.length > 0) ?
                    `<div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div>` :
                    `<div class="chart-container flex items-center justify-center bg-gray-50 rounded-lg p-4"><p class="text-gray-500 text-center">Chart data not available.</p></div>`;

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Rainfall (2025/2026)</h3>${productionChartHTML}<p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3>
                            <ul id="observations-list" class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul>
                        </div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-gray-600 text-white px-6 py-3 rounded-lg hover:bg-gray-700 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                             <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-red-800 text-white p-3 rounded-md hover:bg-red-700 transition">Internal Audit Report Details (Nov 2025)</button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                             <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate(estate) {
                const prodCanvasId = `prodChart-${estate.id}`;
                const ageCanvasId = `ageChart-${estate.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx && estate.chartData.production.rainfall) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estate.chartData.production.labels,
                            datasets: [
                                { label: 'Rainfall (mm)', data: estate.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { 
                                x: { grid: { display: false } }, 
                                'y-rainfall': { type: 'linear', position: 'left', title: { display: true, text: 'Rainfall (mm)' } } 
                            } 
                        }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx && estate.chartData.ageProfile.data) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estate.chartData.ageProfile.labels,
                            datasets: [{ data: estate.chartData.ageProfile.data, backgroundColor: ['#047857', '#fbbf24'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: false }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns(estate) {
                const agronomyDiv = document.getElementById(`${estate.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estate.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estate.id}-pinfosys`);
                const auditDiv = document.getElementById(`${estate.id}-audit`);

                if (agronomyDiv && estate.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estate.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 mt-1 mb-3">${content}</p>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = '<p class="text-sm text-gray-600">Not Available</p>';
                }

                if (plantationDiv && estate.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estate.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 mt-1 mb-3">${content}</p>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = '<p class="text-sm text-gray-600">Not Available</p>';
                }
                
                if (pinfosysDiv && estate.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600 mt-1 mb-3">Not Available</p>`;
                }

                if (auditDiv && estate.reports.audit) {
                    auditDiv.innerHTML = Object.entries(estate.reports.audit).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 mt-1 mb-3">${content}</p>`).join('');
                } else if (auditDiv) {
                    auditDiv.innerHTML = '<p class="text-sm text-gray-600">Not Available</p>';
                }
            }

            function attachEventListeners(estate) {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estate));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
