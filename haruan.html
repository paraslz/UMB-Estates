<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Haruan Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                Haruan Estate Report
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "haruan",
                "name": "Haruan Estate (Inti)",
                "reportInfo": "Data based on PA Report (Visit Date: Feb 2026), Audit Report (Visit Date: May 2025), & Agronomy Report (Visit Date: May 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,599.96 ha",
                            "Mature: 1,470.18 ha",
                            "Immature: 129.78 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "12.90 / 13.58 MT",
                        "note": "YTD Dec 2025 (Source: PAR)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 393 / RM 508",
                        "note": "23% below budget (YTD Dec 2025)"
                    },
                    "labour": {
                        "title": "Labour Status",
                        "value": "1:8 ha",
                        "note": "307 workers (Adequate)"
                    },
                     "upkeep": {
                        "title": "Upkeep Status",
                        "value": "High Road Cost",
                        "note": "RM 976/ha (338% over budget)"
                    }
                },
                "keyMetrics": [
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Harvester Ratio", "value": "1:17 ha (Adequate)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "P&D Status", "value": "Satisfactory (No major issues)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>`, "label": "Extraction Rate", "value": "20.19% CPO (Actual)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Road Maintenance", "value": "338% Over Budget" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>`, "label": "Harvest Interval", "value": "<10 Days (Mostly)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 17h2.457a.89.89 0 00.513-.158L22 15.143V5.143l-1.5-.714a1.429 1.429 0 00-1.429 0L17 5.143V17zm0 0l-5-2V5l5 2v10zm-5 0l-5-2V5l5 2v10zM7 17H4.543a.89.89 0 01-.513-.158L2 15.143V5.143l1.5-.714a1.429 1.429 0 011.429 0L7 5.143V17z' /></svg>`, "label": "Infield Loading", "value": "100% Over Budget" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "rainfall": [129, 128, 47, 217, 169, 269, 376, 303],
                        "note": "*Rainfall 2025 profile. YTD Dec 2025 production achieved 64% of annual budget."
                    },
                    "ageProfile": {
                        "labels": ["Prime Mature (2012-2017)", "Young Mature (2018-2020)", "Immature (2020-2025)"],
                        "data": [1271.71, 198.47, 129.78],
                        "title": "Haruan Estate - Palm Age Distribution (Dec 2025)",
                        "note": "*Source: Planting Advisory Report 1/2026, Pg. 11."
                    }
                },
                "observations": [
                    "<b>Excessive Road Maintenance Costs (PA):</b> Expenditure on roads and bridges (RM 976/ha) is 338% above the annual budget due to extensive raising and hardening of 21km of track. <span class='observation-ref'>(PAR Pg. 23, 42)</span>",
                    "<b>Suboptimal Palm Condition in Waterlogged Areas (Agronomy):</b> Persistently high water tables in P12, P13, and P16 are causing stunted growth and 'orange spotting' (Potassium deficiency) which requires immediate mitigation. <span class='observation-ref'>(AR 1/2026 Pg. 37, 42)</span>",
                    "<b>Harvesting Delays & Loose Fruits (Agronomy):</b> Harvesting intervals extended beyond 15 days in P13 (HF35) and P15 (HG38), leading to over-ripe bunches and uncollected, oxidized loose fruits. <span class='observation-ref'>(AR 1/2026 Pg. 26, 28)</span>",
                    "<b>Compost Application Quality (Agronomy):</b> While the fertilizer program is 100% complete, compost application suffers from incomplete coverage, uneven distribution, and excessive roadside disposal. <span class='observation-ref'>(AR 1/2026 Pg. 21, 23)</span>",
                    "<b>FFB Production Variance (PA):</b> YTD production (18,965 MT) is 5% below the seasonal budget, largely attributed to moderate crop trends and historical rehabilitation areas still stabilizing. <span class='observation-ref'>(PAR Pg. 51)</span>",
                    "<b>Vehicle Underutilization (PA):</b> 11 out of 12 Startrac mini tractors show running costs exceeding budget primarily due to low usage (underutilization) and high repair expenses. <span class='observation-ref'>(PAR Pg. 54-56)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Estate performance is improving and acceptable. YTD production reached 18,965 MT (5% below seasonal budget). Cost of Production (Ex-Estate) at RM 393.09/tonne is 23% below budget. Management must focus on eradicating resilient weeds (Stenochlaena), enhancing worker productivity, and completing road lateriting to reduce internal transport. <span class='observation-ref'>(Source: PAR, Pg. 4, 8, 53)</span>",
                        "Area Statement": "As of December 2025, total planted area is 1,599.96 ha. This comprises:<br><ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li><b>Mature:</b> 1,470.18 ha (largely prime age, 79.48% planted 2012-2017).</li><li><b>Immature:</b> 129.78 ha (increased due to new rehabilitation zones).</li></ul><span class='observation-ref'>(Source: PAR, Pg. 10-11)</span>",
                        "Labour Statement": "Current workforce of 307 workers vs requirement gives an adequate ratio of 1 worker to 8 ha.<br><ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li><b>Harvesters:</b> 143 workers (Ratio 1:17 ha). Sufficient for normal cropping.</li><li><b>Sprayers:</b> Adequate at 1:68 ha.</li></ul><span class='observation-ref'>(Source: PAR, Pg. 17-18)</span>",
                        "Staff Establishment": "Staff complement is adequate with 1 Estate Manager (Bpk Lalu Suryandi, joined Sept 2025), 1 KTU, and 4 Assistant Managers. No Field Supervisor currently on site. <span class='observation-ref'>(Source: PAR, Pg. 16)</span>",
                        "General Charges": "Cost of RM 1,038.61/ha is 3% higher than budget.<br><ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li><b>Overspending:</b> Staff Bonus (+160%), ISPO Expenses (+144%), and General Repair/Maintenance of buildings (+65%).</li></ul><span class='observation-ref'>(Source: PAR, Pg. 19-21)</span>",
                        "Upkeep and Cultivation": "<ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li><b>Weeding:</b> Circle spraying rounds at 1.9 (64% complete). Selective weeding at 2.3 rounds.</li><li><b>Manuring:</b> 106% of annual tonnage applied (3,514 MT) due to carry-over stocks.</li><li><b>Roads:</b> Expenditure at 338% of budget for raising/compacting roads.</li></ul><span class='observation-ref'>(Source: PAR, Pg. 22-26, 42)</span>",
                        "Harvesting and Collection": "Intervals maintained <10 days. Harvesting & Collection cost (RM 68.66/MT) is 25% over budget.<br><ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li><b>Infield Loading:</b> 100% over budget, heavily driving internal transport costs.</li></ul><span class='observation-ref'>(Source: PAR, Pg. 48-50)</span>",
                        "Crop Production": "YTD (8 Months) FFB production is 18,965.64 MT (5% below seasonal budget).<br><ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li><b>Yield/Ha:</b> 12.90 MT.</li><li><b>Extraction:</b> CPO extraction rate achieved 20.19%.</li></ul><span class='observation-ref'>(Source: PAR, Pg. 51)</span>",
                        "Production Cost": "Total Cost (Ex-Estate) is RM 393.09/tonne FFB, which is 15% favorable compared to the budget of RM 508.38. Harvesting expenses remain low despite high upkeep. <span class='observation-ref'>(Source: PAR, Pg. 52-53)</span>",
                        "Vehicles Running Cost": "Startrac mini tractors (12 units) show high running costs per hour. HINO lorries used for internal transport exceeded budget by 28%-60%. Backhoe loader costs are 296% over budget. <span class='observation-ref'>(Source: PAR, Pg. 54-56)</span>",
                        "Capital Expenditure": "Acceptable expenditure noted. Main road works are funded through revenue upkeep headers. <span class='observation-ref'>(Source: PAR, Pg. 8)</span>",
                        "Immature": "Total 129.78 ha.<br><ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li>Palms planted in 2025 (F36/F37) suffered flood damage and require immediate supplying.</li><li>2020 plantings (51.87 ha) scheduled for maturity declaration in May 2026.</li></ul><span class='observation-ref'>(Source: PAR, Pg. 57-58)</span>"
                    },
                    "agronomy": {
                        "Executive Summary": "FY2025/2026 fertilizer program was successfully completed with improved overall progress. However, slight harvesting delays caused overripe bunches, and elevated water tables require immediate mitigation. Yield performance has improved despite a slight dip in the estate average MT/ha. <span class='observation-ref'>(Source: AR 1/2026, Pg. 4-6)</span>",
                        "Nutrient Inputs/Progress of Manuring": "Manuring for FY2025/2026 was fully completed (120% overall application) utilizing carry-over stocks.<br><ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li><b>Over-application:</b> HGFB (212%), MOP (134%), and ZA (101%) exceeded targets.</li><li><b>Compost:</b> Applied at 20mt/ha but suffered from incomplete coverage, uneven distribution, and excessive roadside disposal.</li></ul><span class='observation-ref'>(Source: AR 1/2026, Pg. 15-21)</span>",
                        "Agronomic Observation": "Overall pruning is acceptable (>80% completion), though under-pruned conditions persist in P12A1.<br><ul class='list-disc pl-5 mt-1 space-y-1 text-gray-600'><li><b>Harvesting:</b> Intervals extended >15 days in P13 and P15, resulting in over-ripe bunches and oxidized loose fruits.</li><li><b>Water Management:</b> High water tables in P12, P13, and P16 are causing stunted growth and 'orange spotting' (K deficiency).</li><li><b>Pests:</b> Rat damage and Ganoderma incidence remain negligible.</li></ul><span class='observation-ref'>(Source: AR 1/2026, Pg. 26-37, 54)</span>",
                        "Yield Performance": "Average yield declined slightly by 4.9% to 20.20 MT/ha in FY2025/2026. However, P12 remains highly productive (>24 MT/ha), and young mature blocks (P18, P19, P20) showed notable yield increases due to improved crop recovery and inputs. <span class='observation-ref'>(Source: AR 1/2026, Pg. 68)</span>",
                        "Fertilizer Recommendation": "FY2026/2027 program includes Mixture B, RP, and Compound. GML is recommended for soil pH management. For new supply palms, utilize 600g of CRF + 500g RP per planting hole. <span class='observation-ref'>(Source: AR 1/2026, Pg. 64, 75)</span>"
                    },
                    "audit": {
                        "Overall Rating": "Marginally Deficient. Key controls lacked consistency. <span class='observation-ref'>(Source: Audit Rpt, Pg. 2)</span>",
                        "High Manual Slashing Cost": "Field maintenance costs were excessively high due to uncontrolled man-day allocation for manual slashing. <span class='observation-ref'>(Source: Audit Rpt, Pg. 2-7)</span>",
                        "Wages Overpayment": "IDR 4.7M overpayment identified due to system bug and fictitious wage claims. <span class='observation-ref'>(Source: Audit Rpt, Pg. 10-14)</span>",
                        "Uncollected Harvested Bunches": "Field visit found 409 bunches left uncollected for up to 29 days. <span class='observation-ref'>(Source: Audit Rpt, Pg. 15-18)</span>"
                    }
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Weeding Practice</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-CHEM-02:</b> Utilize low-volume nozzle pumps with pure Glyphosate for circular spraying to enhance productivity. (PAR Pg. 5)</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-03:</b> The use of wheelbarrows is proven to enhance fertilizer distribution productivity. (PAR Pg. 5)</p></div> <div class='policy-item'><p class='font-semibold'>Pruning & Harvesting</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-02:</b> Harvesting intervals should be maintained between 10-15 days to minimize over-ripe bunches. (PAR Pg. 65)</p><p class='text-sm text-gray-600'><b>Policy Ref: PRUNE-STD-01:</b> Over-pruning is to be avoided. In young mature palms, retain at least 2 to 3 fronds below the lowest bunch. (PAR Pg. 55)</p></div>"
            };

            const container = document.getElementById('selected-estate-container');
            let chartInstances = {};

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-purple-50 text-purple-800' : 'bg-red-50 text-red-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Rainfall Profile (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold">Audited Report Details</button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [{ label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6' }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, y: { title: { display: true, text: 'Rainfall (mm)' } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#047857', '#a7f3d0', '#fde047'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                Object.entries(estateData.reports).forEach(([type, report]) => {
                    const div = document.getElementById(`${estateData.id}-${type}`);
                    if (div && report) {
                        div.innerHTML = Object.entries(report).map(([section, content]) => 
                            `<div class='mb-6'>
                                <h4 class="text-lg font-bold text-gray-900 mb-1">${section}:</h4>
                                <div class="text-sm text-gray-700 leading-relaxed">${content}</div>
                            </div>`
                        ).join('');
                    }
                });
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
