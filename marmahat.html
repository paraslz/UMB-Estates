<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Marmahat Estate - Plantation, Agronomy & Audit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                <!-- Title will be populated by JS -->
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "marmahat",
                "name": "Marmahat Estate",
                "reportInfo": "Data based on Planting Advisory Report (Visit: 29-30 April 2026), Agronomy Report (Visit: 28 January 2026) & Internal Audit Report (October 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,434.38 ha",
                            "Mature: 831.67 ha",
                            "Immature: 602.71 ha",
                            "Replanting: None Planned for FY25/26"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "21.07 / 17.65 MT",
                        "note": "19% above budget (PAR Pg. 43)"
                    },
                    "cost": {
                        "title": "Cost of Production (Ex-Estate)",
                        "value": "RM 381.59 / RM 379.98",
                        "note": "Actual vs Budget (+0.4% var, PAR Pg. 44)"
                    },
                    "ganoderma": {
                        "title": "Ganoderma Infection",
                        "value": "59% in P07A34",
                        "note": "Critical infection detected (AR Pg. 31)"
                    },
                     "weeding": {
                        "title": "Weeding Upkeep Cost",
                        "value": "RM 400.62 / RM 230.02",
                        "note": "Actual vs Budget (+74%, PAR Pg. 17)"
                    }
                },
                "keyMetrics": [
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "P&D Status", "value": "Critical Ganoderma" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "Ex-Estate Cost", "value": "RM 381.59/MT (PAR Pg. 44)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>`, "label": "Circle Spraying", "value": "Delayed rounds (PAR Pg. 4)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z' /></svg>`, "label": "Labour Ratio", "value": "1:11 ha (PAR Pg. 13)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' /></svg>`, "label": "Crop Production", "value": "116% vs Budget (PAR Pg. 43)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-orange-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "Fertilizer Store", "value": "Caked Bags (AR Pg. 15)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [1000, 1050, 1100, 1017, 1000, 1150, 1200, 1300], 
                        "rainfall": [102, 166, 90, 165, 222, 95, 147, 254], 
                        "note": "*FFB/Rainfall based on AR Appendix 3, Pg. 54 & PAR (April 2026)."
                    },
                    "ageProfile": {
                        "labels": ["Mature Area (831.67 Ha)", "Immature Area (602.71 Ha)"],
                        "data": [831.67, 602.71],
                        "title": "Marmahat Estate - Palm Age Distribution (Ha)",
                        "note": "*Source: PAR (April 2026), Pg. 9."
                    }
                },
                "observations": [
                    "<b>Severe Ganoderma Infestation:</b> P07A34 shows a critical infection level of 59% (146 fruiting bodies, 61 fallen palms, 426 vacant points). Mounding is underway but deboling activities were notably absent during the visit. In old palm areas nearing replanting, base mounding and deboling are not necessary. <span class='observation-ref'>(AR Pg. 31-32; PAR Pg. 5, Pg. 31)</span>",
                    "<b>Delayed and Underbudget Upkeep & Spraying:</b> Actual weeding cost was RM400.62/ha (74% over budget) due to aggressive weed removal, circle raking, restacking in flood zones, and low worker productivity. Circle spraying is delayed (completed 1.70 rounds, 51% of scheduled 3.4 rounds) due to heavy rainfall and severe flooding in Feb 2026, leaving some fields like MM22A and MM1999F unsprayed for over 5 months. <span class='observation-ref'>(PAR Pg. 4, Pg. 18, Pg. 25; AR Pg. 25)</span>",
                    "<b>Fertilizer Storage Quality (Critical):</b> The Kamrah Division fertilizer store continues to suffer from wet ground conditions, causing Mixture B bags to harden/cake (off-spec) and compromising nutrient availability. This moisture issue was highlighted in previous reports but remains unresolved. <span class='observation-ref'>(AR Pg. 14-15; PAR Pg. 5, Pg. 28)</span>",
                    "<b>Low Harvester Productivity & Manual Collection:</b> Harvesters are averaging below 1.50 MT/day. Infield collection is performed manually with wheelbarrows. The main obstacle to mechanisation is long repair lead times for machinery. Transitioning to mechanised infield collection (such as Electric Badang) is recommended for young mature areas to improve daily outputs. <span class='observation-ref'>(Audit Pg. 3-4; PAR Pg. 4, Pg. 6, Pg. 39)</span>",
                    "<b>High Vehicle Running Costs:</b> Running costs for most estate vehicles (such as Ford Ranger, Hilux, dump trucks, and Landini tractors) are substantially above budget due to underutilisation and high repair expenses. For example, excavator costs are RM38.19/hr vs RM27.25/hr budgeted. The planting advisor recommends outsourcing transport and drainage works to minimize the estate fleet. <span class='observation-ref'>(PAR Pg. 7, Pg. 45-46)</span>",
                    "<b>Noxious Weed Control:</b> Noxious weeds (Clidemia, Melastoma), VOPs, and Stenochlaena broadleaf weeds were observed in inter-rows. Legume cover crops (Mucuna) are encroaching palm circles in MM22A07. Circle weeding is incomplete in MM1999F (11%) and MM2007A (70%). <span class='observation-ref'>(AR Pg. 25, 37; PAR Pg. 22-24)</span>"
                ],
                "reports": {
                    "audit": {
                        "Executive Summary": "Overall internal control systems are rated as Satisfactory. However, specific weaknesses were identified in harvester productivity, harvesting intervals, and field maintenance recording which require immediate management attention. (Source: Audit Pg. 1-2)",
                        "Oil Palm Productivity": "While FFB production shows a surplus against budget, individual harvester productivity is low, averaging below 1.50 MT/day. This led to harvesting intervals exceeding 20 days in July-Sep 2025. Discrepancies were also noted in Quarto Connects usage, with 23% of bunches in July not scanned. (Source: Audit Pg. 2-5)",
                        "Field Maintenance (Premix)": "Inconsistencies were found in premix usage records. Actual gallons paid often exceeded calculated requirements (e.g., usage of 4.9-6.0 Gal/Ha vs expected 3.3-3.5 Gal/Ha). (Source: Audit Pg. 9-14)"
                    },
                    "agronomy": {
                        "Executive Summary": "The visit on 28th Jan 2026 revealed that yield performance for FY25/26 (YTD Dec 2025) is 29% higher than the previous year. However, Ganoderma infection in P07A34 has reached a critical 59%. Manuring progress for immature plantings is behind schedule, and wet conditions in the Kamrah Division fertilizer store persist. (Source: AR Pg. 4, 31, 43)",
                        "Nutrient Inputs/Progress of Manuring": "Mature area manuring is 100% complete. Immature programs for Mix B and Compound fertilizers are 65% complete, with pending blocks originally scheduled for Nov 2025. Fertilizer hardening was observed in Mix B due to storage moisture. (Source: AR Pg. 14-15)",
                        "Agronomic Observation": "<b>Mature Areas:</b> Harvesting intervals improved to 12-16 days by Jan 2026. Canopy management is acceptable, but frond stacking in 99C and 01A is still substandard. VOP presence in 99F remains a concern.<br><b>Immature Areas:</b> Oryctes damage detected in P23C. Palms in P22A04 are recovering from waterlogging. Basal pruning in P22A is incomplete. (Source: AR Pg. 16, 23, 34-35)",
                        "Yield Performance": "As of Dec 2025, yield is 15.04 MT/ha (vs 10.72 MT/ha last year). Block 22A shows promising first-year results. Yield depression noted in 01A-34 and 99F due to Ganoderma. (Source: AR Pg. 43-45)",
                        "Fertilizer Recommendation": "Programs for FY26/27 have been revised. Recommended applications include NK 1, NK 2, and Mix A for mature areas. Sub-soil application recommended for MM07A34 (8.00 kg/palm). (Source: AR Pg. 51-53)"
                    },
                    "plantation": {
                        "Executive Summary": "Generally, the estate's performance during the reviewed period is satisfactory. FFB crop production was 13,502.009 tons (116% of budget) and mature yield per ha was 21.07 MT (119% of budget). The actual total expenditure on General Charges was 2% below budget. However, worker productivity still requires improvement, and outsourcing programs are ongoing. (Source: PAR Pg. 4, Pg. 7, Pg. 55-57)",
                        "Area Statement": "As of April 2026, the total planted area is 1,434.38 ha (92.36% of total estate title area of 1,552.96 ha). This comprises:<br>• <b>Mature:</b> 831.67 ha (57.98%). This increased due to 313.43 ha of Field 2022A being declared mature (PAR Pg. 9).<br>• <b>Immature:</b> 602.71 ha (42.02%), of which 108.29 ha of Field 2022B is scheduled to mature in early FY26/27 (PAR Pg. 9).<br>• <b>Replanting:</b> Postponed for FY25/26 because tall palms are still harvestable and yield is acceptable with elevated CPO prices (PAR Pg. 4, Pg. 11).",
                        "Labour Statement": "Current checkroll workforce is 125 workers, which is 9 workers more than the last visit. The worker-to-land ratio is 1:11 ha, which is adequate. (Source: PAR Pg. 13)<br>• <b>Harvesters:</b> 58 total (ratio of 1 harvester to 14 ha of mature area). Adequate as workers are also deployed for scout harvesting in Field 2022B (PAR Pg. 14).<br>• <b>Maintenance/Spraying:</b> 35 maintenance workers and 2 mistblower operators are adequate for weeding and manuring (PAR Pg. 14).<br>• <b>Productivity:</b> Management needs to introduce effective measures to enhance worker productivity, such as mechanisation for harvesting, weeding, and manuring (PAR Pg. 14).",
                        "Staff Establishment": "The staff establishment is adequate with Mr Muris Kimjin (Manager, age 40) leading a team of 1 Senior Assistant Manager, 2 Assistant Managers, 3 Field Conductors, and 2 Clerks. (Source: PAR Pg. 12)<br>• <b>Vacancies:</b> Vacant positions exist for Store Clerk, General Clerk, and 1 Field Conductor following the resignation of Field Conductor En Muhammad Zulfaa Bin Begil in December 2025 (PAR Pg. 12).",
                        "General Charges": "Total General Charges YTD are RM1,688.34/ha, which is 2% below the budgeted amount of RM1,715.28/ha. (Source: PAR Pg. 15)<br>• <b>Overspending (>10%):</b> Labour EPF (+61% due to foreign and local worker EPF), Subscription Fee (+36% due to MPOA/MEF/MEOA), Staff Reimbursement (+34% due to higher claims), Weighbridge Expenses (+56% due to weighbridge replacement and repairs), and Transport & Travelling (+10%) (PAR Pg. 15-16).<br>• <b>Savings:</b> Management & Supervision (-3%) and Office & Related Expenses (-15%) (PAR Pg. 15).",
                        "Upkeep & Cultivation": "Actual upkeep expenditure was RM3,054.08/ha vs budgeted RM2,542.82/ha (+20% overspend). (Source: PAR Pg. 17)<br>• <b>Weeding:</b> Cost was RM400.62/ha (74% over budget) due to aggressive weed removal and circle raking. Circle spraying is 51% complete (1.70 rounds, delayed by heavy rainfall/flood in Feb 2026). Selective spraying (inter-row blanket spraying) is 94% complete (0.94 rounds) (PAR Pg. 18, 22).<br>• <b>Manuring:</b> Mature area manuring is 100% complete YTD (537.75 tons applied). Application cost is 8% above budget at RM1,468.44/ha (PAR Pg. 28-29).<br>• <b>Pest & Disease:</b> YTD expenditure is RM57.80/ha (35% over budget) due to Storm baiting on 1,434.38 ha (PAR Pg. 30-31).<br>• <b>Drains:</b> Cost is RM40.37/ha (83% over budget). Desilting was completed over 5,398m (90% of budget) and 5,986m (256% of budget) (PAR Pg. 37).<br>• <b>Roads & Bridges:</b> Cost is RM712.28/ha (10% over budget) due to large road maintenance requirements crossing private estates; 42,704m of road grading/compacting was completed (PAR Pg. 34-35).<br>• <b>Soil & Water Conservation:</b> Cost is RM164.41/ha (123% over budget) for perimeter bund and water gate repairs (PAR Pg. 38).<br>• <b>Pruning:</b> Cost is RM156.72/ha (24% over budget); completed on 131,582 palms (1.86 rounds, 75% of budget) (PAR Pg. 32-33).",
                        "Harvesting and Collection": "YTD Cost is RM109.00/tonne FFB (excluding transport), which is 31% higher than the budgeted RM83.00/t. Including external transport, the cost is RM155.54/tonne (12% over budget). (Source: PAR Pg. 41-42)<br>• <b>Intervals:</b> Achieved within 12 to 18 days throughout February (2.0 rounds achieved) (PAR Pg. 40).<br>• <b>Infield Loading & Collection:</b> Wheelbarrow system is used for cutter-and-carrier. High internal transport running costs and unbudgeted ramp maintenance contributed to overspending (PAR Pg. 41). Mechanisation with Electric Badang is highly recommended for young mature fields (PAR Pg. 39).<br>• <b>Productivity:</b> Tall palm harvesters achieved 1.52 to 1.86 tons/man-day; young mature Field 2022A averages 0.8 tons/man-day (PAR Pg. 41).",
                        "Crop Production": "YTD FFB crop production is 13,502.009 tons, which is 116% of the budgeted 11,661 tons. (Source: PAR Pg. 43)<br>• <b>Yield/ha:</b> Actual mature yield is 21.07 MT/ha vs budgeted 17.65 MT/ha (+19% above budget).<br>• <b>Extraction:</b> OER is 19.44% vs last year's 18.22%. Average bunch weight is 7.24 kg. FFB crop recovery was maximized and delivered to Paitan Palm Oil Mill (PAR Pg. 42-43).",
                        "Production Cost": "YTD ex-estate production cost is RM381.59 per ton of FFB, in line with the budgeted RM379.98 per ton (+0.4% variance). This is highly acceptable due to the FFB crop surplus (+116% against budget). General Charges contributed RM81.09/t, Upkeep & Cultivation RM144.97/t, and Harvesting & Collection RM155.54/t. (Source: PAR Pg. 44)",
                        "Vehicles Running Cost": "Vehicle running costs are generally high due to underutilisation and high repair costs. (Source: PAR Pg. 45)<br>• <b>Tractors & Trucks:</b> Fuso dump truck (SS9158Y) running cost was RM7.12/km (budget RM2.59/km); Landini DT85 (SS1486V) cost RM28.92/hr (budget RM20.62/hr); Kinta SB90 renting (JVT2489) cost RM34.47/hr (budget RM31.81/hr).<br>• <b>Excavator & Backhoe:</b> Excavator (SAB2051K) cost RM38.19/hr (budget RM27.25/hr) (PAR Pg. 45).<br>• <b>Recommendation:</b> Outsource internal transport, harvesting/collection, roadworks, and drainage to minimize vehicle numbers and damage burdens (PAR Pg. 7, Pg. 46).",
                        "Capital Expenditure": "N/A. There was no new capital expenditure or new drain construction since the mature and immature drainage is adequate. Road and drainage upgrades in immature areas were carried out under operational budgets. (Source: PAR Pg. 34, Pg. 37)",
                        "Immature": "The estate manages 602.71 ha of immature plantings. (Source: PAR Pg. 9)<br>• <b>Field 2022B (108.29 ha):</b> Circle and path spraying completed 5.30 rounds (66% of budget). Selective spraying completed 1.25 rounds (122% of budget). Scout harvesting is in progress, and the field will mature in early FY26/27. Grand total cost from start is RM20,668.93/ha (PAR Pg. 47-49).<br>• <b>Field 2023C (494.42 ha in Sairin Division):</b> Planting was completed in December 2025 with 74,777 palms (151 palms/ha). Weeding completed 6.14 rounds of circle spraying (56% of budget) and 1.29 rounds of selective spraying (129% of budget). Oryctes beetles are successfully controlled. Grand total cost from start is RM13,899.78/ha (PAR Pg. 50-53)."
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Management</p><p class='text-sm text-gray-600'><b>Policy Ref: AGRO-GANO-01:</b> Mounding should be paired with deboling to prevent disease spread. Infection levels exceeding 50% in a block require aggressive sanitation.</p></div> <div class='policy-item'><p class='font-semibold'>Fertilizer Storage</p><p class='text-sm text-gray-600'><b>Policy Ref: STORE-FERT-01:</b> Stores must be dry. Humidity/wetness causing caking compromises nutrient availability and worker productivity.</p></div> <div class='policy-item'><p class='font-semibold'>Weeding (Inter-row)</p><p class='text-sm text-gray-600'><b>Policy Ref: AGRO-WEED-03:</b> Selective spraying must target woody weeds. Mucuna must be kept off palm circles to prevent light competition.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Intervals</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-01:</b> Target interval is <15 days. Intervals >20 days result in overripe fruit and quality loss.</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                document.getElementById('header-title').innerText = `${estateData.name} Analytics Portal`;
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">FFB Production vs Rainfall</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div></div>
                            <div><h3 class="text-xl font-semibold mb-2">Area Distribution (Ha)</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Internal Audit Report Details</button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                
                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { 'y-ffb': { position: 'left' }, 'y-rainfall': { position: 'right' } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#059669', '#10b981'] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            }

            function populateInternalDropdowns() {
                const map = { "audit": "audit", "agronomy": "agronomy", "plantation": "plantation", "pinfosys": "pinfosys" };
                Object.entries(map).forEach(([key, divSuffix]) => {
                    const div = document.getElementById(`${estateData.id}-${divSuffix}`);
                    if (div && estateData.reports[key] !== "Not Available") {
                        div.innerHTML = Object.entries(estateData.reports[key]).map(([s, c]) => `<h4 class="font-bold mt-3 text-gray-800">${s}:</h4><p class="text-sm text-gray-600">${c}</p>`).join('');
                    } else if (div) {
                        div.innerHTML = `<p class="text-sm text-gray-400">Not Available</p>`;
                    }
                });
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const content = document.getElementById(e.currentTarget.dataset.dropdownId);
                        content.classList.toggle('active');
                        e.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => {
                    document.getElementById('modalContent').innerHTML = estateData.policy;
                    document.getElementById('policyModal').classList.add('active');
                });
            }

            renderEstate();
        });

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
