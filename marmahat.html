<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Marmahat Estate - Plantation, Agronomy & Audit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                <!-- Title will be populated by JS -->
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300 font-semibold">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

                    "<b>Severe Ganoderma Infestation:</b> P07A34 shows a critical infection level of 59% (146 fruiting bodies, 61 fallen palms, 426 vacant points). Mounding is underway but deboling activities were notably absent during the visit. <span class='observation-ref'>(AR Pg. 31-32; PAR Pg. 5, Pg. 31)</span>",

                    "<b>Improper Chemical Premixing & Contamination Risk:</b> The internal audit highlighted a critical safety and environmental issue at Kamrah Division. Chemical premixing activities were being conducted adjacent to a water pond used for domestic washing/bathing due to a broken water pump. This practice risks severe contamination. <span class='observation-ref'>(IAD Report 17/26, Pg. 2-5)</span>",

                "reports": {

                        "General Services (Chemical Premixing)": "A severe contamination risk was identified at Kamrah Division. Chemical premixing activities were conducted near a water pond used for domestic washing/bathing due to a broken water pump. Management has been instructed to immediately relocate premixing to a controlled site away from water sources. (IAD Report 17/26, Pg. 2-5)",
                        "Field Maintenance (Selective Weeding)": "Significant overspending in selective weeding was traced to RM 77,065 in repetitive decreeping charges. Furthermore, decreeping and circle spraying were inefficiently conducted on the same day, reducing herbicide effectiveness. Support documentation (Selective Weeding Record Book) was also incomplete and lacked independent verification. (IAD Report 17/26, Pg. 6-11)",
                        "Payroll and Personnel (Harvester Productivity)": "Harvesters achieved low productivity on Sunday/Holiday work, with up to 79% producing less than 1 MT per day, yet still receiving double-rate pay based solely on attendance. A new policy now requires a minimum of 1 MT/day average to qualify for offer days. (IAD Report 17/26, Pg. 12-14)"
                    },
                    "agronomy": {
                        "Executive Summary": "The visit on 28th Jan 2026 revealed that yield performance for FY25/26 (YTD Dec 2025) is 29% higher than the previous year. However, Ganoderma infection in P07A34 has reached a critical 59%. Manuring progress for immature plantings is behind schedule, and wet conditions in the Kamrah Division fertilizer store persist. (Source: AR Pg. 4, 31, 43)",
                        "Nutrient Inputs/Progress of Manuring": "Mature area manuring is 100% complete. Immature programs for Mix B and Compound fertilizers are 65% complete, with pending blocks originally scheduled for Nov 2025. Fertilizer hardening was observed in Mix B due to storage moisture. (Source: AR Pg. 14-15)",
                        "Agronomic Observation": "<b>Mature Areas:</b> Harvesting intervals improved to 12-16 days by Jan 2026. Canopy management is acceptable, but frond stacking in 99C and 01A is still substandard. VOP presence in 99F remains a concern.<br><b>Immature Areas:</b> Oryctes damage detected in P23C. Palms in P22A04 are recovering from waterlogging. Basal pruning in P22A is incomplete. (Source: AR Pg. 16, 23, 34-35)",
                        "Yield Performance": "As of Dec 2025, yield is 15.04 MT/ha (vs 10.72 MT/ha last year). Block 22A shows promising first-year results. Yield depression noted in 01A-34 and 99F due to Ganoderma. (Source: AR Pg. 43-45)",

                        "Executive Summary": "Generally, the estate's performance during the reviewed period is satisfactory. FFB crop production was 13,502.009 tons (116% of budget) and mature yield per ha was 21.07 MT (119% of budget). The actual total expenditure on General Charges was 2% below budget. However, worker productivity still requires improvement, and outsourcing programs are ongoing. (Source: PAR Pg. 4, Pg. 7, Pg. 55-57)",

                        "General Charges": "Total General Charges YTD are RM1,688.34/ha, which is 2% below the budgeted amount of RM1,715.28/ha. (Source: PAR Pg. 15)<br>• <b>Overspending (>10%):</b> Labour EPF (+61% due to foreign and local worker EPF), Subscription Fee (+36% due to MPOA/MEF/MEOA), Staff Reimbursement (+34% due to higher claims), Weighbridge Expenses (+56% due to weighbridge replacement and repairs), and Transport & Travelling (+10%) (PAR Pg. 15-16).<br>• <b>Savings:</b> Management & Supervision (-3%) and Office & Related Expenses (-15%) (PAR Pg. 15).",
                        "Upkeep & Cultivation": "Actual upkeep expenditure was RM3,054.08/ha vs budgeted RM2,542.82/ha (+20% overspend). (Source: PAR Pg. 17)<br>• <b>Weeding:</b> Cost was RM400.62/ha (74% over budget) due to aggressive weed removal and circle raking. Circle spraying is 51% complete (1.70 rounds, delayed by heavy rainfall/flood in Feb 2026). Selective spraying (inter-row blanket spraying) is 94% complete (0.94 rounds) (PAR Pg. 18, 22).<br>• <b>Manuring:</b> Mature area manuring is 100% complete YTD (537.75 tons applied). Application cost is 8% above budget at RM1,468.44/ha (PAR Pg. 28-29).<br>• <b>Pest & Disease:</b> YTD expenditure is RM57.80/ha (35% over budget) due to Storm baiting on 1,434.38 ha (PAR Pg. 30-31).<br>• <b>Drains:</b> Cost is RM40.37/ha (83% over budget). Desilting was completed over 5,398m (90% of budget) and 5,986m (256% of budget) (PAR Pg. 37).<br>• <b>Roads & Bridges:</b> Cost is RM712.28/ha (10% over budget) due to large road maintenance requirements crossing private estates; 42,704m of road grading/compacting was completed (PAR Pg. 34-35).<br>• <b>Pruning:</b> Cost is RM156.72/ha (24% over budget); completed on 131,582 palms (1.86 rounds, 75% of budget) (PAR Pg. 32-33).",

                        "Production Cost": "YTD ex-estate production cost is RM381.59 per ton of FFB, in line with the budgeted RM379.98 per ton (+0.4% variance). This is highly acceptable due to the FFB crop surplus (+116% against budget). General Charges contributed RM81.09/t, Upkeep & Cultivation RM144.97/t, and Harvesting & Collection RM155.54/t. (Source: PAR Pg. 44)",

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                document.getElementById('header-title').innerText = `${estateData.name} Analytics Portal`;
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Audit') || metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">FFB Production vs Rainfall</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div></div>
                            <div><h3 class="text-xl font-semibold mb-2">Area Distribution (Ha)</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Internal Audit Report Details</button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                
                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { 'y-ffb': { position: 'left' }, 'y-rainfall': { position: 'right' } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#059669', '#10b981'] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            }

            function populateInternalDropdowns() {
                const map = { "audit": "audit", "plantation": "plantation", "agronomy": "agronomy", "pinfosys": "pinfosys" };
                Object.entries(map).forEach(([key, divSuffix]) => {
                    const div = document.getElementById(`${estateData.id}-${divSuffix}`);
                    if (div && estateData.reports[key] && estateData.reports[key] !== "Not Available") {
                        // Using the exact format from the provided reference screenshot template
                        div.innerHTML = Object.entries(estateData.reports[key]).map(([s, c]) => 
                            `<h4 class="font-bold mt-3 text-gray-800">${s}:</h4><p class="text-sm text-gray-600">${c}</p>`
                        ).join('');
                    } else if (div) {
                        div.innerHTML = `<p class="text-sm text-gray-400">Not Available</p>`;
                    }
                });
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const content = document.getElementById(e.currentTarget.dataset.dropdownId);
                        content.classList.toggle('active');
                        e.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => {
                    document.getElementById('modalContent').innerHTML = estateData.policy;
                    document.getElementById('policyModal').classList.add('active');
                });
            }

            renderEstate();
        });

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
