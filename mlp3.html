<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>MLP 3 Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #1f2937; } /* bg-gray-800 */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    MLP 3 Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JS -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content populated by JS -->
            </div>
        </div>
    </div>

    <!-- Main script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "mlp3",
                "name": "MLP 3 Estate",
                "reportInfo": "Data based on Plantation Advisory Report (May 2026), Agronomy Report (May 2026) & Audit Report (May 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,755.70 ha",
                            "Mature: 1,755.70 ha",
                            "Immature: 0.00 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (FY25/26 Actual)",
                        "value": "24.68 MT",
                        "note": "May 2026: 1.42 MT/ha (-45%) (AR 1/2026)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 289.23 / RM 305.26",
                        "note": "Ex-Estate (PA Report 1/2026)"
                    },
                    "road": {
                        "title": "Road Upkeep Status",
                        "value": "RM 692.25/ha",
                        "note": "Impassable in wet weather (Lacks Crusher Run)"
                    },
                     "pests": {
                        "title": "Pest/Disease Status",
                        "value": "Ganoderma Spreading",
                        "note": "48 dead palms; Deboling pending (AR 1/2026)"
                    }
                },
                "keyMetrics": [
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656-.126-1.283-.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Harvester Ratio", "value": "1:19 ha (Short 4 workers)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "Weeding Status", "value": "Circle 91%, Inter-row 70%" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>`, "label": "OER % (Actual)", "value": "20.32%" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Road Maint.", "value": "Inadequate/Slippery" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>`, "label": "Harvest Interval", "value": "6-13 Days (Improved)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "Manuring (FY26/27)", "value": "Mix A/B 0% (Delayed)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25"],
                        "ffb": [], 
                        "rainfall": [445, 308, 309, 309, 94, 178],
                        "note": "*Rainfall data May-Oct 2025. FY25/26 Yield data 24.68 MT/Ha. (Source: PA Report 1/2026, Pg. 41)"
                    },
                    "ageProfile": {
                        "labels": ["Prime Mature (8-19 Yrs)"],
                        "data": [100],
                        "title": "MLP 3 Estate - Palm Age Distribution",
                        "note": "*Source: PA Report 1/2026, Pg. 9; AR 1/2026 Pg. 11."
                    }
                },
                "observations": [
                    "<b>Yield Fluctuation & Manuring Delays:</b> FY25/26 yield improved 12% to 24.68 MT/ha. However, May 2026 production dropped 45%. This is exacerbated by FY26/27 Mixture A & B applications being at 0% due to late deliveries. <span class='observation-ref'>(AR 1/2026 Pg. 14, 38-40)</span>",
                    "<b>Machinery Constraints:</b> Shared use of machinery for evacuation, weeding, and manuring severely limits operational capacity. Fertilizer transport is restricted to ~100 bags/day, delaying application despite adequate labor. <span class='observation-ref'>(AR 1/2026 Pg. 15, 29, 40)</span>",
                    "<b>Ganoderma Infection & Sanitation:</b> 48 dead palms recorded across several blocks (A02, A04, A05, etc.). Deboling activities remain pending as available machinery was prioritized for road repairs. A 'Carbon Fertilizer' trial has been initiated. <span class='observation-ref'>(AR 1/2026 Pg. 36-37)</span>",
                    "<b>Harvesting Quality Improvement:</b> Harvesting intervals improved significantly to 6-13 days across most blocks. However, localized unripe bunch harvesting (up to 10%) and uncollected loose fruits require closer supervision. <span class='observation-ref'>(AR 1/2026 Pg. 17-21)</span>",
                    "<b>Road Conditions & Transport Cost:</b> Agricultural roads lack a crusher-run surface, making them slippery and impassable during wet weather. This drives up vehicle repair costs and disrupts FFB evacuation operations. <span class='observation-ref'>(PA 1/2026 Pg. 32, 39, 46)</span>",
                    "<b>Selective Weeding Delayed:</b> Blanket interrow spraying achieved only 70% of the program due to heavy rain and machinery sharing, though noxious broadleaf weeds are decreasing. <span class='observation-ref'>(PA 1/2026 Pg. 21-22; AR 1/2026 Pg. 29)</span>",
                    "<b>Harvester Shortage:</b> The estate is currently short of 4 harvesters, resulting in a 1:19 ha ratio. Given the steep and hilly terrain, adding 4 harvesters is highly recommended. <span class='observation-ref'>(PA 1/2026 Pg. 14, 36)</span>",
                    "<b>Audit - Payroll Compliance:</b> Weaknesses identified in non-payment of sick leave and manipulation of attendance records by field staff. <span class='observation-ref'>(Audit May 2025 Pg. 3-7)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate's performance improved significantly over the review period. Crop production (43,322.41 MT) is 1% below budget, and the ex-estate production cost (RM 289.23/MT) is 5% below budget, reflecting satisfactory yield. Key challenges remain the lack of crusher run on agricultural roads, causing them to be impassable in wet weather, and delayed selective weeding and manuring programs due to heavy rainfall. (PA Report 1/2026, Pg. 7, 41-42, 47)",
                        "Area Statement": "As of April 2026, the total planted area is 1,755.70 ha. This comprises: <br>• <b>Mature:</b> 1,755.70 ha (100%). <br>• <b>Immature:</b> 0 ha. <br>• <b>Replanting:</b> No replanting planned for the next financial year. The terrain is mostly hilly and steep. (PA Report 1/2026, Pg. 9-10)",
                        "Labour Statement": "Current workforce is 170 workers vs requirement of 184 (Ratio 1:10 ha). <br>• <b>Harvesters:</b> 94 (Ratio 1:19 ha). Considered slightly inadequate given the steep terrain; 4 additional harvesters are required to hit the 1:18 ha mark. <br>• <b>Spraying:</b> 20 workers. <br>• <b>Manuring:</b> 15 workers. (PA Report 1/2026, Pg. 13-14)",
                        "Staff Establishment": "The staff establishment is satisfactory with 10 personnel. It includes 1 Senior Assistant Manager (Mr. Tony Tiwon), 2 Assistant Managers, 5 Field Conductors, 2 Clerks (including Miss Lily Florish Jell who joined Oct 2025), and 1 Mechanic. (PA Report 1/2026, Pg. 12)",
                        "General Charges": "Total General Charges are RM 1,335.80/ha, which is 14% below the budget of RM 1,557.70/ha. <br>• <b>Overspending:</b> 'Entertainment' (+192%), 'General Office Expenses' (+52% due to professional fees and freight), and 'Subscription Fee' (+34%). <br>• <b>Savings:</b> Offset by strong savings in labour recruitment and other administrative headers. (PA Report 1/2026, Pg. 15-16)",
                        "Upkeep & Cultivation": "<br>• <b>Weeding:</b> Circle spraying is 91% complete (2.72 rounds). Selective blanket spraying is 70% complete (delayed by rain) but effective as noxious weeds are decreasing. <br>• <b>Manuring:</b> 95% complete (2,227.30 MT applied). Mix-B delayed by heavy rain, targeting May completion. Cost is RM 1,408.89/ha (6% below budget). <br>• <b>Roads & Bridges:</b> Road cost is RM 692.25/ha (5% above budget). Agricultural roads lack crusher run and are slippery. (PA Report 1/2026, Pg. 18-32)",
                        "Harvesting and Collection": "YTD Cost is RM 134/MT, slightly higher (1%) than the budget of RM 133/MT. <br>• <b>Interval:</b> Acceptable at 10-16 days. <br>• <b>Internal Transport:</b> High running cost (RM 28.91/MT vs RM 21.35/MT budget) due to steep terrain and badly damaged roads from heavy rain. The Planting Advisor recommends using rubber track Badang for steep evacuation. (PA Report 1/2026, Pg. 37-39)",
                        "Crop Production": "FY25/26 FFB Production is 43,322.41 MT, which is 1% below the budget of 43,878.00 MT. <br>• <b>Yield/Ha:</b> 24.68 MT/ha. <br>• <b>Extraction:</b> OER is tracking at 20.32% vs Budget 20.38%. (PA Report 1/2026, Pg. 41)",
                        "Production Cost": "YTD Cost of Production (Ex-Estate) is RM 289.23/MT, which is 5% favorable compared to the budget of RM 305.26/MT. <br>• <b>General Charges:</b> RM 53.93/MT. <br>• <b>Upkeep:</b> RM 101.02/MT. <br>• <b>Harvesting:</b> RM 134.28/MT. (PA Report 1/2026, Pg. 42)",
                        "Vehicles Running Cost": "Lorries and farm tractors used for FFB evacuation have high running costs due to frequent repairs caused by poor road conditions on rainy days. Efforts to outsource internal transport are currently in the negotiation stage to mitigate this risk. (PA Report 1/2026, Pg. 46)",
                        "Capital Expenditure": "N/A",
                        "Immature": "N/A (100% Mature Estate)."
                    },
                    "agronomy": {
                        "Executive Summary": "Yield performance for FY25/26 improved by 12% (24.68 MT/ha), but Period 1 of FY26/27 (May 2026) saw a 45% decline. Key challenges include severe delays in the FY26/27 manuring program due to late deliveries, machinery constraints affecting fertilizer transport and weeding, and pending Ganoderma deboling operations. Overall agronomic condition remains acceptable if interventions are expedited. (Source: AR 1/2026 Pg. 40-41)",
                        "Nutrient Inputs/Progress of Manuring": "FY25/26 completed (Mix B at 97%). For FY26/27, Kieserite is 100% complete, but Mixture A and B are at 0% due to delayed deliveries. Application productivity is limited to 10 bags/worker/day due to machinery shared with evacuation/weeding, restricting transport to ~100 bags/day. Old fertilizer stocks (NK Mix, Mycoplex, Borate) must be cleared. (Source: AR 1/2026 Pg. 13-16)",
                        "Agronomic Observation": "<b>Harvesting:</b> Intervals improved remarkably to 6-13 days. Crop recovery is satisfactory, though localized unripe bunches and uncollected loose fruits were observed.<br><b>Canopy:</b> Pruning is 91% complete with acceptable frond stacking.<br><b>Vegetation:</b> Circle spraying (91%) and inter-row (70%) were delayed by machinery constraints. Undesirable weeds (Clidemia hirta) and large epiphytes require follow-up.<br><b>Pest & Disease:</b> Ganoderma remains the primary issue (48 dead palms). Deboling is pending due to machinery usage for roads. A 'Carbon Fertilizer' trial is ongoing. (Source: AR 1/2026 Pg. 17-37)",
                        "Yield Performance": "FY25/26 yield reached 24.68 MT/ha (+12% vs previous year). However, May 2026 yield dropped significantly to 1.42 MT/ha (-45%). This reduction is attributed to seasonal crop fluctuations exacerbated by delayed nutrient inputs from the pending FY26/27 manuring program. (Source: AR 1/2026 Pg. 38-40)",
                        "Fertilizer Recommendation": "The FY2026/2027 program remains unchanged. It is recommended to clear old NK Mix stocks in hilly rehab blocks at 2.0kg/palm, and apply Mycoplex/Borate in Ganoderma-affected blocks. (Source: AR 1/2026 Pg. 44-47)"
                    },
                    "pinfosys": {
                        "CEO Financial Summary": "N/A",
                        "Summary of Oil Palm Expenditure": "N/A"
                    },
                    "audit": {
                        "Overall Rating": "Marginally Deficient. While most key controls are applied, some important controls lack consistency or effectiveness. (Source: Audit May 2025 Pg. 2)",
                        "Payroll and Personnel": "Weaknesses identified: <br>1. Non-payment of entitled paid sick leave. <br>2. Irregular attendance entries (photos vs live biometric). (Source: Audit May 2025 Pg. 3-5)",
                        "Oil Palm Operations": "Enhancements needed for FFB transport: <br>1. Discrepancies in 'Time Out' and 'Mill Time In'. <br>2. Use of unregistered lorries. <br>3. Significant FFB backlog due to poor road conditions. (Source: Audit May 2025 Pg. 8-14)",
                        "Manuring": "FY 24/25 manuring in rehabilitation Block 3CC42 was incomplete/delayed due to accessibility. (Source: Audit May 2025 Pg. 20-21)"
                    }
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For infected palms, immediate sanitation via deboling (1.5m x 1.5m x 1.5m pit) is required to prevent spread.</p></div> <div class='policy-item'><p class='font-semibold'>Nutrient Management</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-MG-01:</b> Correct Magnesium deficiency through Kieserite application or specific fertilizer mix as per Agronomist recommendation.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> Fertilizer application must strictly adhere to the schedule. Broadcasting must be done at the edge of the weeded circle, not on terrace lips.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-02:</b> Maintain harvesting intervals below 15 days. In hilly terrain, ensure road maintenance to prevent skipped rounds.</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Manuring') ? 'bg-yellow-50 text-yellow-800' : 
                                       metric.title.includes('Pest') || metric.title.includes('Road') ? 'bg-red-50 text-red-800' : 'bg-gray-50 text-gray-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                const productionChartHTML = (estate.chartData.production.labels && estate.chartData.production.labels.length > 0) ?
                    `<div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div>` :
                    `<div class="chart-container flex items-center justify-center bg-gray-50 rounded-lg p-4"><p class="text-gray-500 text-center">Chart data unavailable.</p></div>`;

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Rainfall Analysis (May - Oct 2025)</h3>${productionChartHTML}<p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3>
                            <ul id="observations-list" class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul>
                        </div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold tracking-wide">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-5 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold tracking-wide">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-5 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold tracking-wide">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-5 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold tracking-wide">Audit Report Details</button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-5 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx && estateData.chartData.production.labels && estateData.chartData.production.labels.length > 0) {
                    const datasets = [];
                    if (estateData.chartData.production.rainfall && estateData.chartData.production.rainfall.length > 0) {
                        datasets.push({ label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' });
                    }

                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: datasets
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { 
                                x: { grid: { display: false } }, 
                                'y-rainfall': { type: 'linear', position: 'left', title: { display: true, text: 'Rainfall (mm)' } } 
                            } 
                        }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx && estateData.chartData.ageProfile.data && estateData.chartData.ageProfile.data.length > 0) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#047857', '#34d399', '#a7f3d0'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: false }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const formatSection = ([section, content]) => `
                    <div class="mb-5">
                        <h4 class="font-bold text-gray-900">${section}:</h4>
                        <p class="text-sm text-gray-700 mt-1 leading-relaxed">${content}</p>
                    </div>`;

                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                const auditDiv = document.getElementById(`${estateData.id}-audit`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(formatSection).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(formatSection).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && estateData.reports.pinfosys) {
                    if (typeof estateData.reports.pinfosys === 'string') {
                         pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600 mt-1">${estateData.reports.pinfosys}</p>`;
                    } else {
                        pinfosysDiv.innerHTML = Object.entries(estateData.reports.pinfosys).map(formatSection).join('');
                    }
                }

                if (auditDiv && estateData.reports.audit) {
                    auditDiv.innerHTML = Object.entries(estateData.reports.audit).map(formatSection).join('');
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
