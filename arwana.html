<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Arwana Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                Arwana Estate Report
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "arwana",
                "name": "Arwana Estate (Inti)",
                "reportInfo": "Data based on PA Report (February 2026) & Agronomy Report (April 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area (Dec 2025)",
                        "lines": [
                            "Total Planted: 1,438.22 ha",
                            "Mature: 1,000.73 ha",
                            "Immature: 437.49 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "15.73 / 13.68 MT",
                        "note": "8 Months YTD Dec '25 (15% above budget)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 228.31 / RM 270.10",
                        "note": "Ex-Estate (15% below budget)"
                    },
                    "manuring": {
                        "title": "Manuring Progress",
                        "value": "73% Complete",
                        "note": "As of Oct 2025 (Delayed - Tractor shortage)"
                    },
                     "pests": {
                        "title": "Pest Status",
                        "value": "Stable (Rats)",
                        "note": "Barn Owl occupancy low (30%); monitoring"
                    }
                },
                "keyMetrics": [
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Labour Ratio", "value": "1:19 ha (Adequate)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>`, "label": "Harvest Interval", "value": "<15 days (Oct '25)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM18 13.5a3.375 3.375 0 00-3.375-3.375L13.5 9.75l-1.125.125a3.375 3.375 0 00-3.375 3.375L9 15.75l.125 1.125a3.375 3.375 0 003.375 3.375L13.5 21l1.125-.125a3.375 3.375 0 003.375 3.375L18 15.75l-.125-1.125z" /></svg>`, "label": "Weeding Progress", "value": "34% (Delayed)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>`, "label": "Rehabilitation", "value": "Clean field conditions" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "Extraction OER", "value": "19.50% (Actual)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>`, "label": "Production Performance", "value": "15% Above Budget" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["2018/19", "2019/20", "2020/21", "2021/22", "2022/23", "2023/24", "2025/26 (YTD)"],
                        "ffb": [1.13, 1.17, 2.99, 4.20, 5.72, 9.61, 15.73],
                        "note": "*FFB Performance trend (Source: PAR 1/2026 Pg. 75)"
                    },
                    "ageProfile": {
                        "labels": ["Young Mature (4-7 Yrs)", "Prime Mature (8-19 Yrs)", "Immature (<4 Yrs)"],
                        "data": [62.3, 28.1, 9.6],
                        "title": "Arwana Estate - Palm Age Distribution",
                        "note": "*Source: Agronomy Report 1/2025, Pg. 10."
                    }
                },
                "observations": [
                    "<b>Improved Production & Cost Control:</b> YTD 8-month FFB production (11,875 MT) is 15% above budget. Commendably, ex-estate cost of production (RM 228.31/MT) is 15% below the budget of RM 270.10/MT. <span class='observation-ref'>(PAR Pg. 75, 77)</span>",
                    "<b>Successful Rehabilitation Efforts:</b> Efforts to rehabilitate neglected areas have yielded clean field conditions. Drains have been desilted and previously inaccessible roads repaired with laterite, facilitating crop evacuation. <span class='observation-ref'>(PAR Pg. 26, 91)</span>",
                    "<b>Manuring Program Delay:</b> While improved at 73% completion by October 2025, the program is still behind schedule due to tractor shortages and flooding. Recruitment for more workers is urgent to cover the shortfall. <span class='observation-ref'>(AR Pg. 17-18; PAR Pg. 22, 91)</span>",
                    "<b>Unproductive Local Harvesters:</b> Local harvester productivity remains low, hindering the maintenance of a consistent 12-day harvesting interval. Management is urged to find solutions to replace unproductive workers to optimize output. <span class='observation-ref'>(PAR Pg. 73, 91)</span>",
                    "<b>Weeding Operations Lagging:</b> Circle spraying is significantly delayed at only 34% completion. Sprayer productivity must increase as field conditions in rehabilitation areas continue to stabilize. <span class='observation-ref'>(PAR Pg. 22, 91)</span>",
                    "<b>Low Barn Owl Box Occupancy:</b> Barn owl occupancy remains low at 30% (18/46 boxes). Increasing occupancy is critical for biological rat control to supplement baiting efforts. <span class='observation-ref'>(PAR Pg. 28, 47)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate's performance is satisfactory. Crop production (11,875 MT) is 15% above budget, and the cost of production (RM 228.31/t) is 15% below budget. Management is urged to focus on increasing Barn Owl occupancy, systematically establishing beneficial plants, and reducing farm tractor breakdowns to lower repair costs. (PA Report, Pg. 47-48)",
                        "Area Statement": "As of Oct 2025, the total planted area is 1,438.22 ha. This comprises:<br>• <b>Mature:</b> 1,000.73 ha (100%).<br>• <b>Immature:</b> 437.49 ha.<br>• <b>Replanting:</b> None planned for FY26/27. Old palms (25 yrs) in Field 2000 still yield 9.77 MT/ha (8-month basis). (PA Report, Pg. 10)",
                        "Labour Statement": "Current workforce is 75 workers vs requirement (Ratio 1:19 ha).<br>• <b>Harvesters:</b> 48 (Ratio 1:16 ha). Adequate for normal cropping.<br>• <b>Spraying:</b> 7 workers (Ratio 1:108 ha).<br>• <b>Manuring:</b> 4 workers (Ratio 1:190 ha).<br>• <b>Contractors:</b> Engaged for peak season harvesting and manual loading during crane breakdowns. (PA Report, Pg. 13-14)",
                        "Staff Establishment": "The staff establishment is satisfactory with 5 personnel, includes 1 Assistant Manager (Mr. Kumaravel, joined Oct 2025), 1 Field Supervisor, 1 Trainee Supervisor, and 2 Clerks. The Manager is stationed at Machap Estate. (PA Report, Pg. 12)",
                        "General Charges": "Total General Charges are RM 819/ha, which is 2% below the budget of RM 834/ha.<br>• <b>Overspending:</b> 'Transport & Travelling' (+94% due to vehicle MCN5213 & towing), 'Other Building Maint' (+210% for guardhouse/office), 'Water/Electricity' (+57%).<br>• <b>Savings:</b> Offset by savings in other administrative headers. (PA Report, Pg. 15-16)",
                        "Upkeep and Cultivation": "• <b>Weeding:</b> Circle spraying is only 34% complete (Delayed). Cost is RM 58.67/ha (66% of budget).<br>• <b>Manuring:</b> 73% complete by Oct (Delayed due to tractor shortage). Cost is RM 452.59/ha (45% below budget). Rectified by Nov.<br>• <b>Pest & Disease:</b> Low spend. Barn Owl occupancy is low at 30% (18/46 boxes). (PA Report, Pg. 18-28)",
                        "Harvesting and Collection": "YTD Cost is RM 117.83/MT, slightly higher (4%) than the budget of RM 115.03.<br>• <b>Infield Loading:</b> Spiked to RM 8.54/t (215% over budget) due to manual loading necessity.<br>• <b>Interval:</b> Improved to <15 days in Oct.<br>• <b>Mechanization:</b> 10 Mini E-Crawlers, 1 Box Crane, 1 Solaris. (PA Report, Pg. 38-41)",
                        "Crop Production": "YTD (8 Months) FFB Production is 11,875.08 MT, which is 15% above the budget of 10,388 MT.<br>• <b>Yield/ha:</b> 15.73 MT/ha (8 months).<br>• <b>Extraction:</b> OER at 19.50% vs Budget 20.00%. (PA Report, Pg. 43)",
                        "Production Cost": "YTD Cost of Production is RM 228.31/MT, which is 15% favorable compared to the budget of RM 270.10/MT.<br>• <b>General Charges:</b> RM 52.03/MT (-15%)<br>• <b>Upkeep:</b> RM 58.45/MT (-38%)<br>• <b>Harvesting:</b> RM 117.83/MT (+4%) (PA Report, Pg. 44)",
                        "Vehicles Running Cost": "Vehicle costs are high. Tractor WTY4487 running cost is RM 88.14/hr (278% above budget) due to transmission repairs. Solaris VAP7361 running cost is RM 41.02/hr due to a major RM 16,000 overhaul. (PA Report, Pg. 45-46)",
                        "Capital Expenditure": "N/A (Routine maintenance only). Drain maintenance carried out at RM 52.50/hr using backhoe. (PA Report, Pg. 31)",
                        "Immature": "N/A (100% Mature Estate). (PA Report, Pg. 10)"
                    },
                    "agronomy": {
                        "Executive Summary": "Yields remain far below expectations. The primary limiting factors are poor crop recovery, unsatisfactory ground vegetation control, and chronic manuring delays. (Source: AR, Pg. 4-6)",
                        "Nutrient inputs progress of manuring": "Manuring program for FY24/25 is severely delayed (40% complete). Hindered by late deliveries and flooding; urgent catch-up is required. (Source: AR, Pg. 17-18)",
                        "Agronomic observation": "Crop recovery is unsatisfactory with rotten bunches observed. Pruning standards are inconsistent across rehabilitated areas. Ground vegetation control is currently unsatisfactory. (Source: AR, Pg. 25, 38, 49)",
                        "Yield performance": "Yield reached 7.62 MT/ha (May-Mar FY24/25), a 16.8% increase, but still significantly underperforming. Low palm density (117/ha) is a major constraint. (Source: AR, Pg. 65)",
                        "Fertilizer recommendation": "The FY25/26 program has been adjusted to three rounds for several blocks due to backlog. High priority for K and B application. (Source: AR, Pg. 70, 72-73)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Weeding Efficiency</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-TECH-03:</b> For general circle spraying, low-volume nozzles (e.g., VLV) should be standard to increase worker productivity to a target of 5 ha/manday.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All manuring programs must be completed within the financial year. Any delays require a formal report and a catch-up plan to be submitted.</p></div> <div class='policy-item'><p class='font-semibold'>Labour Productivity</p><p class='text-sm text-gray-600'><b>Policy Ref: LAB-PROD-01:</b> Management must monitor harvester productivity. If average earnings consistently fall below the basic wage, a performance review and corrective action plan are required.</p></div><div class='policy-item'><p class='font-semibold'>Nursery & Supplying</p><p class='text-sm text-gray-600'><b>Policy Ref: NUR-SUP-07:</b> Only advanced planting materials (APM) with at least one newly emerging spear are to be used for supplying to ensure higher survival rates.</p></div>"
            };

            const container = document.getElementById('selected-estate-container');
            let chartInstances = {};

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeCharts();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Manuring') ? 'bg-red-50 text-red-800' : 'bg-gray-50 text-gray-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass} shadow-sm border border-opacity-10 border-black"><h3 class="font-semibold text-sm uppercase tracking-wider">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm font-medium mt-1">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass} shadow-sm border border-opacity-10 border-black"><h3 class="font-semibold text-sm uppercase tracking-wider">${metric.title}</h3><p class="text-2xl font-bold mt-1">${metric.value}</p><p class="text-xs opacity-75 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div class="bg-gray-50 p-2 rounded-lg">${metric.icon}</div>
                        <div><p class="text-xs text-gray-500 uppercase font-semibold">${metric.label}</p><p class="font-bold text-gray-800">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="pl-2">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 md:p-10 rounded-2xl shadow-xl animate-fade-in border border-gray-100">
                        <div class="mb-8">
                            <h2 class="text-4xl font-extrabold text-gray-900">${estate.name}</h2>
                            <p class="text-md text-gray-500 mt-2 font-medium flex items-center italic">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${estate.reportInfo}
                            </p>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-5 mb-10">${summaryMetricsHTML}</div>

                        <div class="mb-10">
                            <h3 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                                <span class="w-8 h-8 bg-green-100 text-green-700 rounded-lg flex items-center justify-center mr-3 text-base">📊</span>
                                Key Metrics & Agronomic Status
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${keyMetricsHTML}</div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-10">
                            <div class="bg-gray-50 p-6 rounded-2xl border border-gray-200">
                                <h3 class="text-lg font-bold mb-4 text-gray-700">FFB Yield Performance (MT/Ha)</h3>
                                <div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div>
                                <p class="text-xs text-center text-gray-400 mt-4">${estate.chartData.production.note}</p>
                            </div>
                            <div class="bg-gray-50 p-6 rounded-2xl border border-gray-200">
                                <h3 class="text-lg font-bold mb-4 text-gray-700">Palm Age Profile</h3>
                                <div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div>
                                <p class="text-xs text-center text-gray-400 mt-4">${estate.chartData.ageProfile.note}</p>
                            </div>
                        </div>
                        
                        <div class="mb-12">
                            <h3 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                                <span class="w-8 h-8 bg-red-100 text-red-700 rounded-lg flex items-center justify-center mr-3 text-base">⚠️</span>
                                Key Observations & Issues
                            </h3>
                            <div class="bg-white border-l-4 border-red-500 p-2 rounded-r-xl">
                                <ul class="list-disc list-outside space-y-4 text-gray-700 ml-6">${observationsHTML}</ul>
                            </div>
                        </div>
                        
                        <div class="mb-12 text-center">
                            <button class="policy-modal-btn bg-green-800 text-white px-8 py-4 rounded-xl hover:bg-green-900 transition-all shadow-lg font-semibold hover:-translate-y-1">
                                View Agricultural Policy Cross-Reference
                            </button>
                        </div>

                        <div class="space-y-4">
                            <div class="section-group">
                                <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full flex justify-between items-center bg-gray-900 text-white p-5 rounded-xl hover:bg-gray-800 transition font-bold shadow-md">
                                    <span>Plantation Advisory Report Details</span>
                                    <svg class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                                <div id="${estate.id}-plantation" class="details-content bg-white p-6 rounded-b-xl border-x border-b border-gray-200 shadow-inner"></div>
                            </div>

                            <div class="section-group">
                                <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full flex justify-between items-center bg-gray-900 text-white p-5 rounded-xl hover:bg-gray-800 transition font-bold shadow-md">
                                    <span>Agronomy Report Details</span>
                                    <svg class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                                <div id="${estate.id}-agronomy" class="details-content bg-white p-6 rounded-b-xl border-x border-b border-gray-200 shadow-inner"></div>
                            </div>

                            <div class="section-group">
                                <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full flex justify-between items-center bg-gray-900 text-white p-5 rounded-xl hover:bg-gray-800 transition font-bold shadow-md">
                                    <span>Pinfosys Report Details</span>
                                    <svg class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                                <div id="${estate.id}-pinfosys" class="details-content bg-white p-6 rounded-b-xl border-x border-b border-gray-200 shadow-inner"></div>
                            </div>
                        </div>
                    </div>`;
            }

            function initializeCharts() {
                const prodCtx = document.getElementById(`prodChart-${estateData.id}`)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[`prodChart-${estateData.id}`] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [{ label: 'FFB Yield (MT/Ha)', data: estateData.chartData.production.ffb, backgroundColor: '#16a34a', borderRadius: 6 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'MT/Ha' } } } }
                    });
                }

                const ageCtx = document.getElementById(`ageChart-${estateData.id}`)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[`ageChart-${estateData.id}`] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#047857', '#34d399', '#a7f3d0'], hoverOffset: 10 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 15 } } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `
                        <div class="mb-4 last:mb-0">
                            <h4 class="font-bold text-gray-800 border-b border-gray-100 pb-1 mb-2">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4>
                            <p class="text-sm text-gray-600 leading-relaxed">${content}</p>
                        </div>`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `
                        <div class="mb-4 last:mb-0">
                            <h4 class="font-bold text-gray-800 border-b border-gray-100 pb-1 mb-2 font-['Inter']">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4>
                            <p class="text-sm text-gray-600 leading-relaxed">${content}</p>
                        </div>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = typeof estateData.reports.pinfosys === 'string' ? `<p class="text-sm text-gray-500 italic">${estateData.reports.pinfosys}</p>` : "";
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                        // Rotate icon
                        const svg = event.currentTarget.querySelector('svg');
                        svg.style.transform = isActive ? 'rotate(180deg)' : 'rotate(0deg)';
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
