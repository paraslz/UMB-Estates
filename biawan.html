<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Biawan Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Biawan Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "biawan",
                "name": "Biawan Estate (Inti)",
                "visitDate": "Advisory: Feb 2026 | Agronomy: Nov 2025",
                "reportInfo": "Data based on Plantation Advisory Report (Feb 2026) & Agronomy Report (Nov 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,932.90 ha",
                            "Mature: 2,752.66 ha",
                            "Immature: 180.24 ha",
                            "Note: P25E planting (78.3 ha) completed"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "8.41 / 7.82 MT",
                        "note": "YTD Jan 2026 (8% above budget)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 347.11 / RM 379.79",
                        "note": "Ex-Estate YTD Jan 2026 (9% favorable)"
                    },
                    "labour": {
                        "title": "Labour Status",
                        "value": "Critical Shortage",
                        "note": "Short 23 harvesters; Ratio 1:22 ha"
                    },
                     "pests": {
                        "title": "Rat Damage & Gano",
                        "value": "6% Damage (P17)",
                        "note": "Barn Owl box occupancy low (16%)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' /></svg>", "label": "Harvester Ratio", "value": "1:22 ha (Excessive)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 14l-7 7m0 0l-7-7m7 7V3' /></svg>", "label": "Manuring Status", "value": "75% Done (FY 25/26)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "OER % (YTD Jan '26)", "value": "19.98%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Production", "value": "8% Above Budget" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "~12 days (Improved)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "Low P & N (Leaching)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jul-25", "Sep-25", "Nov-25", "Jan-26"],
                        "ffb": [1987, 2121, 2450, 2800, 3100], 
                        "rainfall": [124, 180, 210, 340, 290],
                        "note": "*Production data from PA Report 1/2026 (YTD Jan 2026)."
                    },
                    "ageProfile": {
                        "labels": ["Prime Mature (8-19 Yrs)", "Young Mature (4-7 Yrs)", "Immature (<4 Yrs)"],
                        "data": [91, 3, 6],
                        "title": "Palm Age Distribution (Feb 2026)",
                        "note": "*Updated: Includes P24N and P25E immature areas (180.24 ha)."
                    }
                },
                "observations": [
                    "<b>Critical Harvester Shortage:</b> The estate is currently short of 23 harvesters (100 available vs 123 required), resulting in a high ratio of 1:22 ha. This risks crop losses during peak periods. <span class='observation-ref'>(PAR 1/2026, Pg. 15, 71)</span>",
                    "<b>Rat Damage in P17:</b> Fresh rat damage of 6% was detected in Block BM45 (P17). Barn owl box occupancy is alarmingly low at 16% (8 out of 49 boxes), indicating a failing biological control system. <span class='observation-ref'>(PAR 1/2026, Pg. 45-46)</span>",
                    "<b>Parthenocarpy & Drainage (Ongoing):</b> Severe incidence of parthenocarpic bunches continues, linked to high water tables. While drainage works have started, oxygen stress remains a yield limiter in low-lying blocks. <span class='observation-ref'>(AR 2/2025, Pg. 25-30)</span>",
                    "<b>Commendable Rehabilitation:</b> The estate has successfully rehabilitated neglected blocks, with inter-rows generally clean and regular spraying of noxious growth observed. <span class='observation-ref'>(PAR 1/2026, Pg. 71)</span>",
                    "<b>Manuring Program Delay:</b> Manuring for FY 25/26 is only 75% complete as of Jan 2026. Delay is attributed to tractor shortages and late fertilizer delivery. <span class='observation-ref'>(PAR 1/2026, Pg. 42)</span>",
                    "<b>Cost Efficiency:</b> Ex-estate production cost has improved significantly to RM 347.11/MT, which is 9% below the budget of RM 379.79/MT. <span class='observation-ref'>(PAR 1/2026, Pg. 66)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Performance is commendable with FFB production (23,157 MT) 8% above budget. Ex-estate cost (RM 347.11/MT) is 9% below budget. Rehabilitation of neglected blocks is successful, but management must address the 23-harvester shortage. (Source: PAR 1/2026, Pg. 71)",
                        "Area Statement": "As of Feb 2026, total planted area is 2,932.90 ha. <br>• <b>Mature:</b> 2,752.66 ha (94%). <br>• <b>Immature:</b> 180.24 ha (6%), including P24N (101.94 ha) and P25E (78.30 ha). (Source: PAR 1/2026, Pg. 10)",
                        "Labour Statement": "Current workforce is 100 harvesters vs 123 required (Ratio 1:22 ha). <br>• <b>Spraying:</b> 28 workers (Ratio 1:105 ha). <br>• <b>Manuring:</b> 12 workers (Ratio 1:244 ha). <br>• <b>Constraint:</b> High ratio of local harvesters stopping work early needs replacement with more productive outside labour. (Source: PAR 1/2026, Pg. 15-16, 72)",
                        "Staff Establishment": "Staff establishment is satisfactory with 13 personnel, including Senior Manager Bpk Deni Irawan and Manager Bpk Victor Ato. (Source: PAR 1/2026, Pg. 17)",
                        "General Charges": "Total YTD General Charges are RM 845/ha, 17% below the budget of RM 1,023/ha. <br>• <b>Savings:</b> Significant savings in administrative headers. <br>• <b>Overspending:</b> Noted in staff recruitment and medical expenses. (Source: PAR 1/2026, Pg. 19-21)",
                        "Upkeep and Cultivation": "• <b>Weeding:</b> Circle/path spraying cost RM 144.38/ha (9% above budget). Use of CDA recommended to increase productivity. <br>• <b>Manuring:</b> 75% complete by Jan 2026. Use of wheelbarrows suggested to reach 30 bags/man-day. <br>• <b>Pest & Disease:</b> Rat damage 6% in P17. Barn owl box occupancy is low at 16% (8/49). (Source: PAR 1/2026, Pg. 24, 42-45)",
                        "Harvesting and Collection": "YTD Cost RM 90.95/MT vs budget RM 90.90/MT. <br>• <b>Interval:</b> Maintained at ~12 days. <br>• <b>Mechanization:</b> High infield collection costs due to old crawlers; EV units recommended. (Source: PAR 1/2026, Pg. 61-63)",
                        "Crop Production": "YTD FFB Production is 23,157.06 MT (8% above budget). <br>• <b>Yield/ha:</b> 8.41 MT/ha (9 months). <br>• <b>Extraction:</b> OER at 19.98% vs budget 20.00%. (Source: PAR 1/2026, Pg. 64-65)",
                        "Production Cost": "YTD Ex-estate production cost is RM 347.11/MT (-9% vs budget). <br>• <b>General Charges:</b> RM 100.41/MT. <br>• <b>Upkeep:</b> RM 155.75/MT. <br>• <b>Harvesting:</b> RM 90.95/MT. (Source: PAR 1/2026, Pg. 66)",
                        "Vehicles Running Cost": "Tractor WTY4487 running cost is high (RM 114/hr) due to major overhauls. Solaris VAP7361 is currently under major repair. (Source: PAR 1/2026, Pg. 67-69)",
                        "Capital Expenditure": "Total spend RM 135,116 (11% of budget). Includes heavy equipment repairs and infrastructure. (Source: PAR 1/2026, Pg. 70)",
                        "Immature": "180.24 ha (P24N & P25E). Maintenance quality is satisfactory with 100% census in P25E. (Source: PAR 1/2026, Pg. 10, 60)"
                    },
                    "agronomy": {
                        "Executive Summary": "Overall yield performance has improved (45% increase YTD), but is still limited by flooding and incomplete crop recovery. Key concerns include the persistent delay in manuring (track record of ~50% completion), high incidence of parthenocarpy linked to waterlogging, and unsatisfactory palm nutrient status (N & P variations). The blocking system requires consolidation, and a fresh palm census is needed (last census Oct 2024). Ground vegetation has improved but bare ground from path spraying remains an issue. (Source: AR 2-2025, Pg. 4-7)",
                        "Nutrient Inputs/Progress of Manuring": "The estate has a historically poor track record for fertilizer completion (40% in FY22/23, 61% in FY24/25). As of Oct 2025, the FY25/26 program is behind schedule: Mix B (51%), AS (69%), Kieserite (17%), and RP (0%). Delays are due to late delivery and prioritizing carry-forward fertilizers. <br><br><b>Compost Application:</b> Inconsistent recording noted. Only Block BQ41-P13 achieved full completion. Recommendation: Avoid applying compost in low-lying, flood-prone areas to prevent pathogen risks; apply on higher ground or use alternate-year cycles. (Source: AR 2-2025, Pg. 13-17)",
                        "Agronomic Observation": "<b>Crop Recovery:</b> Harvesting interval is acceptable (<15 days), but loose fruit collection is inconsistent, often unfresh or mixed with rotten fruit. Uncollected bunches were found in drains (e.g., BM49-13A1).<br><br><b>Parthenocarpy:</b> Severe incidence observed, following a seasonal pattern (June-Oct). This is strongly linked to high water tables causing root oxygen stress and poor pollination. A trial using piezometers to regulate water levels is recommended.<br><br><b>Pruning:</b> Quality is generally acceptable, but slight under-pruning noted in palms <15 years (retain 2 subtending fronds). Frond stacking is often untidy.<br><br><b>Weed Control:</b> Four conditions identified, ranging from sparse soft grass to dense ferns. Path spraying has caused undesirable bare ground. Management should aim to establish <i>Nephrolepis</i> soft cover.<br><br><b>Nutrient Status:</b> Leaf analysis reveals high variability in Nitrogen and Phosphorus, likely due to leaching from high water tables. K and Mg levels are generally satisfactory. (Source: AR 2-2025, Pg. 18-57)",
                        "Yield Performance": "The April-October FY2025/26 period recorded a significant <b>45% increase</b> in average FFB yield compared to the same period last year. Improvements were seen across all fields, particularly P15 (262% increase) and P17 (205% increase). However, overall productivity remains below potential due to incomplete crop recovery and prolonged flooding (Nov-Dec 2024) which disrupted harvesting. (Source: AR 2-2025, Pg. 58-62)",
                        "Fertilizer Recommendation": "<b>Crucial Deadline:</b> The FY2025/26 program must NOT be carried forward past April 2026. Only remaining unfinished fertilizer should be used in the FY26/27 program. Avoid application on waterlogged ground.<br><br><b>New Plantings:</b> Apply 600g Controlled Release Fertilizer (20:6:14:3) + 500g Rock Phosphate in the planting hole. No further manuring required for 9 months. (Source: AR 2-2025, Pg. 63)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": `
                    <div class='policy-item'><p class='font-semibold'>Biological Pest Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Owl-01:</b> Maintain a minimum of 60% barn owl box occupancy. If occupancy drops below 30% alongside fresh rat damage >5%, manual baiting rounds must be initiated.</p></div>
                    <div class='policy-item'><p class='font-semibold'>Water Management</p><p class='text-sm text-gray-600'><b>Policy Ref: DRAIN-MAINT-03:</b> All collection drains must be desilted annually. In flood-prone blocks, monitor water tables using piezometers to prevent root hypoxia.</p></div>
                    <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-LABOUR-05:</b> Maintain a harvester ratio of 1:13 to 1:15 ha. Ratios exceeding 1:18 ha require immediate recruitment or contractor engagement to prevent crop loss.</p></div>`
            };


            // --- FUNCTIONS ---
            function renderEstate() {
                const container = document.getElementById('selected-estate-container');
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-1 text-gray-900">${estate.name}</h2>
                        <p class="text-sm font-semibold text-green-700 mb-2">${estate.visitDate}</p>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>

                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3>
                            <ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul>
                        </div>

                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>

                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                
                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#14532d', '#22c55e', '#86efac'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800 underline">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600 mb-2">${content}</p>`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800 underline">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600 mb-2">${content}</p>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">${estateData.reports.pinfosys}</p>`;
                }
            }

            function attachEventListeners() {
                document.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                document.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            function openPolicyModal() {
                const modalTitle = document.getElementById('modalTitle');
                const modalContent = document.getElementById('modalContent');
                modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
                modalContent.innerHTML = estateData.policy;
                document.getElementById('policyModal').classList.add('active');
            }

            renderEstate();
        });

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
