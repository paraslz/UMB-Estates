<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Leong Hin San Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .dropdown-btn[data-dropdown-id*="audit"].active { background-color: #7f1d1d; } /* dark red for active audit */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                <!-- Title will be populated by JS -->
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "leonghinsan",
                "name": "Leong Hin San Estate",
                "reportInfo": "Data based on PA Report (Visit: 18th June 2026), Agronomy Report (Visit: 13th Nov 2025) & Audit Report (Nov 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 761.16 ha",
                            "Mature: 761.16 ha",
                            "Immature: 0.00 ha",
                            "No Replanting Planned"
                        ],
                        "ref": "(PA 1/2026, Pg. 9)"
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "28.22 / 29.32 MT",
                        "note": "2.40% below budget (12 Months)",
                        "ref": "(PA 1/2026, Pg. 47)"
                    },
                    "cost": {
                        "title": "Production Cost (Actual vs Budget)",
                        "value": "RM 263.90 / RM 258.17",
                        "note": "2% above budget (Ex-Estate)",
                        "ref": "(PA 1/2026, Pg. 48)"
                    },
                    "manuring": {
                        "title": "Manuring Progress",
                        "value": "100% Completed",
                        "note": "959.27 tons applied",
                        "ref": "(PA 1/2026, Pg. 27)"
                    },
                     "ganoderma": {
                        "title": "Ganoderma Status",
                        "value": "High Risk",
                        "note": "Infection rate >5%; Mounding ongoing",
                        "ref": "(Agronomy Pg. 27; PA Pg. 33)"
                    }
                },
                "keyMetrics": [
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Labour Ratio", "value": "1 : 10 ha (Adequate)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "P&D Status", "value": "Barn Owl Low (30%)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>`, "label": "Nutrient Status", "value": "Mg Deficiency (Old Palms)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-indigo-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M21.75 8.25-13.5 2.25m0 0L2.25 8.25m11.25-6v6m-11.25 0v6m11.25 0-11.25 6m11.25-6v6m6-3.75-1.5-1.5m0 0L18 8.25m-1.5-1.5V6.375c0-.621.504-1.125 1.125-1.125H21' /></svg>`, "label": "Harvester Ratio", "value": "1 : 16 ha (Adequate)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Harvester Prod.", "value": "1.6-1.9 MT/md (Low)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>`, "label": "Harvest Interval", "value": "~15 days (Acceptable)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4' /></svg>`, "label": "Tractor Cost", "value": "High (Breakdowns)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-pink-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v.01' /></svg>`, "label": "Harvesting Cost", "value": "RM 121.12 / tonne" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26", "Mar-26", "Apr-26"],
                        "ffb": [1500, 1600, 1800, 1900, 2100, 2000, 1900, 1800, 1700, 1650, 1700, 1833.41],
                        "rainfall": [150, 120, 100, 110, 200, 250, 220, 180, 140, 130, 160, 190],
                        "note": "*FY25/26 12-Month Actuals. Total FFB: 21,483.41 MT. (PA 1/2026 Pg. 47)."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Yrs", "4-7 Yrs", "8-19 Yrs (Prime)", "20-25 Yrs (Old)", ">26 Yrs"],
                        "data": [0, 0, 332.3, 354.86, 74.0],
                        "title": "Leong Hin San Estate - Palm Age Distribution (Ha)",
                        "note": "*Source: PA Report 1/2026, Pg. 9. (Old palms in 2000 planting are >26 yrs)."
                    }
                },
                "observations": [
                    "<b>Ganoderma & Magnesium Deficiency:</b> Ganoderma remains a risk with infection rates >5%. Mounding is ongoing (3,750 palms in P2010A). Magnesium deficiency persists in older plantings (P01, P02, P03). <span class='observation-ref'>(Agronomy Pg. 27; PA 1/2026 Pg. 33-34)</span>",
                    "<b>Yield & Production Costs:</b> Full year yield was 28.22 MT/ha (2.4% below budget). Cost of production reached RM 263.90/t (2% above budget), mainly impacted by increased infield loading and vehicle maintenance costs. <span class='observation-ref'>(PA 1/2026 Pg. 47-48)</span>",
                    "<b>Weeding Delays:</b> Circle and selective spraying are delayed (44% and 68% completed, respectively) as workers were diverted to harvesting. However, field conditions remain generally acceptable. <span class='observation-ref'>(PA 1/2026 Pg. 19, 22)</span>",
                    "<b>High Vehicle Maintenance Costs:</b> Tractor running costs are extremely high (WTY4487 is 402% over budget) due to major breakdowns of cranes and grabbers. This aligns with past Audit findings on vehicle issues. <span class='observation-ref'>(PA 1/2026 Pg. 49-50; Audit Pg. 2)</span>",
                    "<b>Low Harvester Productivity:</b> Harvester productivity is between 1.60 and 1.90 MT/man-day, which is below the optimum target of 2.50 to 3.0 MT/man-day, increasing reliance on manual loading. <span class='observation-ref'>(PA 1/2026 Pg. 42-43)</span>",
                    "<b>Low Barn Owl Occupancy:</b> Occupancy rate is only 30% (23/76 boxes). Boxes require annual cleaning and maintenance to improve occupancy rates against rat populations. <span class='observation-ref'>(PA 1/2026 Pg. 31)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Generally, the estate's performance was satisfactory. Crop production (21,483.41 MT) is 2.40% below budget, yielding 28.22 MT/ha. Ex-estate cost of production (RM 263.90/t) is 2% above budget. Worker's and harvester's productivity still has room for improvement. (PA 1/2026, Pg. 7, 47-48, 53)",
                        
                        "Area Statement": "Total planted area is <b>761.16 ha</b>. This comprises:<br>• <b>Mature:</b> 761.16 ha (100%).<br>• <b>Immature:</b> 0 ha.<br>• <b>Replanting:</b> None planned for FY26/27. Old palms (26 yrs) in Field 2000 still yield up to 25.65 MT/ha. Land preparation for an Oil Palm Nursery (3.0 ha) for 30,000 seedlings is in progress. (PA 1/2026, Pg. 9-11)",
                        
                        "Labour Statement": "Current workforce is 74 workers (Ratio 1:10 ha), which is considered adequate.<br>• <b>Harvesters:</b> 48 (Ratio 1:16 ha).<br>• <b>Spraying:</b> 7 workers (Ratio 1:109 ha).<br>• <b>Manuring:</b> 4 workers (Ratio 1:190 ha). (PA 1/2026, Pg. 13-14)",
                        
                        "Staff Establishment": "The staff establishment is adequate with 6 personnel. Includes 1 Assistant Manager (Mr. Kumaravel), 1 Field Staff, 2 Clerks, and 2 Training Staff. (PA 1/2026, Pg. 12)",
                        
                        "General Charges": "Total General Charges are <b>RM 1,702.03/ha</b>, which is 2% above the budget of RM 1,668.00/ha.<br>• <b>Overspending:</b> 'Labour EPF' (+46% due to foreign worker contrib.), 'Water/Electricity' (+78%), 'Transport & Travelling' (+60% due to vehicle towing & crane transport), 'Other Building Maint' (+276%). (PA 1/2026, Pg. 15-17)",
                        
                        "Upkeep and Cultivation": "• <b>Weeding:</b> Circle spraying is delayed (44% completed) due to harvesters assisting in crop recovery. Selective spraying is 68% completed. Overall weeding cost is RM 174.46/ha (36% below budget).<br>• <b>Manuring:</b> 100% completed (959.27 MT applied). Cost is RM 1,317.73/ha (20% below budget).<br>• <b>Pest & Disease:</b> Barn Owl occupancy is low at 30% (23/76 boxes). Rat and Bagworm attacks are mostly under control. (PA 1/2026, Pg. 18-31)",
                        
                        "Harvesting and Collection": "YTD Cost is <b>RM 121.12/MT</b> (3% above budget of RM 113.25).<br>• <b>Infield Loading:</b> Spiked to RM 7.94/t (195% over budget) due to manual loading necessity from frequent crane breakdowns.<br>• <b>Interval:</b> Maintained satisfactorily at ~15 days.<br>• <b>Harvester Productivity:</b> Low (1.6-1.9 MT/man-day) against a target of 2.5-3.0 MT. (PA 1/2026, Pg. 42-46)",
                        
                        "Crop Production": "FY 25/26 (12 Months) FFB Production is <b>21,483.41 MT</b>, 2.40% below the budget of 22,320 MT.<br>• <b>Yield/Ha:</b> 28.22 MT/ha (12 months).<br>• <b>Extraction:</b> OER at 19.47% vs Budget 20.00%. (PA 1/2026, Pg. 47)",
                        
                        "Production Cost": "Total Cost of Production (ex-estate) is <b>RM 263.90/MT</b>, 2% above the budget of RM 258.17/MT.<br>• <b>General Charges:</b> RM 60.30/MT (+6%)<br>• <b>Upkeep:</b> RM 82.49/MT (-6%)<br>• <b>Harvesting:</b> RM 121.11/MT (+7%) (PA 1/2026, Pg. 48)",
                        
                        "Vehicles Running Cost": "Vehicle costs are extremely high due to frequent breakdowns. Tractor WTY 4487 running cost is RM 76.46/hr (402% above budget) due to crane/grabber issues. WVR 2310 is RM 25.03/hr (+35%). VDP 9637 is RM 38.44/hr (+27%). (PA 1/2026, Pg. 49-50)",
                        
                        "Capital Expenditure": "N/A (Not explicitly detailed, refer to minor routine work like nursery preparation). (PA 1/2026, Pg. 10)",
                        
                        "Immature": "N/A (100% Mature Estate). (PA 1/2026, Pg. 9)"
                    },
                    "agronomy": {
                        "Executive Summary": "Yield performance for FY24/25 was satisfactory at 32.10 MT/ha. Ganoderma infection remains a major concern with infection rates >5% in most fields. <span class='observation-ref'>(Agronomy Report Nov 2025)</span>",
                        "Nutrient Inputs": "Significant delays noted in NK and Mixture applications in early FY25/26. Kieserite application is complete. <span class='observation-ref'>(Agronomy Report Nov 2025)</span>",
                        "Agronomic Observation": "<b>Harvesting:</b> Unripe bunches detected in P11A (7%). Loose fruit collection compromised in debris-filled circles.<br><b>Leaf Analysis:</b> Nitrogen levels High. Magnesium (Mg) levels deficient in old plantings (P01, P02, P03). <span class='observation-ref'>(Agronomy Report Nov 2025)</span>",
                        "Fertilizer Recommendation": "FY26/27 program formulated. Corrective Kieserite prescribed for Mg deficient blocks. <span class='observation-ref'>(Agronomy Report Nov 2025)</span>"
                    },
                    "audit": {
                        "Overall Rating": "<b>Marginally Deficient.</b> <span class='observation-ref'>(Audit Nov 2025 Pg. 1)</span>",
                        "Finding 5.1 (Vehicle Running)": "<b>Excessive Lubricant Usage:</b> Significant engine oil consumption (e.g., 0.47 Lt/Hr) in tractors due to chronic leaks. Daily 'self-regulated top-up' concealed defects. <span class='observation-ref'>(Audit Nov 2025 Pg. 2-4)</span>"
                    },
                    "pinfosys": "N/A"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Mechanization & Maintenance</p><p class='text-sm text-gray-600'><b>Policy Ref: MECH-MAINT-01:</b> Strict adherence to maintenance schedules is required to prevent major breakdowns. Daily checks must report oil leaks immediately to prevent excessive lubricant consumption. <span class='observation-ref'>(PA 1/2026 Pg. 50; Audit Pg. 5)</span></p></div> <div class='policy-item'><p class='font-semibold'>Pest & Disease (Barn Owls)</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-BIO-02:</b> Increase Barn Owl box occupancy from 30% to target levels. Repair and clean damaged boxes immediately. <span class='observation-ref'>(PA 1/2026 Pg. 31)</span></p></div> <div class='policy-item'><p class='font-semibold'>Weeding Schedule</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-GEN-04:</b> Accelerate weeding program to catch up with the delayed schedule. Prioritize palm circles to facilitate loose fruit collection. <span class='observation-ref'>(PA 1/2026 Pg. 19)</span></p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                document.getElementById('header-title').innerText = `${estateData.name} Report`;
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Manuring') ? 'bg-red-50 text-red-800' : 
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}<p class="text-xs mt-2 opacity-75">${metric.ref || ''}</p></div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-600 mt-1">${metric.note}</p><p class="text-xs mt-2 opacity-75">${metric.ref || ''}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production (MT) vs Rainfall (mm)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile (Ha)</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3>
                            <ul id="observations-list" class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul>
                        </div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-red-800 text-white p-3 rounded-md hover:bg-red-700 transition">Internal Audit Issues</button>
                            <div id="${estate.id}-audit" class="details-content bg-red-50 p-4 rounded-md border border-red-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                     chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                {
                                    label: 'FFB Production (MT)',
                                    data: estateData.chartData.production.ffb,
                                    type: 'line',
                                    borderColor: '#ca8a04',
                                    backgroundColor: 'transparent',
                                    yAxisID: 'y-ffb',
                                    tension: 0.4,
                                    fill: false,
                                    pointRadius: 5,
                                    borderWidth: 2
                                },
                                {
                                    label: 'Rainfall (mm)',
                                    data: estateData.chartData.production.rainfall,
                                    backgroundColor: '#3b82f6',
                                    yAxisID: 'y-rainfall'
                                }
                            ]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { 
                                x: { grid: { display: false } }, 
                                'y-ffb': { 
                                    type: 'linear', 
                                    position: 'left', 
                                    title: { display: true, text: 'FFB Production (MT)' }
                                }, 
                                'y-rainfall': { 
                                    type: 'linear', 
                                    position: 'right', 
                                    title: { display: true, text: 'Rainfall (mm)' }, 
                                    grid: { drawOnChartArea: false } 
                                } 
                            } 
                        }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx && estateData.chartData.ageProfile.data && estateData.chartData.ageProfile.data.length > 0) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ 
                                data: estateData.chartData.ageProfile.data, 
                                backgroundColor: ['#a3e635', '#4d7c0f', '#16a34a', '#f97316', '#be123c'], 
                                hoverOffset: 4 
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            plugins: { 
                                title: { 
                                    display: true,
                                    text: estateData.chartData.ageProfile.title
                                }, 
                                legend: { 
                                    position: 'right' 
                                } 
                            } 
                        }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const auditDiv = document.getElementById(`${estateData.id}-audit`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                // Populate Agronomy
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                // Populate Plantation
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                // Populate Audit
                if (auditDiv && estateData.reports.audit) {
                    auditDiv.innerHTML = Object.entries(estateData.reports.audit).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                // Populate Pinfosys
                if (pinfosysDiv) {
                     if (estateData.reports.pinfosys && estateData.reports.pinfosys !== "N/A") {
                        pinfosysDiv.innerHTML = Object.entries(estateData.reports.pinfosys).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                    } else {
                        pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">N/A</p>`;
                    }
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
