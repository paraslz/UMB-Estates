<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Tanjung Nipis Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; font-weight: 500; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                <!-- Title will be populated by JS -->
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300 font-semibold flex items-center gap-1">
                &larr; Back to Estates List
            </a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold text-gray-900">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "tanjungnipis",
                "name": "Tanjung Nipis Estate",
                "reportInfo": "Data based on PA Report 01/2026 (Visit: 27th & 28th April 2026) & Agronomy Report 1/2026 (Visit: 25th May 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,347.33 ha",

                    },
                    "yield": {

                    "cost": {

                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Harvest Interval", "value": "Up to 31 days in Tobe (Delayed)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 7h8m0 0v8m0-8l-8 8-4-4-6 6' /></svg>", "label": "FFB Yield (FY25/26)", "value": "17.12 MT/ha (+4% YoY)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Manuring Status", "value": "FY25/26 Completed (Delayed)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:10 ha (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z' /></svg>", "label": "Rainfall Impact", "value": "4,122mm (Severe Delays)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2' /></svg>", "label": "Weeding Status", "value": "Inter-row Delayed (1 Round)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Dec-25", "Jan-26", "Feb-26", "Mar-26", "Apr-26", "May-26"],
                        "rainfall": [283, 780, 870, 358, 115, 168],
                        "note": "*Rainfall data (mm) from Agronomy Report 1/2026, Section 9."
                    },
                    "ageProfile": {
                        "labels": ["Mature 8-19 yrs (39%)", "Mature 20-25 yrs (55%)", "Immature 0-3 yrs (6%)"],
                        "data": [39, 55, 6],
                        "title": "Tanjung Nipis - Area Distribution (May 2026)",
                        "note": "*Source: Agronomy Report 1/2026 (Age Profile, Pg. 12)."
                    }
                },
                "observations": [
                    "<b>FFB Yield & Crop Production Deficit:</b> PA 01/2026 noted an 18% deficit against budget early on. The recent AR 1/2026 indicates a slight late-season recovery, with FY25/26 full-year yield achieving <b>17.12 MT/ha (+4% YoY)</b>. However, Period 1 of FY26/27 showed a sharp <b>23% decline</b> (1.14 MT/ha) due to prior severe weather impacts affecting prime mature blocks (05A, 06A, 16A). <span class='observation-ref'>(PA Report 01/2026, Pg. 8; AR 1/2026, Pg. 45-47)</span>",
                    "<b>Elevated Production Cost:</b> Ex-estate cost of production surged to <b>RM 375.83 per ton</b>, representing a <b>16% overspend</b> against the budgeted RM 325.05 per ton. This negative variance is primarily attributed to the deficit in crop production, which failed to dilute fixed General Charges and upkeep costs. <span class='observation-ref'>(PA Report 01/2026, Pg. 9, 59)</span>",
                    "<b>Extreme Rainfall & Operational Delays:</b> The estate recorded a massive <b>4,122 mm of rainfall</b> over 203 wet days in FY25/26. January and February 2026 alone saw exceptional rainfall of 780mm and 870mm respectively. This caused severe waterlogging (e.g., Block 85) and widespread delays in harvesting, manuring, and weeding. <span class='observation-ref'>(AR 1/2026, Pg. 34, 51-53)</span>",
                    "<b>Inconsistent Harvesting Intervals:</b> While the Main Division maintains acceptable intervals (10-14 days), the Tobe Division (Rehab) is facing severe delays. Block 10B reached up to <b>31 days</b> in April/May 2026. This is directly attributed to limited harvester availability combined with poor field accessibility during the heavy rains. <span class='observation-ref'>(AR 1/2026, Pg. 28-29)</span>",
                    "<b>Manuring Program Completion & Delays:</b> The FY25/26 fertilizer program was fully completed, but it was heavily delayed into May 2026 due to extreme weather and delivery issues. As of May 2026, the FY26/27 program has not yet commenced. <span class='observation-ref'>(PA Report 01/2026, Pg. 6; AR 1/2026, Pg. 14-15)</span>",
                    "<b>Magnesium Deficiency & Hardpan Soils:</b> In Young Mature Block 19A, palms are exhibiting yellow/orange lower fronds indicating Magnesium deficiency. This is exacerbated by sandy soils and hardpan conditions. The estate has positively initiated EFB application to mitigate this. <span class='observation-ref'>(AR 1/2026, Pg. 37-38)</span>",
                    "<b>Rehabilitation & Weed Control Challenges:</b> Weeding operations were severely delayed by rainfall. The Main Division completed only 2 rounds instead of 3, and the Tobe Division completed only 1 round of inter-row spraying. Consequently, unwanted weeds (Giant Grass, Clidemia) are encroaching. Additionally, flood-damaged areas in 24A/25A (near Block 48) urgently require supplying. <span class='observation-ref'>(AR 1/2026, Pg. 24-25, 32, 41-43)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate's overall performance during the review period has shown steady improvement. Total FFB production reached <b>22,111.368 MT</b>, which is <b>18% below budget</b> (26,990 MT), primarily due to low cropping patterns and severe monsoonal weather obstructing crop evacuation. Consequently, ex-estate production cost was <b>RM 375.83 per ton</b>, representing a <b>16% overspend</b> against the budgeted RM 325.05 per ton. The labor force is adequate with a ratio of <b>1 worker to 10 ha</b>. Ongoing priorities include expediting the delayed second-half manuring program, controlling aggressive weed species, and advancing mechanization/outsourcing of internal transport. <span class='observation-ref'>(PA Report 01/2026, Pg. 4, 10, 68)</span>",
                        "Area Statement": "As of April 2026, the total planted area covers <b>1,347.33 ha</b>. This comprises:<br>• <b>Mature:</b> 1,267.32 ha (94.06% of planted area).<br>• <b>Immature:</b> 80.01 ha (5.94% of planted area).<br>• <b>Replanting:</b> None currently in progress.<br>• <b>Non-Planted/Infra:</b> Roads cover <b>85.36 ha</b> (5.72%), unplantable area <b>28.08 ha</b> (1.88%), swamps/forests <b>21.40 ha</b> (1.43%), river/drain buffer zones <b>1.45 ha</b> (0.10%), and buildings/others <b>6.84 ha</b> (0.46%).<br>• <b>Recent Changes:</b> A GIS census correction led to a net reduction of <b>40.99 ha</b> in mature areas and <b>5.38 ha</b> in immature areas. Total estate title area is <b>1,492.34 ha</b>. <span class='observation-ref'>(PA Report 01/2026, Pg. 12-13)</span>",
                        "Labour Statement": "The total workforce stands at <b>130 checkroll workers</b> against a total requirement of 133 (shortage of -3). This represents a highly satisfactory land-to-worker ratio of <b>1 worker to 10 ha</b>:<br>• <b>Harvesters:</b> 80 active workers vs a requirement of 84 (shortage of -4), resulting in an adequate ratio of <b>1 harvester to 16 ha</b>.<br>• <b>Sprayers & Manuring Workers:</b> 9 sprayers (ratio 1:150 ha) and 11 manuring workers (ratio 1:122 ha), which is highly satisfactory for program completion.<br>• <b>Contractors:</b> No third-party contractor workers are currently engaged.<br>• <b>Demographic Composition:</b> 7 locals, 115 Indonesians, and 8 Filipinos. <span class='observation-ref'>(PA Report 01/2026, Pg. 16-17)</span>",
                        "Staff Establishment": "The staff establishment is sufficient and satisfactory with <b>9 personnel</b> managing estate divisions:<br>• <b>Management:</b> 1 Estate Manager (Mr. Mark Mathew) and 2 Assistant Managers (Mr. Alexander Gaya supervising the Main Division and Mr. Erikly Effyfian Meyrick supervising the Sg. Kaindangan Division).<br>• <b>Field Supervisors:</b> 4 Field Conductors (Jaery Janeh, Frazelley Mataha, Hassan Bin Abd Rakman, Walter Joseph).<br>• <b>Office Staff:</b> 1 Chief Clerk (Aeffy Soniun), 1 General Clerk (Kayren Lynn), and 1 new Store Clerk (Ivy Christi Pasmin, joined 1/3/2026). <span class='observation-ref'>(PA Report 01/2026, Pg. 14-15)</span>",
                        "General Charges": "Total actual General Charges was <b>RM 1,628 per hectare</b>, which is <b>1% above the budget</b> of RM 1,613/ha:<br>• <b>Staff Salary & Related costs:</b> RM 502/ha (7% below budget of RM 539/ha).<br>• <b>Labour Overhead:</b> RM 419/ha (8% below budget of RM 455/ha).<br>• <b>Office-Related Expenses:</b> RM 619/ha (10% above budget of RM 564/ha).<br>• <b>Office & Premises Upkeep:</b> RM 89/ha (62% above budget of RM 55/ha).<br>• <b>Overspending Details:</b> Significant overspends occurred in Staff Accommodation (<b>+46%</b> due to staff compound upkeep), Labours Quarters Upkeep (<b>+75%</b> due to unbudgeted backhoe use), Non-Capitalized Fixed Assets (<b>+950%</b> due to unbudgeted purchases), Transport & Travelling (<b>+52%</b> due to Malacca trip for Annual Dinner), and Other Building Maintenance (<b>+148%</b> due to Tobe workshop materials, fertilizer store repairs, and hiring 1 carpenter). <span class='observation-ref'>(PA Report 01/2026, Pg. 18-20, 69-70)</span>",
                        "Upkeep and Cultivation": "The actual total upkeep and maintenance cost was <b>RM 2,759 per hectare</b> (4% below budget of RM 2,883/ha), equating to <b>RM 158 per ton</b> of FFB produced (budget RM 141):<br>• <b>Weeding:</b> Cost was <b>RM 268/ha</b> (16% above budget of RM 231/ha). Circle and paths weeding completed 2.1 rounds (69% of budget) and interrow selective weeding completed 1.9 rounds (63% of budget) using mist blowers with Trichlopyr and Metsulfuron-methyl. High cost caused by labor rate increases (circle rate rose from RM15 to RM18/ha; selective from RM21 to RM24/ha).<br>• <b>Manuring:</b> Cost was <b>RM 1,148/ha</b> (28% below budget of RM 1,588/ha) due to delays. A total of <b>1,097.72 MT</b> of fertilizer was applied (76% of grand annual budget of 1,441.17 MT). First half program completed (97%), second half program lagging (42%) due to monsoonal rainfall (Jan-Mar 2026) and labor shortage.<br>• <b>Pests & Diseases:</b> Cost was <b>RM 45/ha</b> (29% above budget of RM 35/ha). Rat baiting completed 1 round (1,308.31 ha) using STORM bait, which caused the overspend since it is premium priced compared to budgeted Ebor bait. Fresh rat damage remains minor. Ganoderma is present in tall palms (2004/2005) but is not serious.<br>• <b>Pruning:</b> Cost was <b>RM 255/ha</b> (71% above budget of RM 149/ha) due to heavy corrective pruning in Sg. Kaindangan Estate. Stacking of cut fronds in flat/undulating areas requires improvement to patch-stacking per 4 palms to facilitate tractor access. <span class='observation-ref'>(PA Report 01/2026, Pg. 21-23, 26, 28, 31, 34-38)</span>",
                        "Harvesting and Collection": "The actual total cost of harvesting and collection reached <b>RM 122.59 per tonne FFB</b>, which is <b>16% higher than budget</b> (RM 105.57/t):<br>• <b>Own Harvesting & Collection:</b> Cost (excluding external transport) was <b>RM 100.78/t</b> (19% above budget of RM 84.95/t) due to unbudgeted infield loading (+RM 7.77) and high internal transport (+RM 5.34), as the estate had to utilize its own farm tractors instead of outsourced contractors.<br>• <b>Harvesting Interval:</b> Satisfactorily maintained within <b>10 to 16 days</b> on average (average 2.85 rounds in Feb 2026), though slippery roads during rain delayed blocks 48/49 to 19-21 days.<br>• <b>Harvesters' Productivity:</b> Ranged from <b>0.50 to 2.83 tons per man-day</b> with average earnings of RM 35 to RM 118 per man-day depending on block terrain. Mini crawlers are badly damaged and should be written off. Electric crawlers or Badang are recommended for mechanization. <span class='observation-ref'>(PA Report 01/2026, Pg. 49, 51-56)</span>",
                        "Crop Production": "The total crop production for the review period was <b>22,111.368 MT</b>, which is <b>18% below the seasonal budget</b> of 26,990.00 MT. Average yield achieved was <b>16.90 MT/ha</b> vs budget of 20.63 MT/ha:<br>• <b>Main Division:</b> Produced <b>16,526.865 MT</b> (only 2% below budget), yielding <b>19.49 MT/ha</b> vs budget of 19.85 MT/ha.<br>• <b>Sg. Kaindangan Estate (Tobe Division):</b> Produced <b>5,584.503 MT</b> (<b>45% below budget</b>), yielding <b>12.13 MT/ha</b> vs budget of 22.07 MT/ha. Low production is due to rehabilitation constraints, but the Division is expected to recover in the coming financial year. <span class='observation-ref'>(PA Report 01/2026, Pg. 57-58)</span>",
                        "Production Cost": "Total actual production cost was <b>RM 375.83 per tonne of FFB</b>, representing a <b>16% negative variance</b> compared to the budgeted cost of RM 325.05/t, mainly caused by low crop production:<br>• <b>General Charges:</b> RM 95.09 per ton of FFB (budget RM 78.75/t).<br>• <b>Upkeep & Cultivation:</b> RM 158.15 per ton of FFB (budget RM 140.73/t).<br>• <b>Harvesting & Collection:</b> RM 122.59 per ton of FFB (budget RM 105.57/t). <span class='observation-ref'>(PA Report 01/2026, Pg. 59)</span>",
                        "Vehicles Running Cost": "Average running costs of farm tractors generally exceeded the budget by over <b>40%</b> due to high repair costs. All 4 Mini Crawlers purchased in 2021 are badly damaged, underutilized (running hours 0 to 310 hrs), and should be written off. Double Cab (SMN7068) actual running cost was <b>RM 0.82/km</b> (budget RM 0.63/km) and Single Cab (SMG5418) was <b>RM 1.63/km</b> (budget RM 1.81/km). Landini Atlantis actual running cost was <b>RM 20.39/hr</b> (budget RM 14.03/hr) and Kubota M8540DT (SAC3874E) was <b>RM 26.23/hr</b> (budget RM 13.43/hr). <span class='observation-ref'>(PA Report 01/2026, Pg. 60-61)</span>",
                        "Capital Expenditure": "The estate spent significantly on roads and bridges infrastructure, with actual cost reaching <b>RM 873.00 per hectare</b> (15% above budget of RM 759/ha) due to aggressive agricultural and boundary road surfacing in the steep, hilly terrains of the Main Division and newly acquired Sg. Kaindangan division:<br>• <b>Road Grading & Compaction:</b> Completed 873 chains (15% of annual 5,927 chains budget due to rain delays) at <b>RM 29.18 per chain</b> (RM 1.45/m).<br>• <b>Road Surfacing & Gravelling:</b> Completed 385 chains (92% of budget) using 12,416 MT crusher run/red stone at <b>RM 52.69 per ton</b> (Main Div) and <b>RM 56.25 per ton</b> (Tobe Div).<br>• <b>Backhoe & Excavator Rental:</b> Rented backhoe for 1,001 hours at <b>RM 48.00/hr</b> and excavator for 1,962 hours at <b>RM 80.00/hr</b> for heavy repairs. <span class='observation-ref'>(PA Report 01/2026, Pg. 7, 41-44)</span>",
                        "Immature": "Immature areas stand at <b>80.01 ha</b> following latest GIS census adjustments:<br>• <b>Immature 2024A (8.74 ha) & 2025A (7.81 ha):</b> Formed by partitioning the old 2023A block. Palm seedling planting completed; however, supplying is urgently needed due to severe flood damage and monkey attacks in low-lying fields.<br>• <b>Immature 2023A (Sg. Kaindangan - 63.46 ha):</b> Consists of formerly long-abandoned blocks (2023A4: 34.02 ha, 2023A5: 29.44 ha). Heavy clearing of jungle trees/bushes and repair of collapsed terraces using excavators are complete. Lalang and Giant Paspalum sprayed with Glyphosate. Drainage needs desilting to prevent waterlogging. Palm seedling supplying must be expedited. <span class='observation-ref'>(PA Report 01/2026, Pg. 62-64)</span>"
                    },
                    "agronomy": {
                        "Executive Summary": "Visit 1/2026 (May 25). The estate achieved an overall yield of <b>17.12 MT/ha</b> in FY25/26 (+4% YoY). However, Period 1 of FY26/27 saw a sharp 23% decline (1.14 MT/ha). Operations were severely impacted by massive rainfall (4,122 mm in FY25/26), causing significant delays in harvesting (up to 31 days in Tobe division), manuring, and weeding. Rehabilitation works in Tobe are progressing, but consistency in harvesting and ground upkeep needs urgent attention. <span class='observation-ref'>(AR 1/2026, Pg. 8, 45-51)</span>",
                        "Nutrient Inputs/Progress of Manuring": "The FY25/26 manuring program (Mix A, Mix B, Mix C, RP, CPD) was <b>100% completed</b> but heavily delayed, finishing only in May 2026. The delays were driven by late fertilizer delivery and severe weather/accessibility constraints. As a result, the FY26/27 program has not yet commenced. <span class='observation-ref'>(AR 1/2026, Pg. 14-15)</span>",
                        "Agronomic Observation": "<b>Main Div:</b> Palms are healthy; pruning is generally 95%+ complete, and harvesting intervals are good (10-14 days). <b>Tobe Div (Rehab):</b> Accessibility has improved, but harvesting intervals remain severely delayed (15-31 days). Waterlogging was identified in Block 85 requiring drainage. <b>Young Mature (19A):</b> Palms exhibit Magnesium deficiency (yellow/orange lower fronds) attributed to sandy, hardpan soils; EFB application is actively ongoing. <b>Immature (24A/25A/23A):</b> Areas near Block 48 suffered flood damage and need supplying. Rehab in 23A is complete but palm growth remains below expectation. <span class='observation-ref'>(AR 1/2026, Pg. 17-43)</span>",
                        "Weed Control": "Weeding programs were severely hampered by intense rainfall. The Main Division completed only 2 rounds of inter-row spraying (vs 3 planned). The Tobe Division is further behind, completing only 1 round of inter-row and 2 rounds of circle spraying. Unwanted weeds like Giant Grass and Clidemia are visibly encroaching in localized areas. <span class='observation-ref'>(AR 1/2026, Pg. 24-25, 32-33)</span>",
                        "Yield Performance": "FY25/26 closed at <b>17.12 MT/ha</b>, a positive 4% improvement over the prior year. However, several prime mature blocks (05A, 05C, 05D, 09A) still produced below expectation. In Period 1 of FY26/27, yield plummeted to <b>1.14 MT/ha</b> (-23% compared to Period 1 of FY25/26), underscoring the lag effect of severe weather and agronomic delays. <span class='observation-ref'>(AR 1/2026, Pg. 45-48)</span>",
                        "Fertilizer Recommendation": "The FY26/27 fertilizer program has been formally drafted, comprising Mix A, Mix B, NK 1, BRP, and CPD (detailed in Appendix 1). The priority is to execute the program promptly to recover from the delayed FY25/26 applications and to pay specific attention to the recovering immature and rehab blocks. <span class='observation-ref'>(AR 1/2026, Pg. 54-57)</span>"
                    },
                    "pinfosys": "N/A"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Delays beyond 2 months due to rainfall or labor shortages represent key operational risks and must be mitigated. (PA Report 01/2026, Pg. 31)</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-01:</b> Harvesting intervals must be maintained below 15 days. Current status ranges mostly between 10-16 days and is largely compliant, though slippery roads from heavy rain delayed blocks 48/49. (PA Report 01/2026, Pg. 51)</p></div> <div class='policy-item'><p class='font-semibold'>Weeding Control</p><p class='text-sm text-gray-600'><b>Policy Ref: AGRO-WEED-02:</b> Inter-row selective spraying must be completed at 3 rounds per year to promote soft grass establishment. Delays in both circle (69% done) and selective (63% done) weeding must be resolved. (PA Report 01/2026, Pg. 22, 26)</p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                document.getElementById('header-title').innerText = `${estateData.name} Report`;
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-green-50 text-green-800' : 'bg-gray-50 text-gray-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                const productionChartHTML = (estate.chartData.production.labels && estate.chartData.production.labels.length > 0) ?
                    `<div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div>` :
                    `<div class="chart-container flex items-center justify-center bg-gray-50 rounded-lg p-4"><p class="text-gray-500 text-center">Chart data not available.</p></div>`;

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2 flex items-center justify-between">Monthly Rainfall (mm) - FY 25/26</h3>${productionChartHTML}<p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Area Distribution</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues (Mixed Sources)</h3>
                            <ul id="observations-list" class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul>
                        </div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx && estateData.chartData.production.rainfall && estateData.chartData.production.rainfall.length > 0) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-rainfall': { type: 'linear', position: 'left', title: { display: true, text: 'Rainfall (mm)' } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx && estateData.chartData.ageProfile.data && estateData.chartData.ageProfile.data.length > 0) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#ca8a04', '#166534', '#facc15'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: false }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">${estateData.reports.pinfosys}</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
