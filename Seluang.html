<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Seluang Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                Seluang Estate (Inti) Report
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow"></div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "seluang",
                "name": "Seluang Estate (Inti)",
                "reportInfo": "Data based on PA Report (Visit: 5th & 6th February 2026) covering review period May 2025 to Dec 2025.",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area (Dec 2025)",
                        "lines": [
                            "Total Planted: 1,246.27 ha",
                            "Mature: 1,116.66 ha",
                            "Immature: 129.61 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (YTD Dec FY 25/26)",
                        "value": "9.37 MT vs 9.92 MT",
                        "note": "Actual vs Budget (6% below budget)"
                    },
                    "cost": {
                        "title": "Ex-Estate Cost/Tonne",
                        "value": "RM 607 vs RM 478",
                        "note": "Actual vs Budget (27% over budget)"
                    },
                    "labour": {
                        "title": "Harvester Requirement",
                        "value": "85 vs 92 men",
                        "note": "Short of 7 harvesters (Ratio 1:15 ha)"
                    },
                     "pests": {
                        "title": "Pest Status",
                        "value": "Minimal",
                        "note": "Rat damage below threshold"
                    }
                },
                "keyMetrics": [
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Harvester Prod.", "value": "1.0 - 1.6 MT/md (Low)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>`, "label": "Harvest Interval", "value": "11 days (Acceptable)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap="round" stroke-linejoin="round" stroke-width='2' d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>`, "label": "Upkeep Spending", "value": "33% Over Budget" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314' /></svg>`, "label": "Manuring Progress", "value": "84% Complete (YTD)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0' /></svg>`, "label": "Crop vs Last Yr", "value": "+36% Improvement" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z' /></svg>`, "label": "Roads & Bridges", "value": "414% Over Spent" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["FY 24/25 (Dec)", "FY 25/26 (Dec)"],
                        "ffb": [6.87, 9.37],
                        "note": "*FFB Yield (MT/Ha) YTD December comparison. (Source: PAR Pg. 52)"
                    },
                    "ageProfile": {
                        "labels": ["Prime (2013-2015)", "Young Mature (2017-2020)", "Immature (>2022)"],
                        "data": [65, 25, 10],
                        "title": "Seluang Estate - Age Distribution",
                        "note": "*Illustrative based on Field Details (PAR Pg. 12-14)."
                    }
                },
                "observations": [
                    "<b>Harvester Shortage & Productivity:</b> The estate is currently short of 7 harvesters (available 85 vs required 92). Productivity, especially among local workers, is notably low (<1.5 MT/md in 2017/18 plantings), impacting crop recovery. <span class='observation-ref'>(PAR Pg. 4, 16, 51)</span>",
                    "<b>Massive Infrastructure Overspend:</b> 'Roads & Bridges' expenditure is 414% over budget (Actual RM 1M vs Budget RM 197k) due to extensive lateriting and repairs incorrectly charged to operations. <span class='observation-ref'>(PAR Pg. 22, 54)</span>",
                    "<b>Immature Area Upkeep:</b> 2024 and 2025 plantings show high casualties and unsatisfactorily weeded field conditions. Seedlings used for supplying often lack emerging shoots, leading to 2027 re-supplying needs. <span class='observation-ref'>(PAR Pg. 9, 59-64)</span>",
                    "<b>Manuring Efficiency:</b> Wheelbarrow manuring output is low (20 bags/md). Reorganizing to 3-worker teams per wheelbarrow is recommended to reach 30 bags/md target. <span class='observation-ref'>(PAR Pg. 5, 37)</span>",
                    "<b>General Charges Variance:</b> Overall GC is 7% under budget, but 'Transport & Travelling' spiked by 1001% due to unbudgeted Annual Dinner costs in Malacca. <span class='observation-ref'>(PAR Pg. 19-21)</span>",
                    "<b>Production Cost Efficiency:</b> Ex-estate cost (RM 607/t) is 27% above budget, primarily driven by high capital road work costs being captured in operating expenses. <span class='observation-ref'>(PAR Pg. 54)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate achieved a significant 36% increase in crop compared to the same period last year. However, yield remains 6% below the current budget (9.37 MT/ha vs 9.92 MT/ha). Ex-estate costs are substantially over budget (Actual RM 607 vs Budget RM 478) due to infrastructure work being incorrectly charged to upkeep. Key focus areas are harvester recruitment, improving local harvester output, and nursery seedling quality. (Source: PAR Pg. 7, 10, 52)",
                        "Area Statement": "The total planted area stands at 1,246.27 ha against a budget of 1,285.03 ha. The variance of 38.76 ha is due to unplanted land currently under claim by villagers. The estate is divided into 1,116.66 ha of mature palms and 129.61 ha of immature area (2023-2025 plantings). (Source: PAR Pg. 11, 15)",
                        "Labour Statement": "Labour requirement is 199 men vs 206 available, but the distribution is skewed. There is a critical shortage of 7 harvesters (85 available vs 92 required). The worker-to-planted ha ratio is 1:6.05, though this includes Plasma and Regional Office staff, inflating the actual estate density. Local harvester productivity is low, specifically in the 2017/18 blocks. (Source: PAR Pg. 16-17)",
                        "Staff Establishment": "Total establishment of 17 staff is considered adequate. Significant update: Bpk Jemasu was promoted from Field Conductor to Assistant (acting) in September 2025 to fill a vacancy. (Source: PAR Pg. 18)",
                        "General Charges": "Total GC Actual RM 1.74M vs Budget RM 1.88M (7% under budget). However, 'Transport & Travelling' is RM 131k against a budget of RM 12k (1001% variance), attributed to unbudgeted Annual Dinner expenses for staff in Malacca. BPJS contributions also exceeded budget by 64%. (Source: PAR Pg. 19-21)",
                        "Upkeep and Cultivation": "Total Upkeep RM 1.34M vs Budget RM 1.01M (33% over budget). Roads & Bridges is the primary outlier, spending RM 1.01M against a RM 197k budget (414% variance). This was driven by intensive bridge repairs and lateriting of main/collection roads following heavy rains. Weeding progress for circle spraying (89%) and selective spraying (86%) is slightly behind schedule. (Source: PAR Pg. 22, 25, 29)",
                        "Harvesting and Collection": "Expenditure is RM 1.05M vs Budget RM 811k (30% over budget). High costs are attributed to wet weather conditions leading to double handling of FFB and high running costs of Crawlers. Harvesting interval is maintained at 11 days, though the target is 10 days. Loose fruit collection efficiency is moderate. (Source: PAR Pg. 49-51)",
                        "Crop Production": "YTD production reached 10,467 MT against a budget of 11,075 MT. Yield is 9.37 MT/ha. While below budget, this represents a 36% improvement over the previous year's 6.87 MT/ha. Average bunch weights are improving, ranging from 7kg to 15kg depending on planting year. (Source: PAR Pg. 52-53)",
                        "Production Cost": "Ex-estate cost is RM 607/tonne FFB against a budget of RM 478/tonne. The 27% cost overrun is predominantly caused by the 'Roads & Bridges' and 'Harvesting' variances mentioned above. Excluding the road infrastructure work, operational costs would have been closer to budget. (Source: PAR Pg. 54)",
                        "Vehicles Running Cost": "Mini tractors (6 units) and Backhoe loaders showed high running costs due to low utilization (hours/month) and high repair bills for older units. Jeep running cost is RM 0.73/km. (Source: PAR Pg. 55-56)",
                        "Capital Expenditure": "Actual RM 511k vs Budget RM 761k. Expenditure was focused on essential machinery including FFB Crawlers and road maintenance equipment. Worker housing (Barack G6) is currently under construction and accounts for the remaining budget commitment. (Source: PAR Pg. 57-58)",
                        "Immature": "Total 129.61 ha. P2024 and P2025 plantings are facing challenges. P2025 shows high casualties due to poor seedling quality; supplying is planned for 2027. Weeding in P2024 is currently unsatisfactory, with high weed pressure in the circles. (Source: PAR Pg. 59-64)"
                    },
                    "agronomy": {
                        "Executive Summary": "Refer to previous report (not updated in visit 1/2026).",
                        "Nutrient Inputs/Progress of Manuring": "Refer to previous report.",
                        "Agronomic Observation": "Refer to previous report.",
                        "Yield Performance": "Refer to previous report.",
                        "Fertilizer Recommendation": "Refer to previous report."
                    }
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Labour Productivity</p><p class='text-sm text-gray-600'><b>Policy Ref: LAB-PROD-01:</b> Harvester output should target >1.5 MT/md. If local harvesters consistently underperform, management must adjust the ratio of external recruits.</p></div> <div class='policy-item'><p class='font-semibold'>Weeding Technology</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-TECH-03:</b> Transition to CDA (Controlled Droplet Application) for circle spraying in normal blocks to increase worker productivity to 6 ha/md.</p></div> <div class='policy-item'><p class='font-semibold'>Nursery Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: NUR-SUP-07:</b> Only advanced seedlings with active new green spear growth are to be used for field supplying to ensure survival rates.</p></div> <div class='policy-item'><p class='font-semibold'>Infrastructure Costs</p><p class='text-sm text-gray-600'><b>Policy Ref: CAPEX-ROAD-01:</b> Major road lateriting and bridge rehabilitations in new areas must be capitalized rather than charged to operational upkeep.</p></div>"
            };

            // --- DOM ELEMENTS ---
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    
                    let contentHTML = '';
                    if (metric.lines) {
                        contentHTML = metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('');
                    } else {
                        contentHTML = `<p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p>`;
                    }

                    return `<div class="p-4 rounded-lg ${colorClass} shadow-sm border border-transparent hover:border-gray-200 transition"><h3 class="font-semibold text-sm uppercase tracking-wider mb-1">${metric.title}</h3>${contentHTML}</div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-1 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div class="bg-white p-4 rounded-xl border border-gray-100">
                                <h3 class="text-xl font-semibold mb-2">Yield Performance Comparison</h3>
                                <div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div>
                                <p class="text-xs text-center text-gray-400 mt-4">${estate.chartData.production.note}</p>
                            </div>
                            <div class="bg-white p-4 rounded-xl border border-gray-100">
                                <h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3>
                                <div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div>
                                <p class="text-xs text-center text-gray-400 mt-4">${estate.chartData.ageProfile.note}</p>
                            </div>
                        </div>
                        
                        <!-- Key Observations -->
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3>
                            <ul id="observations-list" class="list-disc list-inside space-y-3 text-gray-700 mt-4">${observationsHTML}</ul>
                        </div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-8 py-3 rounded-lg hover:bg-green-900 transition shadow-lg font-medium">View Agricultural Policy Cross-Reference</button></div>
                        
                        <div class="space-y-3">
                            <button data-dropdown-id="plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-lg flex justify-between items-center hover:bg-gray-700 transition font-semibold">
                                Plantation Advisory Report Details
                                <svg class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div id="plantation" class="details-content bg-gray-50 p-6 rounded-lg border border-gray-200 shadow-inner"></div>
                            
                            <button data-dropdown-id="agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-lg flex justify-between items-center hover:bg-gray-700 transition font-semibold">
                                Agronomy Report Details
                                <svg class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div id="agronomy" class="details-content bg-gray-50 p-6 rounded-lg border border-gray-200 shadow-inner"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCtx = document.getElementById(`prodChart-${estateData.id}`).getContext('2d');
                new Chart(prodCtx, {
                    type: 'bar',
                    data: {
                        labels: estateData.chartData.production.labels,
                        datasets: [{ 
                            label: 'FFB Yield (MT/Ha)', 
                            data: estateData.chartData.production.ffb, 
                            backgroundColor: ['#d1fae5', '#16a34a'],
                            borderRadius: 6
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, title: { display: true, text: 'MT/Ha', font: { weight: 'bold' } } } } 
                    }
                });

                const ageCtx = document.getElementById(`ageChart-${estateData.id}`).getContext('2d');
                new Chart(ageCtx, {
                    type: 'doughnut',
                    data: {
                        labels: estateData.chartData.ageProfile.labels,
                        datasets: [{ 
                            data: estateData.chartData.ageProfile.data, 
                            backgroundColor: ['#064e3b', '#10b981', '#6ee7b7'],
                            borderWidth: 0
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        cutout: '65%',
                        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 15 } } } 
                    }
                });
            }
            
            function populateInternalDropdowns() {
                const pDiv = document.getElementById('plantation');
                pDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `
                    <div class="mb-4 last:mb-0">
                        <h4 class="font-bold text-gray-900 border-l-4 border-green-600 pl-3 mb-1">${section.replace(/([A-Z])/g, ' $1').trim()}</h4>
                        <p class="text-sm text-gray-700 leading-relaxed pl-4">${content}</p>
                    </div>`).join('');
                
                const aDiv = document.getElementById('agronomy');
                aDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `
                    <div class="mb-4 last:mb-0">
                        <h4 class="font-bold text-gray-900 border-l-4 border-blue-600 pl-3 mb-1">${section.replace(/([A-Z])/g, ' $1').trim()}</h4>
                        <p class="text-sm text-gray-700 leading-relaxed pl-4">${content}</p>
                    </div>`).join('');
            }

            function attachEventListeners() {
                document.querySelectorAll('.dropdown-btn').forEach(btn => {
                    btn.addEventListener('click', e => {
                        const target = e.currentTarget;
                        const content = document.getElementById(target.dataset.dropdownId);
                        const isActive = content.classList.toggle('active');
                        target.classList.toggle('active', isActive);
                        const svg = target.querySelector('svg');
                        if (isActive) svg.style.transform = 'rotate(180deg)';
                        else svg.style.transform = 'rotate(0deg)';
                    });
                });
                document.querySelector('.policy-modal-btn')?.addEventListener('click', () => {
                    document.getElementById('modalContent').innerHTML = estateData.policy;
                    document.getElementById('policyModal').classList.add('active');
                });
            }

            renderEstate();
        });
        
        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
