<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>MLP 1 Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                MLP 1 Estate Report
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "mlp1",
                "name": "MLP 1 Estate",
                "reportInfo": "Data based on Planting Advisory (Sept 2025), Agronomy Visit (March 2026), and Internal Audit (April 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Titled: 2,010.00 ha",
                            "Mature: 1,607.14 ha",
                            "Unplanted/Roads: 402.86 ha",
                            "SPH: 125 palms/ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (FY 25/26 YTD)",
                        "value": "17.85 MT/ha",
                        "note": "25% Increase vs Previous Year (AR Pg. 31)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 296.04 / RM 346.10",
                        "note": "YTD Sept 2025 (PA 2/2025 Pg. 68)"
                    },
                    "auditRating": {
                        "title": "Internal Audit Status",
                        "value": "Marginally Deficient",
                        "note": "Audit April 2026 (Audit Pg. 1)"
                    },
                     "manuring": {
                        "title": "Manuring Progress",
                        "value": "Mix B Delayed",
                        "note": "Mix B at 45% vs Schedule (AR Pg. 12)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656-.126-1.283-.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Strength", "value": "112 (Ratio 1:14 ha)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 7h8m0 0v8m0-8l-8 8-4-4-6 6' /></svg>", "label": "Yield Trend", "value": "+25% (YTD Feb '26)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' /></svg>", "label": "Audit Findings", "value": "Marginally Deficient" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-orange-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Manuring Status", "value": "Mix B Delay (45%)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4' /></svg>", "label": "Nutrient Status", "value": "Mg Deficiency Persists" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Pruning Backlog", "value": "Round 3 (15%)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26"],
                        "ffb": [], 
                        "rainfall": [487, 106, 20, 299, 345, 199, 469, 461, 214, 217],
                        "note": "*Rainfall data YTD Feb 2026. (AR Appendix 2, Pg. 36)"
                    },
                    "ageProfile": {
                        "labels": ["Old Mature (>20 Years)", "Prime Mature (8-19 Years)", "Immature"],
                        "data": [85, 15, 0],
                        "title": "MLP 1 Estate - Palm Age Distribution (%)",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 11."
                    }
                },
                "observations": [
                    "<b>Overall Internal Control: Marginally Deficient.</b> Applications of certain important controls lacked consistency or effectiveness, requiring timely corrective action. <span class='observation-ref'>(Audit Pg. 2)</span>",
                    "<b>Critical Manuring Delay (Mixture B):</b> Only 45% completion as of Feb 2026. Delivery issues and inaccessibility in dispute areas (B17) caused delays of >1 month. <span class='observation-ref'>(AR Pg. 12-13)</span>",
                    "<b>Invoice Splitting & Procurement Breaches:</b> Repairs for Lorry SS6391V (RM 8,370) and Fuso SAB9523K (RM 5,640) were processed via split LPOs to circumvent the RM 5,000 threshold for Purchase Requisitions. <span class='observation-ref'>(Audit Pg. 21-24)</span>",
                    "<b>Payroll Irregularities (Tractor Drivers):</b> Daily wages were paid to drivers even when tractors were broken down (zero running hours), violating the piece-rate directive effective May 2025. <span class='observation-ref'>(Audit Pg. 2-6)</span>",
                    "<b>Harvesting Standards & Pruning:</b> Unsatisfactory crop recovery with unripe bunches at platforms. Pruning Round 3 is lagging significantly at 15%. <span class='observation-ref'>(AR Pg. 4, 16-17; 20)</span>",
                    "<b>Weighbridge System Gaps:</b> Obsolete system lacks date/audit trails. Tare weighing was performed before FFB collection, leading to 4-8 hour gaps between Time-In and Time-Out. <span class='observation-ref'>(Audit Pg. 9-11)</span>"
                ],
                "reports": {
                    "agronomy": {
                        "Executive Summary": "Yield performance improved by 25% vs last year. Critical issues include delays in Mixture B manuring (45% completion) and unsatisfactory crop recovery. Harvesting standards need closer supervision to prevent cutting unripe bunches. Pruning Round 3 is lagging at 15%. (AR Pg. 4-6, 20)",
                        "Nutrient Inputs/Progress of Manuring": "Manuring program for Mix A (93%), RP (88%), and Kieserite (88%) is on track. Mix B is significantly delayed at 45% due to delivery issues. Application quality acceptable, but worker productivity (16 bags/day) is below the 20-bag target. (AR Pg. 12-14)",
                        "Agronomic Observation": "<b>Harvesting:</b> Intervals inconsistent; Division B exceeds 15 days. Unripe bunches and rotten loose fruits noted. <br><b>Canopy:</b> Pruning R1 (96%), R2 (73%), R3 (15%). Over-pruning noted in spots. <br><b>Weeding:</b> Over-spraying observed in A17, B02, B17. <br><b>Nutrient Status:</b> Mg deficiency persists in hilly blocks. (AR Pg. 15-28)",
                        "Yield Performance": "Average yield is 17.85 MT/ha (+25% vs last year). Field 05A achieved the highest gain (+32%). Field 11B remains low (5.78 MT/ha) due to slow recovery. (AR Pg. 31-32)",
                        "Fertilizer Recommendation": "Program for FY2026/2027 is detailed in Appendix 1. Sub-soil application proposed for steep blocks B03 and B04 to address Mg deficiency. (AR Pg. 33)"
                    },
                    "plantation": {
                        "Executive Summary": "Crop production is encouraging, 6% above budget YTD Sept 2025. Challenges: weed management is unsatisfactory with overgrown inter-rows; critical shortage of sprayers; road conditions require immediate attention. (Source: PA 2/2025, Pg. 84-85)",
                        "Area Statement": "<b>Mature Area:</b> 1,607.14 ha. <br><b>Rehabilitation:</b> 118.93 ha undergoing corrective pruning. <br><b>Infrastructure:</b> 402.86 ha (Roads, Swamp, Buildings). (Source: PA 2/2025, Pg. 9-10)",
                        "Labour Statement": "<b>Total Workforce:</b> 220 (Req: 231). <br><b>Harvesters:</b> 112 (Ratio 1:14 ha) - Adequate. <br><b>Sprayers:</b> 10 (Req: 16) - Shortage of 6. (Source: PA 2/2025, Pg. 13-14)",
                        "Staff Establishment": "Stable. Key positions: Estate Manager (En. Zamri), Sr. Assistant Manager, Assistant Manager, and 4 Field Conductors. (Source: PA 2/2025, Pg. 15-16)",
                        "General Charges": "YTD Sept expenditure RM 409,691 (11% below budget). Overspending in Office Expenses (52% over). (Source: PA 2/2025, Pg. 19-22)",
                        "Upkeep & Cultivation": "RM 1.37M (underspent by 26%). Circle spraying (98%) is complete but labour cost is high (RM 23.88/ha). (Source: PA 2/2025, Pg. 24-53)",
                        "Harvesting and Collection": "Intervals ~14 days. Harvester output low (1.21 - 1.66 tonnes/md). Loose fruit cost RM 3.75/bag. (Source: PA 2/2025, Pg. 60-65)",
                        "Crop Production": "YTD Sept 2025: 14,385 MT (6% Above Budget). Yield 8.95 MT/ha. (Source: PA 2/2025, Pg. 66-67)",
                        "Production Cost": "Ex-Estate: RM 296.04/MT (Budget: RM 346.10). Favorable due to higher production and upkeep underspend. (Source: PA 2/2025, Pg. 68)",
                        "Vehicles Running Cost": "Repair costs significant for Tractors and Motor Graders. (Source: PA 2/2025, Pg. 73-78)",
                        "Capital Expenditure": "Underspent. Major projects: Foot Hill road construction, Workshop renovation. (Source: PA 2/2025, Pg. 81-83)",
                        "Immature": "N/A (All areas mature)."
                    },
                    "audit": {
                        "Overall Rating": "<b>Marginally Deficient</b>. Applications of certain important controls lacked consistency or effectiveness. Management requires timely corrective action. (Source: Audit April 2026, Pg. 2)",
                        "Payroll and Personnel": "<b>Irregularities in Daily Wages:</b> Daily wages paid to tractor drivers for in-field FFB evacuation despite May 2025 directive to pay piece rate. Instances noted where drivers earned daily wages (charged to workshop internal charges) on days when tractors were broken down with zero running hours. (Source: Audit April 2026, Pg. 2-6)",
                        "General Services (Weighbridge)": "<b>Operational Gaps:</b> Tare weighing performed before FFB collection, resulting in unusually long gaps (4-8 hours) between Time-In and Time-Out. The obsolete weighbridge system fails to capture dates/audit trails. Irregular weighing hours (10 PM to 3 AM) pose security risks. (Source: Audit April 2026, Pg. 9-13)",
                        "Contracts and Tenders": "<b>Unclaimed Workshop Charges:</b> MLP 1 failed to charge labour and workshop running hour costs back to All-Planters (East Coast) Sdn Bhd for repair of rental vehicles, despite contract terms allowing recovery of costs for downtime repair (total RM 7,095 for JVD 5471 alone). (Source: Audit April 2026, Pg. 15-20)",
                        "Purchasing": "<b>Invoice Splitting:</b> Repair expenditures for Lorry SS6391V (RM 8,370), Lorry SAB9523K (RM 5,640), and Backhoe SS6094M (RM 5,330) were split into multiple invoices/LPOs to circumvent the RM 5,000 Purchase Requisition limit. (Source: Audit April 2026, Pg. 21-25)"
                    },
                    "pinfosys": "N/A"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Procurement & Authority Limits</p><p class='text-sm text-gray-600'><b>Policy Ref: UMB-PLCY-CH1:</b> Purchases or repair works exceeding RM 5,000 must be routed through the Purchase Requisition (PR) process. Splitting of invoices to circumvent this limit is strictly prohibited.</p></div> <div class='policy-item'><p class='font-semibold'>Weighbridge SOP</p><p class='text-sm text-gray-600'><b>Policy Ref: WB-SOP-01:</b> FFB receiving must follow strict sequence: collection -> gross weighing (Time-In) -> unloading -> tare weighing (Time-Out). Systems must maintain date/time audit trails.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> Fertilizer application must strictly adhere to the schedule. Delays beyond 15 days require a mitigation plan. Avoid application during heavy rainfall.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting & Crop Recovery</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-02:</b> Harvesting intervals must be maintained within 15 days. Dedicated loose fruit collection must be enforced to maximize recovery.</p></div>"
            };

            // --- RENDER LOGIC ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Audit') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold text-xs uppercase tracking-wider opacity-75">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm font-medium">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold text-xs uppercase tracking-wider opacity-75">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs mt-1 font-medium opacity-75">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div class="bg-white p-2 rounded-full shadow-sm">${metric.icon}</div>
                        <div><p class="text-[10px] uppercase font-bold text-gray-400 tracking-tight mb-1 leading-none">${metric.label}</p><p class="font-bold text-gray-800 text-sm leading-none">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in border-t-4 border-green-700">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                            <div>
                                <h2 class="text-3xl font-bold text-gray-900">${estate.name}</h2>
                                <p class="text-sm text-gray-500 italic mt-1 font-medium">${estate.reportInfo}</p>
                            </div>
                            <div class="mt-4 md:mt-0 px-4 py-2 bg-red-100 text-red-800 rounded-full text-sm font-bold border border-red-200">
                                Status: Marginally Deficient
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        
                        <div class="mb-8"><h3 class="text-xl font-bold mb-4 border-b pb-2 text-gray-800">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-bold mb-2 text-gray-800">Monthly Rainfall YTD</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div></div>
                            <div><h3 class="text-xl font-bold mb-2 text-gray-800">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2 italic">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        
                        <div class="mb-8"><h3 class="text-xl font-bold mb-2 border-b pb-2 text-gray-800">Key Observations & Issues</h3><ul id="observations-list" class="list-disc list-inside space-y-3 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-gray-700 text-white px-8 py-3 rounded-lg hover:bg-gray-800 transition shadow-lg font-bold">View Agricultural Policy Cross-Reference</button></div>
                        
                        <div class="space-y-3">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-md hover:bg-gray-700 transition flex justify-between items-center font-bold">Plantation Advisory Report Details <span class="text-xl leading-none">▼</span></button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-md hover:bg-gray-700 transition flex justify-between items-center font-bold">Agronomy Report Details <span class="text-xl leading-none">▼</span></button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            
                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-green-900 text-white p-4 rounded-md hover:bg-green-800 transition flex justify-between items-center font-bold">Audited Report Details (April 2026) <span class="text-xl leading-none">▼</span></button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-md hover:bg-gray-700 transition flex justify-between items-center font-bold">Pinfosys Report Details <span class="text-xl leading-none">▼</span></button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate(estate) {
                const prodCanvasId = `prodChart-${estate.id}`;
                const ageCanvasId = `ageChart-${estate.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estate.chartData.production.labels,
                            datasets: [{ label: 'Rainfall (mm)', data: estate.chartData.production.rainfall, backgroundColor: '#3b82f6', borderRadius: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, y: { title: { display: true, text: 'Rainfall (mm)' } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estate.chartData.ageProfile.labels,
                            datasets: [{ data: estate.chartData.ageProfile.data, backgroundColor: ['#064e3b', '#059669', '#6ee7b7'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns(estate) {
                const sections = ['agronomy', 'plantation', 'pinfosys', 'audit'];
                sections.forEach(sec => {
                    const div = document.getElementById(`${estate.id}-${sec}`);
                    if (div && estate.reports[sec] && estate.reports[sec] !== "N/A") {
                        div.innerHTML = Object.entries(estate.reports[sec]).map(([section, content]) => `
                            <div class="mb-5">
                                <h4 class="font-bold text-gray-800 text-base uppercase border-l-4 border-green-700 pl-3 mb-2">${section.replace(/([A-Z])/g, ' $1').trim()}</h4>
                                <div class="text-sm text-gray-600 text-justify leading-relaxed ml-4">${content}</div>
                            </div>`).join('');
                    } else if (div) {
                        div.innerHTML = `<p class="text-sm text-gray-600 italic">Not Available</p>`;
                    }
                });
            }

            function attachEventListeners(estate) {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estate));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
