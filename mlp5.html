<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>MLP 5 Estate - Plantation, Agronomy & Audit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } /* dark green */
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div id="header-title" class="text-xl font-bold text-gray-900">
                <!-- Title populated by JS -->
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "mlp5",
                "name": "MLP 5 Estate",
                "reportInfo": "Data based on Agronomy Report 1/2026 (Visit: Feb 2026), Plantation Advisory Report 2/2025 (October 2025), & Internal Audit Report (Feb 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,266.02 ha",
                            "Mature: 1,102.51 ha",
                            "Immature: 163.51 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual FY25/26 vs FY24/25)",
                        "value": "13.59 / 10.31 MT",
                        "note": "31.8% Increase YoY (Period 10, Feb 2026)"
                    },
                    "cost": {
                        "title": "Production Cost (Ex-Estate)",
                        "value": "RM 382.39 / RM 387.41",
                        "note": "1% Below Budget (Based on PA 2/2025)"
                    },
                    "labour": {
                        "title": "Labour Status",
                        "value": "Shortage",
                        "note": "Short of 12 Harvesters (Ratio 1:18 ha)"
                    },
                     "audit": {
                        "title": "Audit Rating",
                        "value": "Marginally Deficient",
                        "note": "Manuring delays & inventory issues (Feb 2026)"
                    }
                },
                
                "keyMetrics": [
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Harvester Ratio", "value": "1:18 ha (Shortage 12)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, "label": "P&D Status", "value": "Mg Deficiency (Hilly)" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>`, "label": "OER %", "value": "20.12%" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>`, "label": "Manuring", "value": "Behind Schedule" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>`, "label": "Harvest Interval", "value": "9-14 days" },
                    { "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>`, "label": "Road Status", "value": "Unsatisfactory" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26"],
                        "ffb": [], 
                        "rainfall": [354, 103, 20, 158, 270, 216, 229, 344, 260, 216],
                        "note": "*Rainfall data from Agronomy Report 1/2026, Appendix 3."
                    },
                    "ageProfile": {
                        "labels": ["Mature (1,102.51 ha)", "Immature (163.51 ha)"],
                        "data": [87, 13],
                        "title": "MLP 5 Estate - Palm Age Distribution",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 12."
                    }
                },
                
                "observations": [
                    "<b>Significant Manuring Delays (Div 5B Focus):</b> Agronomy and Audit reports highlight severe delays in the FY25/26 program. Division 5B is only 26% complete due to workforce shortages, rainy weather, and poor hilly roads. The final round of Mix B for Div 5B has been withdrawn to rebalance the workload. <span class='observation-ref'>(AR 1/2026, Pg. 13-14; Audit Report, Pg. 2-8)</span>",
                    "<b>Crop Quality & Harvesting Concerns:</b> Despite improved harvest intervals (9-14 days), a high occurrence of unripe bunches and uncollected loose fruits at collection platforms were observed, indicating a need for tighter supervision. <span class='observation-ref'>(AR 1/2026, Pg. 18-20)</span>",
                    "<b>Stores & Inventory Management Weaknesses:</b> Audit identified RM 50,453 worth of slow-moving/ageing stock, notably Kenrane 200 (709 Litres kept since Jul 2023). There is a high risk of chemical expiry and physical deterioration of spare parts/tyres due to prolonged storage without movement. <span class='observation-ref'>(Audit Report, Pg. 9-11)</span>",
                    "<b>Magnesium Deficiency:</b> Palms in hilly sections of both Division A and B show visible Mg deficiency (yellowing fronds). Supervision of manuring on terraces is critical to avoid omissions. <span class='observation-ref'>(AR 1/2026, Pg. 23)</span>",
                    "<b>Ground Vegetation Backlog:</b> Weeding progress is lagging; circle weeding is only 43% complete. Ground conditions in spotted areas are unsatisfactory with overgrown grasses and woodies. <span class='observation-ref'>(AR 1/2026, Pg. 30-31)</span>",
                    "<b>Agricultural Road Conditions:</b> Conditions remain unacceptable and significantly behind schedule for gravelling, hampering FFB evacuation and manuring operations during rainy periods. <span class='observation-ref'>(PA 2/2025, Pg. 33, 48; Audit Report, Pg. 6)</span>"
                ],
                
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate's performance is acceptable but requires significant improvement in road access and labour establishment. FFB production was 4% below the seasonal budget. Key challenges include a shortage of harvesters, delayed weeding/manuring due to weather, and poor agricultural road conditions. <span class='observation-ref'>(Source: PA 2/2025, Pg. 47-48)</span>",
                        "Area Statement": "Total Planted Area is <b>1,166.64 ha</b>. This comprises:<br>&bull; <b>Mature:</b> 1,102.51 ha.<br>&bull; <b>Immature (2024B):</b> 64.13 ha.<br>&bull; <b>Unplantable/Ravine:</b> 592.55 ha. <span class='observation-ref'>(Source: PA 2/2025, Pg. 9)</span>",
                        "Labour Statement": "Current workforce is 130 workers vs requirement of 139.<br>&bull; <b>Harvesters:</b> 61 (Requirement: 73, Shortage: 12). Current harvester ratio is 1:18 ha.<br>&bull; <b>Weeding & Manuring:</b> Gangs are generally sufficient if productivity is maintained. <span class='observation-ref'>(Source: PA 2/2025, Pg. 14)</span>",
                        "Staff Establishment": "Current strength includes 1 Manager, 2 Assistant Managers, and 2 Field Conductors.<br>&bull; <b>Shortages:</b> Short of 2 Field Supervisors, which is critical given the steep terrain. <span class='observation-ref'>(Source: PA 2/2025, Pg. 13)</span>",
                        "General Charges": "Total Expenditure is <b>RM 895,911</b> (RM 767.94/ha), which is 12% below the seasonal budget.<br>&bull; <b>Overspending:</b> Staff Accommodation (+61%), Labour Paid Leave (+73%), and Entertainment (+187%). <span class='observation-ref'>(Source: PA 2/2025, Pg. 16-17)</span>",
                        "Upkeep & Cultivation": "&bull; <b>Weeding:</b> Cost is RM 104.69/ha (High due to labour rates/poisoning jungle trees). Circle spraying is 28% complete (Delayed). Selective weeding is 13% complete (Delayed).<br>&bull; <b>Manuring:</b> Cost is RM 261.62/ha (43% of budget, Delayed).<br>&bull; <b>Roads:</b> RM 487.03/ha (80% of budget), mostly for machinery rental and repairs. <span class='observation-ref'>(Source: PA 2/2025, Pg. 18-31)</span>",
                        "Harvesting and Collection": "Total Cost is <b>RM 133.32/MT</b> (1% below budget). Cost (Excl. Ext Transport) is RM 94.16/MT (1% above budget).<br>&bull; <b>Harvester Productivity:</b> 1.45 MT/man-day.<br>&bull; <b>Interval:</b> Generally satisfactory (10-15 days). <span class='observation-ref'>(Source: PA 2/2025, Pg. 36-38)</span>",
                        "Crop Production": "Total FFB is <b>7,787.40 MT</b> (4% below seasonal budget).<br>&bull; <b>Yield:</b> 7.06 MT/ha (Seasonal Budget: 7.37 MT/ha).<br>&bull; <b>Extraction:</b> OER at 20.12%. <span class='observation-ref'>(Source: PA 2/2025, Pg. 40)</span>",
                        "Production Cost": "Total Cost is <b>RM 382.39/MT</b> (Ex-estate). This is 1% lower than the seasonal budget of RM 387.41/MT. <span class='observation-ref'>(Source: PA 2/2025, Pg. 41)</span>",
                        "Vehicles Running Cost": "Generally acceptable. Exceptions:<br>&bull; <b>Nissan Lorry SS915U:</b> 65% over budget.<br>&bull; <b>Farm Tractor SYL 8512:</b> 34% over budget due to high repair costs. <span class='observation-ref'>(Source: PA 2/2025, Pg. 42-43)</span>",
                        "Immature (2024B)": "Area is 64.13 ha (7,514 palms).<br>&bull; <b>Density:</b> 117 palms/ha.<br>&bull; <b>Cost:</b> RM 5,101.63/ha to date.<br>&bull; <b>Status:</b> Planting is considered complete, but supplying is needed for vacant points. <span class='observation-ref'>(Source: PA 2/2025, Pg. 44)</span>",
                        "Capital Expenditure": "<b>N/A</b> (Road surfacing with crusher run has not been carried out due to material shortage and weather). <span class='observation-ref'>(Source: PA 2/2025, Pg. 31)</span>"
                    },
                    "agronomy": {
                        "Executive Summary": "Visit Date: 10th Feb 2026. Yield FY25/26 (to date Feb 2026) is 13.59 MT/ha, a 31.8% increase YoY. Despite improvement, performance remains below potential due to delayed fertilizer application, slow weeding progress, and machinery/accessibility issues. (Source: AR 1/2026, Pg. 4, 6, 41)",
                        "Nutrient Inputs/Progress of Manuring": "FY25/26 Program: Significantly behind schedule. Mixture B completion is at 44% for mature palms. Delays are attributed to machinery issues (transportation) and low worker productivity (avg 13 bags/man-day). Stock from the final round of FY25/26 will be carried forward. (Source: AR 1/2026, Pg. 13-15, 43)",
                        "Agronomic Observation": "Harvesting: Intervals improved to 9-14 days in Feb 2026. However, crop quality is suboptimal with unripe bunches harvested and loose fruit losses at platforms. Palm Status: Mg deficiency visible in hilly sections. Pruning: Progressive pruning at 67% complete; corrective pruning at 86%. Weed Control: Laguna behind; circle spraying only 43% complete. (Source: AR 1/2026, Pg. 4-5, 17-20, 26, 30-31)",
                        "Yield Performance": "Mean FY25/26 Yield (Feb 2026): 13.59 MT/ha (FY24/25: 10.31 MT/ha). Field 12B recorded the highest gain (39.3%). Low ABW (17.95 kg) and accessibility in ravines remain limiting factors. (Source: AR 1/2026, Pg. 41-42)",
                        "Fertilizer Recommendation": "FY26/27 Program reviewed. Mixture B stock from FY25/26 to be reconciled. New planting areas in 25C (99.38 ha) and 26D (131.57 ha) have been incorporated into requirements. (Source: AR 1/2026, Pg. 43, 47-49)"
                    },
                    "audit": {
                        "Executive Summary": "Overall Rating: <b>Marginally Deficient</b>. Although most key controls were being applied, the application of certain important controls lacked consistency or effectiveness, particularly in manuring progress and inventory management operations. (Source: Audit Report, Pg. 1-2)",
                        "Manuring Operations (Div 5B)": "<b>Issue:</b> Significant delay in the FY 25/26 manuring implementation. Division 5B is only 26% complete compared to 59% in Division 5A. The delay is attributed to unstable workforce, rainy weather, poor hilly road conditions, and the need to clear FY 24/25 backlog (43.80 MT Hi-Kay).<br><b>Recommendation & Action:</b> Consult the agronomist and assign general workers/harvesters to support. Management has officially withdrawn the final round of the MIX B program for Division 5B to rebalance workload and ensure timely completion of critical applications. (Source: Audit Report, Pg. 2-8)",
                        "Stores and Purchases": "<b>Issue:</b> Weaknesses in inventory monitoring identified with RM 50,453 in slow-moving/ageing stock. High volume items like Kenrane 200 (709 Litres valued at RM 34,008) have had no movement since July 2023. This raises significant risks of chemical expiry, obsolescence, and physical deterioration of rubber-based spares.<br><b>Recommendation & Action:</b> Conduct housekeeping, dispose of expired items, and align procurement. Management has identified Ebor Rat Bait for write-off, will transfer some chemicals to sister estates, and is actively planning internal consumption for the rest. (Source: Audit Report, Pg. 9-13)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-01:</b> Harvesting intervals must be maintained at 10-15 days. Intervals exceeding this must be reported with a recovery plan. (AR 1/2026 Ref)</p></div> <div class='policy-item'><p class='font-semibold'>Manuring</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-03:</b> Fertilizer must be applied near the terrace wall to prevent leaching. Sub-soil application recommended for poor terrace conditions. (AR 1/2026 Ref)</p></div> <div class='policy-item'><p class='font-semibold'>Weed Management</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-GEN-02:</b> Regular circle spraying is mandatory for effective crop recovery and loose fruit collection. (AR 1/2026 Ref)</p></div>"
            };


            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                document.getElementById('header-title').innerText = `${estateData.name} Report`;
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-red-50 text-red-800' : 
                                       metric.title.includes('Audit') ? 'bg-purple-50 text-purple-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                const productionChartHTML = (estate.chartData.production.labels && estate.chartData.production.labels.length > 0) ?
                    `<div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div>` :
                    `<div class="chart-container flex items-center justify-center bg-gray-50 rounded-lg p-4"><p class="text-gray-500 text-center">Chart data unavailable.</p></div>`;

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">FY2025/2026 Rainfall (mm)</h3>${productionChartHTML}<p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3>
                            <ul id="observations-list" class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul>
                        </div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-audit" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Internal Audit Report Details</button>
                            <div id="${estate.id}-audit" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>

                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx && estateData.chartData.production.labels) {
                    const datasets = [];
                    if (estateData.chartData.production.rainfall && estateData.chartData.production.rainfall.length > 0) {
                        datasets.push({ label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' });
                    }

                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: datasets
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { 
                                x: { grid: { display: false } }, 
                                'y-rainfall': { 
                                    type: 'linear', 
                                    position: 'left', 
                                    title: { display: true, text: 'Rainfall (mm)' } 
                                } 
                            } 
                        }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx && estateData.chartData.ageProfile.data) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#047857', '#a7f3d0'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: false }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const auditDiv = document.getElementById(`${estateData.id}-audit`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                // We use a div container instead of p to allow nested HTML styling like bullets
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-3 text-gray-900">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700 mt-1 space-y-1">${content}</div>`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-3 text-gray-900">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700 mt-1 space-y-1">${content}</div>`).join('');
                }
                if (auditDiv && estateData.reports.audit) {
                    auditDiv.innerHTML = Object.entries(estateData.reports.audit).map(([section, content]) => `<h4 class="font-semibold mt-3 text-gray-900">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700 mt-1 space-y-1">${content}</div>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<div class="text-sm text-gray-700 mt-1">${estateData.reports.pinfosys}</div>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const isActive = content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active', isActive);
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
